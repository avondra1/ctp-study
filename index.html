s."},{"id":"i_51997ae3d8fc","t":"d","term":"use tax","ch":2,"d":4,"hy":true,"body":"A type of tax that is imposed directly on the consumer of goods that were purchased without paying sales tax (generally items purchased from a vendor in another state or over the internet and delivered to the purchaser by mail or common carrier)."},{"id":"i_763266e2bc37","t":"d","term":"value at risk (VaR)","ch":16,"d":4,"hy":false,"body":"A risk management measurement that is used to determine how changing financial variables will affect a company’s value. It is designed specifically to incorporate a wide range of risk factors and summarize their impact in a single measure. The VaR approach uses the probability and monetary impacts of specified events over a period of time to assess risk."},{"id":"i_0859a5fdf8fc","t":"d","term":"value dating","ch":4,"d":1,"hy":true,"body":"A process whereby a bank sets a forward value date when determining the date on which the value of funds is credited to an account and establishes a back value date when determining the date on which the value of funds is debited from an account."},{"id":"i_e985db078592","t":"d","term":"value-added tax (VAT)","ch":2,"d":4,"hy":false,"body":"A type of sales tax that involves charging a separate tax at each discrete stage of production and/or distribution based on the increased value (i.e., value added) occurring at that stage."},{"id":"i_b6f6217bbd96","t":"d","term":"value-dated automated clearinghouse (ACH) transactions","ch":4,"d":1,"hy":false,"body":"ACH transactions where the payment instructions include settlement dates."},{"id":"i_41fb3e2c6239","t":"d","term":"variable cost","ch":9,"d":2,"hy":true,"body":"A type of cost whose total amount changes in direct proportion to the level of business activity (e.g., sales or production). In cost accounting, variable costs are contrasted with fixed costs, which do not change based on volume or activity levels."},{"id":"i_96885b052aeb","t":"d","term":"variable-rate demand obligation (VRDO)","ch":5,"d":1,"hy":false,"body":"A type of security issued as a long-term bond that carries a short-term liquidity feature, or put. Generally, this put option, which is an investor’s option to sell (or put) the instrument back to the issuer at par, allows for liquidation either weekly or monthly, and is typically supported by a credit facility, such as a bank letter of credit. While interest from VRDOs is often tax-exempt, VRDOs exist as both taxable and nontaxable instruments."},{"id":"i_dbd3144a0c6c","t":"d","term":"variance analysis","ch":14,"d":1,"hy":true,"body":"A type of analysis used in forecasting to determine the reason for any significant differences between forecasted and actual results, with a view to amending the future forecast process to improve long-term accuracy."},{"id":"i_caf83e3e0df4","t":"d","term":"velocity","ch":16,"d":4,"hy":true,"body":"In the context of risk management, the speed at which a risk would materialize. Velocity can be expressed in terms of the amount of notice an organization would have of a risk event."},{"id":"i_00a242c32609","t":"d","term":"virtual bank accounts","ch":1,"d":1,"hy":true,"body":"A set of internal ledgers (each of which can have its own bank account number) with only the header account being a real (legal) account. Virtual accounts themselves are not separate legal accounts from a legal perspective."},{"id":"i_b45cf7ec3aab","t":"d","term":"virtual card","ch":4,"d":1,"hy":false,"body":"A variation on the purchasing card that does not involve the use of an actual card. With a virtual card system, a card number is given to a specific vendor and is then used for electronic purchasing and billing purposes."},{"id":"i_0f0a5a870f32","t":"d","term":"virtual currency","ch":4,"d":1,"hy":true,"body":"Digital money that, unlike traditional fiat currency, is not available as physical notes and coin. Examples include central bank digital currency and cryptocurrency."},{"id":"i_d7365e3fde2a","t":"d","term":"virtual vault service","ch":12,"d":1,"hy":true,"body":"A service in which an armored carrier, working in conjunction with a firm’s depository bank, records deposits and reports them to the firm’s bank. The bank provides provisional credit at the time of the deposit."},{"id":"i_5a47319d7fee","t":"d","term":"volatile cash flow","ch":14,"d":1,"hy":false,"body":"In the cash flow forecasting process, this is a cash flow component that is subject to volatility, either in timing or value."},{"id":"i_e11ed3aff207","t":"d","term":"warrant","ch":6,"d":2,"hy":true,"body":"A company-issued option that gives the warrant’s owner the right to buy a stated number of shares of stock at a specified price for a specified period of time."},{"id":"i_19d1c0df9a57","t":"d","term":"warranties","ch":6,"d":2,"hy":false,"body":"Along with representations, these are the existing conditions attested to by the borrower at the time when a loan agreement is executed, on drawdown (i.e., when borrowed funds are received), and with each quarterly reporting requirement."},{"id":"i_c7a5eb4b4e17","t":"d","term":"weighted average cost of capital (WACC)","ch":9,"d":2,"hy":false,"body":"Used in determining the overall cost of capital, this cost is calculated by weighting the costs of the primary funding sources of permanent capital by their proportionate dollar contribution to the firm’s capital base."},{"id":"i_4ef764bd5f6d","t":"d","term":"weighted average life (WAL)","ch":5,"d":1,"hy":false,"body":"An indication of the credit risk exposure of a portfolio, measured by the time before the assets (weighted by relative holding) in the fund mature. Unlike for weighted average maturity (WAM), maturity for WAL purposes is defined as the time until the principal of the asset is repaid."},{"id":"i_4e08262848c7","t":"d","term":"weighted average maturity (WAM)","ch":5,"d":1,"hy":false,"body":"An indication of the interest rate risk exposure of a portfolio, measured by the time before the assets (weighted by relative holding) in the fund mature. For floating-rate instruments, maturity is defined as the next interest rate fixing date."},{"id":"i_2787cff5e671","t":"d","term":"wholesale lockbox","ch":12,"d":1,"hy":true,"body":"A lockbox system that is used primarily to process low-volume, largedollar business-to-business payments that are submitted with remittance information that may not be machine readable."},{"id":"i_e2aec5ea3af6","t":"d","term":"wire transfer","ch":4,"d":1,"hy":true,"body":"An electronic payment that is typically processed individually and in real time with immediate and irrevocable settlement."},{"id":"i_efe3f78b9557","t":"d","term":"withholding tax","ch":2,"d":4,"hy":false,"body":"A tax that is deducted at the payment source and paid directly to the tax authorities where the payment originates. Tax authorities often apply withholding tax on interest, dividend, and royalty payments, which means this type of tax may be charged on funds being moved by multinational companies from one country to another."},{"id":"i_b862a6a55da7","t":"d","term":"without recourse (no recourse)","ch":10,"d":1,"hy":false,"body":"A term related to using a factoring arrangement. In this case, the factor must absorb the loss if a customer fails to pay."},{"id":"i_38441f1affd0","t":"d","term":"work in progress (WIP)","ch":10,"d":1,"hy":false,"body":"A type of inventory that represents items or materials that are in the process of being manufactured."},{"id":"i_66067e3c75bf","t":"d","term":"workflow management system","ch":15,"d":5,"hy":true,"body":"Technology that enables a company to use software to implement, monitor, and enforce the specific processes and procedures (i.e., the workflow) that it wants used throughout the company."},{"id":"i_aedf31c3ebdf","t":"d","term":"working capital","ch":1,"d":1,"hy":true,"body":"The sum of a company’s current asset accounts (primarily cash, accounts receivable, and inventory) less the sum of its current liability accounts (primarily payables and accrual accounts). Also known as net working capital."},{"id":"i_7a2e194ee574","t":"d","term":"working capital gap","ch":1,"d":1,"hy":false,"body":"The time gap between a cash outflow and a cash inflow."},{"id":"i_f32d6b7e71cd","t":"d","term":"Yankee CD","ch":5,"d":1,"hy":false,"body":"A certificate of deposit that is denominated in US dollars and issued in the United States by a branch of a non-US bank."},{"id":"i_3188d219466e","t":"d","term":"year basis","ch":13,"d":1,"hy":true,"body":"The number of days in a year, when calculating the yield on an investment. Money market yield is traditionally based on a -day year, while bond equivalent yield is based on a -day year."},{"id":"i_f12e1e8f455f","t":"d","term":"yield","ch":5,"d":1,"hy":true,"body":"The income return on an investment. This refers to the interest or dividends received from a security and is usually expressed annually as a percentage based on the investment’s cost, its current market value, or its face value."},{"id":"i_0e48b9432a52","t":"d","term":"yield curve","ch":13,"d":1,"hy":false,"body":"A plot of the yields to maturity on the same investment instrument or class of instruments, but with varying maturities, as of a specific date. For example, a yield curve for US Treasury instruments is a plot of yields to maturity for US Treasury bond issues with varying periods to maturity as of the close of business on a particular date."},{"id":"i_3afa88590bea","t":"d","term":"yield to call (YTC)","ch":19,"d":2,"hy":false,"body":"The yield a bond would provide if the issuer calls the bond prior to maturity. Since callable bonds usually are called only if interest rates have fallen, the YTC is typically lower than the yield to maturity."},{"id":"i_e239d4bb149a","t":"d","term":"yield to maturity (YTM)","ch":19,"d":2,"hy":false,"body":"The rate of return anticipated on a bond if it is held until the maturity date. YTM is considered a long-term bond yield expressed as an annual rate. The calculation of YTM takes into account the current market price, par value, coupon interest rate, and time to maturity. It is also assumed that all coupons are reinvested at the same rate. Sometimes, this is simply referred to as yield."},{"id":"i_7c2228c9fbaa","t":"d","term":"yield to worst (YTW)","ch":19,"d":2,"hy":false,"body":"The lowest possible yield that can be received on a bond without the issuer actually defaulting. YTW can also be defined as the lowest yield to call available for a particular bond."},{"id":"i_00c2cc6cb943","t":"d","term":"zero balance account (ZBA)","ch":12,"d":1,"hy":false,"body":"A type of bank account (typically used for disbursements via check or electronic funds transfer) where the end-of-day balance in the account is maintained at zero. Transfers are made from a header account to fund this account, typically at the end of the day. A ZBA can also be set up as a depository account from which funds are debited and transferred to a header account at the end of each day."},{"id":"i_d17afcc32c12","t":"d","term":"zero-coupon bond","ch":6,"d":2,"hy":true,"body":"A debt security that does not pay interest (a coupon) but is issued, and traded, at a deep discount, rendering a profit at maturity when the bond is redeemed for its full face value."},{"id":"i_657d1e7c8995","t":"f","term":"Earnings Credit","ch":7,"d":3,"hy":true,"eq":"CB × (1 − RR) × ECR × (D / 365)","leg":["CB = Average Collected Balances","RR = Reserve Requirement","ECR = Earnings Credit Rate","D = Number of Days in the Month"],"v":true},{"id":"i_bf40e723b098","t":"f","term":"Average Collected Balances Required","ch":7,"d":3,"hy":true,"eq":"SC / [ ECR × (D/365) × (1 − RR) ]","leg":["SC = Service Provider Charges","RR = Reserve Requirement","ECR = Earnings Credit Rate","D = Number of Days in the Month"],"v":true},{"id":"i_41638938b106","t":"f","term":"Balance Sheet Equation","ch":8,"d":1,"hy":true,"eq":"Assets = Liabilities + Shareholders' Equity","leg":[],"v":true},{"id":"i_8b094a3a6311","t":"f","term":"Future Value","ch":9,"d":2,"hy":true,"eq":"PV × (1 + i)^n","leg":["PV = Present Value","i = Annual Investment Rate","n = Number of Compounding Periods"],"v":true},{"id":"i_4b75f9f1a749","t":"f","term":"Present Value","ch":9,"d":2,"hy":true,"eq":"FV / (1 + i)^n   (equivalently FV × [1 / (1+i)^n])","leg":["FV = Future Value","i = Annual Investment Rate","n = Number of Compounding Periods"],"v":true},{"id":"i_a872fb6b7f0f","t":"f","term":"Present Value of a Stream of Payments","ch":9,"d":2,"hy":true,"eq":"C1/(1+i)^1 + C2/(1+i)^2 + ... + Cn/(1+i)^n","leg":["Cn = Cash flow C in time period n","n = Number of Compounding Periods","i = Periodic Investment Rate or Discount Rate"],"v":true},{"id":"i_19593f1b72fa","t":"f","term":"Future Value for Investment Periods Less Than 1 Year","ch":9,"d":2,"hy":true,"eq":"PV × (1 + Days × (i / Days in a Year))","leg":["PV = Present Value","Days = Number of Days in the Period","i = Discount Rate"],"v":true},{"id":"i_00268be9aacb","t":"f","term":"Present Value for Investment Periods Less Than 1 Year","ch":9,"d":2,"hy":true,"eq":"FV / (1 + Days × (i / Days in a Year))","leg":["FV = Future Value","i = Annual Investment Rate"],"v":true},{"id":"i_1515015ce46c","t":"f","term":"After-Tax Cost of Debt","ch":9,"d":2,"hy":true,"eq":"rD × (1 − T)","leg":["rD = Yield to maturity on newly issued debt (before-tax)","T = Firm's marginal income tax rate"],"v":true},{"id":"i_e89df584035e","t":"f","term":"Capital Asset Pricing Model (CAPM)","ch":9,"d":2,"hy":true,"eq":"rRF + (rM − rRF) × β","leg":["rRF = Expected return on the risk-free rate","rM = Expected return on the market portfolio","β = Beta value for the company's stock"],"v":true},{"id":"i_6f0ec9bc9dc4","t":"f","term":"Weighted Average Cost of Capital (WACC)","ch":9,"d":2,"hy":true,"eq":"wD × rD × (1 − T) + wE × rE","leg":["wD = Weighting of debt financing","rD = YTM on newly issued debt (before-tax)","T = Firm's marginal tax rate","wE = Weighting of equity financing","rE = Required rate of ret <script>
const {
  useState,
  useEffect,
  useMemo,
  useRef,
  useCallback
} = React;

/* ============================================================
   CTP RETRIEVAL TERMINAL — standalone build
   Local-first storage (localStorage) + optional Supabase sync.
   Runs anywhere as a single HTML file. All content from source files.
   ============================================================ */

const DATA = window.__CTP_DATA__;

// ---------- Supabase config (publishable key is browser-safe) ----------
const SUPABASE_URL = "https://wsprzjjehvgogjtlpqnx.supabase.co";
const SUPABASE_KEY = "sb_publishable_R6-pIc4yf5ct4oqgnpRuXg_6G-xyQZ9";
const SYNC_ROW_ID = "me"; // single-user: one row holds everything
const REST = `${SUPABASE_URL}/rest/v1/ctp_state`;
const SB_HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json"
};

// ---------- design tokens ----------
const C = {
  bg: "#0a0e14",
  panel: "#111722",
  panel2: "#0d131c",
  line: "#1e2733",
  ink: "#e6edf3",
  dim: "#8b97a7",
  faint: "#5a6573",
  amber: "#f4b740",
  amberDim: "#7a5e1f",
  d1: "#f4b740",
  d2: "#5db0d7",
  d3: "#9a8cd0",
  d4: "#e0736b",
  d5: "#6cc09a",
  good: "#6cc09a",
  shaky: "#f4b740",
  blank: "#e0736b",
  verify: "#e0736b"
};
const DOMAIN_COLOR = {
  1: C.d1,
  2: C.d2,
  3: C.d3,
  4: C.d4,
  5: C.d5
};
const MONO = "'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace";
const SANS = "'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";

// ---------- local-first store with Supabase sync ----------
// State shape: { progress:{}, sessions:[], streak:{best,current} }
const LKEY = "ctp_state_v2";
const Local = {
  read() {
    try {
      const s = localStorage.getItem(LKEY);
      return s ? JSON.parse(s) : null;
    } catch {
      return null;
    }
  },
  write(state) {
    try {
      localStorage.setItem(LKEY, JSON.stringify(state));
      return true;
    } catch {
      return false;
    }
  }
};
const Cloud = {
  configured: SUPABASE_URL.startsWith("https://") && SUPABASE_KEY.length > 10,
  async pull() {
    if (!this.configured) return null;
    const res = await fetch(`${REST}?id=eq.${SYNC_ROW_ID}&select=data`, {
      headers: SB_HEADERS
    });
    if (!res.ok) throw new Error("pull " + res.status);
    const rows = await res.json();
    return rows.length ? rows[0].data : null;
  },
  async push(state) {
    if (!this.configured) return false;
    // upsert single row
    const res = await fetch(`${REST}?on_conflict=id`, {
      method: "POST",
      headers: {
        ...SB_HEADERS,
        "Prefer": "resolution=merge-duplicates,return=minimal"
      },
      body: JSON.stringify({
        id: SYNC_ROW_ID,
        data: state,
        updated_at: new Date().toISOString()
      })
    });
    if (!res.ok) throw new Error("push " + res.status);
    return true;
  }
};

// ---------- helpers ----------
const todayStr = () => new Date().toISOString().slice(0, 10);
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const shuffle = a => {
  const x = [...a];
  for (let i = x.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [x[i], x[j]] = [x[j], x[i]];
  }
  return x;
};
const fmtSec = s => {
  const m = Math.floor(s / 60),
    ss = Math.round(s % 60);
  return m ? `${m}m ${ss}s` : `${ss}s`;
};
const DOMAIN_WEIGHT = {
  1: 58,
  2: 36,
  3: 15,
  4: 26,
  5: 16
};
const DOMAIN_TITLE = DATA.domains;

// slow threshold for a "got it" that took too long (seconds). Exam pace ≈ 74s/Q.
const SLOW_GOT_SEC = 20;
// =================== MAIN APP ===================
function App() {
  const [tab, setTab] = useState("study");
  const [state, setState] = useState({
    progress: {},
    sessions: [],
    streak: {
      best: 0,
      current: 0
    }
  });
  const [loaded, setLoaded] = useState(false);
  const [sync, setSync] = useState({
    status: "local",
    lastError: null,
    lastSync: null
  });
  // status: local | syncing | synced | error
  const pushTimer = useRef(null);

  // ---- initial load: local first (instant), then reconcile with cloud ----
  useEffect(() => {
    const local = Local.read() || {
      progress: {},
      sessions: [],
      streak: {
        best: 0,
        current: 0
      }
    };
    setState(local);
    setLoaded(true);
    (async () => {
      if (!Cloud.configured) {
        setSync(s => ({
          ...s,
          status: "local"
        }));
        return;
      }
      setSync(s => ({
        ...s,
        status: "syncing"
      }));
      try {
        const remote = await Cloud.pull();
        if (remote) {
          // merge: prefer the record with more total activity per item; union sessions
          const merged = mergeState(local, remote);
          setState(merged);
          Local.write(merged);
        } else {
          // nothing remote yet — push local up as the seed
          await Cloud.push(local);
        }
        setSync({
          status: "synced",
          lastError: null,
          lastSync: Date.now()
        });
      } catch (e) {
        setSync({
          status: "error",
          lastError: String(e.message || e),
          lastSync: null
        });
      }
    })();
  }, []);

  // persist with a functional update so concurrent writes (e.g. record + streak) merge
  // instead of overwriting each other from stale closures.
  const persistFn = useCallback(updater => {
    setState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      Local.write(next);
      if (Cloud.configured) {
        setSync(s => s.status === "error" ? s : {
          ...s,
          status: "syncing"
        });
        clearTimeout(pushTimer.current);
        pushTimer.current = setTimeout(async () => {
          try {
            await Cloud.push(next);
            setSync({
              status: "synced",
              lastError: null,
              lastSync: Date.now()
            });
          } catch (e) {
            setSync({
              status: "error",
              lastError: String(e.message || e),
              lastSync: null
            });
          }
        }, 1200);
      }
      return next;
    });
  }, []);
  const persist = useCallback(next => persistFn(next), [persistFn]);

  // record one item interaction (with time in seconds)
  const record = useCallback((id, correct, conf, secs) => {
    persistFn(prev => {
      const cur = prev.progress[id] || {
        seen: 0,
        right: 0,
        wrong: 0,
        lastConf: null,
        lastSeen: null,
        totalSec: 0,
        slowGot: 0
      };
      const slow = conf === "got" && secs != null && secs > SLOW_GOT_SEC ? 1 : 0;
      const nextItem = {
        seen: cur.seen + 1,
        right: cur.right + (correct ? 1 : 0),
        wrong: cur.wrong + (correct ? 0 : 1),
        lastConf: conf ?? cur.lastConf,
        lastSeen: todayStr(),

.srow:hover { background:${C.panel2}; }
.sterm { font-weight:600; font-size:14px; color:${C.ink}; }
.sbody { font-size:12.5px; color:${C.dim}; line-height:1.5; margin-top:2px; }
.chtag { font-family:${MONO}; font-size:9px; color:${C.faint}; border:1px solid ${C.line}; border-radius:2px; padding:1px 3px; }
.ftag { font-family:${MONO}; font-size:11px; color:${C.d2}; font-weight:700; }
.atag { font-family:${MONO}; font-size:8px; color:${C.d3}; border:1px solid ${C.d3}55; border-radius:2px; padding:1px 3px; }
.card { background:${C.panel}; border:1px solid ${C.line}; border-radius:8px; padding:22px; margin-top:14px; }
.prompt { font-size:22px; font-weight:700; color:${C.ink}; margin:6px 0 16px; letter-spacing:-0.3px; }
.opts { display:flex; flex-direction:column; gap:8px; }
.opt { display:flex; align-items:flex-start; gap:10px; text-align:left; font-size:13.5px; line-height:1.5; padding:12px 14px; background:${C.panel2}; color:${C.ink}; border:1px solid ${C.line}; border-radius:6px; cursor:pointer; transition:.12s; }
.opt:hover:not(:disabled) { border-color:${C.amber}; background:${C.bg}; }
.optmark { font-family:${MONO}; font-size:13px; color:${C.faint}; flex:0 0 auto; width:14px; text-align:center; line-height:1.5; }
.optsel { border-color:${C.amber} !important; background:${C.amber}14 !important; }
.optsel .optmark { color:${C.amber}; }
.optright { border-color:${C.good} !important; background:${C.good}1a !important; }
.optright .optmark { color:${C.good}; }
.optwrong { border-color:${C.blank} !important; background:${C.blank}1a !important; }
.optwrong .optmark { color:${C.blank}; }
.optdim { opacity:.45; }
.verdict { font-family:${MONO}; font-size:12px; margin-top:14px; font-weight:600; }
.conf { font-family:${MONO}; font-size:11px; letter-spacing:.5px; padding:7px 14px; background:transparent; border:1px solid; border-radius:5px; cursor:pointer; font-weight:600; }
.conf:hover { background:${C.panel2}; }
.blankin { flex:1; font-family:${MONO}; font-size:14px; background:${C.panel2}; color:${C.ink}; border:1px solid ${C.line}; border-radius:6px; padding:11px 14px; }
.blankin:focus { outline:none; border-color:${C.amber}; }
.reveal { margin-top:14px; padding:12px 14px; background:${C.panel2}; border:1px solid ${C.line}; border-left:3px solid ${C.amber}; border-radius:4px; }
.formbox { font-family:${MONO}; font-size:15px; color:${C.ink}; background:${C.bg}; border:1px solid ${C.line}; border-radius:6px; padding:14px 16px; margin-top:12px; line-height:1.6; overflow-x:auto; }
.hint { font-size:11.5px; color:${C.faint}; margin-top:8px; line-height:1.5; }
.primary { font-family:${MONO}; font-size:12px; font-weight:700; letter-spacing:1px; padding:11px 20px; background:${C.amber}; color:#000; border:none; border-radius:5px; cursor:pointer; margin-top:16px; display:block; }
.primary:hover { background:#ffc954; }
.setup { background:${C.panel}; border:1px solid ${C.line}; border-radius:8px; padding:22px; display:flex; flex-direction:column; gap:20px; }
.field { } 
.hud { display:flex; align-items:center; gap:14px; padding:10px 0; }
.progbar { flex:1; height:4px; background:${C.line}; border-radius:3px; overflow:hidden; }
.progbar > div { height:100%; background:${C.amber}; transition:width .3s; }
.statgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
.statcard { background:${C.panel}; border:1px solid ${C.line}; border-radius:8px; padding:16px; }
.panelbox { background:${C.panel}; border:1px solid ${C.line}; border-radius:8px; padding:18px; margin-top:14px; }
.paneltitle { font-family:${MONO}; font-size:11px; letter-spacing:1px; color:${C.dim}; margin-bottom:14px; font-weight:700; }
.dombar { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.dbartrack { flex:1; height:10px; background:${C.bg}; border:1px solid ${C.line}; border-radius:5px; overflow:hidden; }
.dbartrack > div { height:100%; transition:width .4s; }
.spark { display:flex; align-items:flex-end; gap:4px; height:80px; }
.sparkcol { flex:1; display:flex; align-items:flex-end; height:100%; background:${C.bg}; border-radius:2px; }
.sparkcol > div { width:100%; border-radius:2px 2px 0 0; min-height:2px; }
.weaklist { } 
.wrow { display:flex; align-items:center; gap:12px; padding:10px 8px; border-bottom:1px solid ${C.line}; }
.wrow:hover { background:${C.panel2}; }
.missbar { width:80px; height:6px; background:${C.bg}; border:1px solid ${C.line}; border-radius:4px; overflow:hidden; }
.missbar > div { height:100%; background:${C.blank}; }
.vrow { background:${C.panel}; border:1px solid ${C.line}; border-radius:6px; padding:14px; margin-bottom:10px; }
.datata { width:100%; margin-top:10px; font-family:${MONO}; font-size:11px; line-height:1.5; color:${C.ink}; background:${C.bg}; border:1px solid ${C.line}; border-radius:6px; padding:10px 12px; resize:vertical; }
.datata:focus { outline:none; border-color:${C.amber}; }
@media (max-width:640px){ .srow{ grid-template-columns:1fr; } .prompt{ font-size:18px; } }
`;

</script>
</body>
</html>
