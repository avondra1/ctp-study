rred, and other income and expenses, including foreign exchange gains and losses, interest income and expenses, and other nonoperating income and expenses over an accounting period. Also called a statement of earnings, a statement of operations, or a profit and loss (P&L) statement."},{"id":"i_a8ee36e44425","t":"d","term":"Incoterms","ch":10,"d":1,"hy":false,"body":"Terms developed by the International Chamber of Commerce that state which party (buyer or seller) is responsible for transporting goods, insuring goods, and arranging export clearance; they also define the point at which the seller assumes title of the goods."},{"id":"i_a57a1cd7dc6c","t":"d","term":"incumbency certificate","ch":7,"d":3,"hy":false,"body":"A document (signed by an enterprise’s corporate secretary) confirming the authority of a corporate officer to perform certain actions on behalf of the enterprise."},{"id":"i_0bcfed30e05f","t":"d","term":"indebtedness/debt ratio","ch":9,"d":2,"hy":false,"body":"A ratio used to measure the level of indebtedness or use of leverage (i.e., debt usage) by a company."},{"id":"i_31845586b48c","t":"d","term":"independent auditor","ch":8,"d":1,"hy":false,"body":"An external auditor with a certified public accounting designation that qualifies them to provide an audit report. May also be used to refer to a public accounting firm that employs qualified external auditors."},{"id":"i_cad45bd33e35","t":"d","term":"independent director","ch":1,"d":1,"hy":true,"body":"Under New York Stock Exchange standards, this is a member of the board of directors who has no material relationship with the listed company, either directly or as a partner, shareholder, or officer of the organization."},{"id":"i_065e00ccb7bc","t":"d","term":"index bond","ch":6,"d":2,"hy":true,"body":"A type of bond that has interest rates tied to an economic index. Index bonds are often used when a high level of price inflation is present or anticipated."},{"id":"i_6f04713b98f2","t":"d","term":"indirect method forecast","ch":14,"d":1,"hy":false,"body":"A top-down forecasting technique based on financial statements."},{"id":"i_6535772f3970","t":"d","term":"indirect purchases","ch":10,"d":1,"hy":true,"body":"Purchases of stores and supplies inventories, which are not used directly in a manufacturing/production process. Rather, they support the production process."},{"id":"i_3671e0b6980b","t":"d","term":"industrial bank/industrial loan company","ch":3,"d":3,"hy":false,"body":"A financial institution with a limited scope of services. Industrial banks sell certificates called investment shares and can also accept customer deposits. They then lend the deposits out via installment loans to consumers and small businesses. Industrial banks accept deposits but do not offer checking accounts. Because of their limited services, they do not fall under general banking regulatory authority, are locally chartered, and may be owned by nonbank holding companies."},{"id":"i_2b329df2cecc","t":"d","term":"inflation premium","ch":13,"d":1,"hy":true,"body":"An adjustment to the base interest rate to account for projected inflation over the investment period."},{"id":"i_bb1a15a04cb6","t":"d","term":"informal bankruptcy","ch":2,"d":4,"hy":false,"body":"A form of bankruptcy handled outside the bankruptcy courts. In bankruptcy proceedings, it is possible to perform a reorganization or a liquidation informally. An informal reorganization typically involves a firm that is fundamentally sound but is undergoing temporary financial difficulties. This is often done outside of bankruptcy in an agreed-upon write-off of some portion of the firm’s debts by its creditors."},{"id":"i_4ed327bb80c4","t":"d","term":"information float","ch":10,"d":1,"hy":false,"body":"The time between receiving good funds and the time the organization knows that it has the funds available and can actually make use of those funds. For a company receiving payments on accounts receivable, there may also be delays between the receipt of the payment and the posting of that payment to a customer’s account. If the customer is close to its credit limit, this could, in turn, delay the ability of the company to sell more goods or services to that customer."},{"id":"i_de3bbafa3671","t":"d","term":"in-house banking","ch":10,"d":1,"hy":true,"body":"The practice of having treasury or a stand-alone legal entity become the main provider of banking services for all the company’s operating entities."},{"id":"i_9035625f669d","t":"d","term":"initial public offering (IPO)","ch":6,"d":2,"hy":false,"body":"The first sale of stock by a private company to the public. IPOs are often issued by smaller, younger companies seeking the capital to expand, but can also be conducted by large privately owned companies looking to become publicly traded."},{"id":"i_8dd4146647ca","t":"d","term":"in-sample validation","ch":14,"d":1,"hy":false,"body":"In the selection and validation of a forecasting model, this process tests a forecast for accuracy using the historical data used to develop it. If the forecast accurately predicts one data series from one or more other series, the relationships among the data series are deemed to be validated. When a forecast is initially developed, however, there typically is no other data available to test it."},{"id":"i_698f2e3aa977","t":"d","term":"insolvency","ch":2,"d":4,"hy":true,"body":"The inability to pay one’s debts in a timely manner. The terms bankruptcy and insolvency are often used interchangeably, but in some jurisdictions, such as the United Kingdom, bankruptcy refers only to personal insolvency while the general term insolvency applies to both corporate and personal insolvency."},{"id":"i_a30b13f771cc","t":"d","term":"installment credit","ch":10,"d":1,"hy":true,"body":"A form of credit extension that requires a customer to make equal periodic payments, each of which contains principal and interest components."},{"id":"i_c50b02b2c98f","t":"d","term":"instant/real-time payments","ch":15,"d":5,"hy":false,"body":"Irrevocable payments, available 24/7/ , that are cleared and settled within seconds."},{"id":"i_95de2af8bfbc","t":"d","term":"insurance company","ch":3,"d":3,"hy":true,"body":"A type of nonbank financial institution that sells insurance products. From a corporate perspective, insurance companies are primarily long-term lenders to companies. They are significant investors in real estate, particularly commercial real estate (e.g., shopping centers), as well as long-term bonds. Insurance companies now compete with banks for short- and medium-term loans. They provide mortgage funding, leasing services, guaranteed investment contracts (similar to bank certificates of deposit, generally paying interest for one to five years), and universal life insurance policies with long-term savings features."},{"id":"i_2d02c36b0155","t":"d","term":"insurance risk management","ch":16,"d":4,"hy":true,"body":"A risk management technique in which financial protection (or reimbursement) for possible losses is purchased from another party in the form of insurance. It is essentially a method of transferring risk from one party to another."},{"id":"i_6d4938cbb469","t":"d","term":"intangible assets","ch":8,"d":1,"hy":true,"body":"Assets that lack physical substance and for which there is often a high degree of uncertainty concerning their future value. Examples are goodwill, trademarks, and patents. An intangible asset with a finite and useful life is amortized over its legal or useful life, but if the intangible asset has an indefinite useful life, it is not amortized. However, it must be evaluated annually for any decline in value, which must be charged against income when identified."},{"id":"i_0d9f7a27ca90","t":"d","term":"integrated ratio analysis","ch":9,"d":2,"hy":false,"body":"The practice of looking at various financial ratios in pairs or groups to gain better insight into a company’s financial performance."},{"id":"i_9840749a8d38","t":"d","term":"integrated receivables","ch":12,"d":1,"hy":false,"body":"See consolidated remittance processing."},{"id":"i_abcea46db5a3","t":"d","term":"integrated/comprehensive accounts payable (A/P) service","ch":12,"d":1,"hy":false,"body":"A function in which a financial service provider provides outsourced disbursement services to a company based on transmission of payment information. The service allows a company to make multiple types of payments (e.g., check, electronic funds transfer, or card) through one channel."},{"id":"i_06eff510132b","t":"d","term":"integration","ch":7,"d":3,"hy":false,"body":"The third stage of money laundering, this is the creation of what appears to be a legitimate explanation for the source of funds (e.g., showing that funds were donated for a charitable purpose)."},{"id":"i_b9b4d1f1383d","t":"d","term":"integrity","ch":15,"d":5,"hy":false,"body":"In data security, this is the ability to ensure that a message was not modified in transit and that stored data has not been improperly modified or deleted. Data integrity is especially important for financial transactions."},{"id":"i_d42e3dbf75ed","t":"d","term":"interchange fees","ch":4,"d":1,"hy":true,"body":"Fees established by the payment card brands that go directly to the issuing bank to cover its costs in issuing cards and in processing card transactions. These fees typically account for the largest portion of overall card fees and represent a fee that is paid to the issuing bank for each transaction."},{"id":"i_a3d68683437d","t":"d","term":"intercompany dividend","ch":20,"d":2,"hy":true,"body":"A type of dividend on intragroup shareholdings. It is often used in large companies with wholly owned subsidiaries to transfer profits from subsidiaries back to the parent company."},{"id":"i_39c805bee65a","t":"d","term":"intercompany loan","ch":13,"d":1,"hy":true,"body":"An arrangement whereby separate subsidiaries of the same group of companies borrow and lend funds among themselves through an in-house bank or other internal borrowing mechanism."},{"id":"i_0392545a2f58","t":"d","term":"interest rate forward","ch":17,"d":4,"hy":false,"body":"See forward rate agreement."},{"id":"i_e0a3e883655f","t":"d","term":"interest rate option","ch":17,"d":4,"hy":true,"body":"An option-type derivative where the payoff depends on the level of interest rates on the exercise date compared to the predetermined strike price."},{"id":"i_9af934ab43af","t":"d","term":"interest rate risk","ch":16,"d":4,"hy":true,"body":"A type of risk that relates to changes in investment values and borrowing costs, and therefore potentially in overall firm value, as interest rates change."},{"id":"i_0ae801aae5f4","t":"d","term":"intermediate-term note","ch":6,"d":2,"hy":true,"body":"A note with a maturity of two to ten years. In most cases, interest is paid at periodic intervals (e.g., semiannually), and the notes are similar to long-term bonds except for the shorter maturity."},{"id":"i_90701915b4dd","t":"d","term":"internal controls","ch":18,"d":4,"hy":true,"body":"Measures taken by an organization to provide reasonable assurance regarding achievement of the organization’s objectives related to operational effectiveness and efficiency, reliable financial reporting, and compliance with laws, regulations, and policies."},{"id":"i_ebcf46f65e71","t":"d","term":"internal factoring","ch":10,"d":1,"hy":false,"body":"The practice of a company’s internal factoring unit buying accounts receivable from the exporting unit and collecting funds from the importing unit."},{"id":"i_572207e933ab","t":"d","term":"internal rate of return (IRR)","ch":9,"d":2,"hy":false,"body":"The discount rate that makes the net present value equal to zero or, equivalently, makes the present value (PV) of cash inflows equal to the PV of cash outflows."},{"id":"i_90370b280f8d","t":"d","term":"International Accounting Standards Board (IASB)","ch":2,"d":4,"hy":false,"body":"An international standards-setting body that determines accounting standards at the global level through a set of pronouncements called the International Financial Reporting Standards."},{"id":"i_f6f9aca47687","t":"d","term":"International Bank Account Number (IBAN)","ch":7,"d":3,"hy":false,"body":"An international standard for identifying bank accounts across national borders."},{"id":"i_d7436b923f73","t":"d","term":"International Financial Reporting Standards (IFRS)","ch":2,"d":4,"hy":true,"body":"A set of international accounting standards stating how particular types of transactions and other events should be reported in financial statements. IFRS are issued by the International Accounting Standards Board."},{"id":"i_2ba73d564f88","t":"d","term":"International Organization for Standardization (ISO)","ch":7,"d":3,"hy":false,"body":"The world’s largest developer of voluntary international standards for a variety of products and services, including financial reporting and payments."},{"id":"i_75c29d40ed96","t":"d","term":"International Organization for Standardization (ISO) 20022","ch":15,"d":5,"hy":false,"body":"An XML-based global messaging standard for the financial services industry, whose intended use is transmitting information related to securities, payments, card payment transactions, international trade, and foreign exchange transactions."},{"id":"i_9a8924e7a3f4","t":"d","term":"International Organization for Standardization (ISO) 31000","ch":16,"d":4,"hy":false,"body":"An internationally recognized standard for risk management."},{"id":"i_fdbd456c16ce","t":"d","term":"International Standard on Assurance Engagements (ISAE) 3402","ch":7,"d":3,"hy":false,"body":"A global assurance standard for reporting on controls at service organizations."},{"id":"i_0e37a585411e","t":"d","term":"International Standby Practices","ch":12,"d":1,"hy":false,"body":"ISP98: An International Chamber of Commerce (ICC) publication that deals with international standby practices and governs the administration of standby letters of credit. The current version is International Standby Practices: ISP98."},{"id":"i_beb5056f05ba","t":"d","term":"International Swaps and Derivatives Association (ISDA)","ch":2,"d":4,"hy":false,"body":"A trade organization made up of companies, dealers, and service providers that participate in the market for over-the-counter derivative instruments."},{"id":"i_5c70a0ba0b5d","t":"d","term":"intraday overdraft","ch":4,"d":1,"hy":false,"body":"See daylight overdraft."},{"id":"i_02c9f01503a1","t":"d","term":"inventory period","ch":10,"d":1,"hy":false,"body":"The days from the purchase of raw materials until the sale of finished goods. This can be the average days for a company’s products as a whole (see days inventory) or the actual days for a particular product. Also known as the inventory conversion period."},{"id":"i_71aefa51ee96","t":"d","term":"investment bank","ch":3,"d":3,"hy":true,"body":"A financial intermediary that performs a variety of services, such as: (1) securities underwriting, by acting as an intermediary between an issuer of securities and the investing public; (2) providing custodial services; (3) facilitating mergers, acquisitions, divestitures, and other corporate reorganizations; and (4) acting as a broker/financial advisor for institutional clients."},{"id":"i_99203d25020e","t":"d","term":"investment banker","ch":6,"d":2,"hy":false,"body":"A professional who is responsible for assisting issuers in the design and placement of securities issuances."},{"id":"i_4ccdecec3b48","t":"d","term":"investment horizon","ch":13,"d":1,"hy":false,"body":"The total length of time that an investment will be held before the investment matures or is sold. Sometimes known as an exposure horizon."},{"id":"i_409dedf7faf8","t":"d","term":"invoice discounting","ch":10,"d":1,"hy":true,"body":"An accounts receivable (A/R) financing process that involves the sale of invoices to a discounter. Invoice discounting is undisclosed, and the seller retains control of A/R management."},{"id":"i_826dd3a29a9b","t":"d","term":"invoicing float","ch":10,"d":1,"hy":true,"body":"The time interval or delay between the day that a customer places an order and the day that the customer actually receives an invoice for that order that can be processed for payment."},{"id":"i_11bf6ddc28eb","t":"d","term":"issuer credit rating","ch":13,"d":1,"hy":false,"body":"A credit rating that represents a rating agency’s opinion on the obligor’s (issuer’s) overall capacity to meet its financial obligations."},{"id":"i_591d85afb3e8","t":"d","term":"issue-specific credit rating","ch":13,"d":1,"hy":false,"body":"A credit rating of a specific long- or short-term security that considers the attributes of the issuer, as well as the specific terms of the issue, the quality of the collateral, and the creditworthiness of the guarantors."},{"id":"i_e1a49b376988","t":"d","term":"issuing and paying agent","ch":13,"d":1,"hy":false,"body":"A financial institution intermediary that, as issuing agent, distributes securities to investors and, as paying agent, collects interest and principal payments from borrowers and distributes them to investors."},{"id":"i_dcb1e6e9a532","t":"d","term":"issuing bank","ch":12,"d":1,"hy":true,"body":"In a letter of credit (L/C) transaction, this is the buyer’s (importer’s) bank that issues the L/C in favor of the seller (exporter)."},{"id":"i_069a24d4e225","t":"d","term":"just-in-time (JIT) inventory","ch":10,"d":1,"hy":false,"body":"An inventory management approach that attempts to minimize inventory levels by reducing the costs or uncertainties that underlie the motives for holding inventory."},{"id":"i_d09a5d211455","t":"d","term":"know your customer (KYC)","ch":7,"d":3,"hy":false,"body":"The due diligence procedures that a financial institution must follow to determine or verify the identity of its customers. KYC is considered a key part of antimoney laundering compliance activities."},{"id":"i_9f6bc596ead6","t":"d","term":"lagging","ch":10,"d":1,"hy":true,"body":"The executing of payments between subsidiaries after the scheduled payment date."},{"id":"i_52438e68a549","t":"d","term":"layering","ch":7,"d":3,"hy":true,"body":"The attempt to conceal the source of ownership of money by creating a complex series of transactions (i.e., layers) in order to provide anonymity. Used in relation to money laundering."},{"id":"i_a94c6d682b34","t":"d","term":"lead bank/institution","ch":6,"d":2,"hy":false,"body":"The financial institution that is responsible for managing a syndicated loan or securities sale that is funded by multiple financial institutions. The lead bank/institution assumes most of the management functions and receives most of the fees from the sale."},{"id":"i_b462c7de40aa","t":"d","term":"leading","ch":10,"d":1,"hy":true,"body":"The executing of payments between subsidiaries before the scheduled payment date."},{"id":"i_02c252881fd0","t":"d","term":"lead-left bank","ch":6,"d":2,"hy":false,"body":"The investment bank acting as the lead underwriter in an initial public offering (IPO) or other securities issue. See lead-right bank."},{"id":"i_d1678ca9b3db","t":"d","term":"lead-right bank","ch":6,"d":2,"hy":false,"body":"An investment bank acting as a co-leader in an initial public offering (IPO) or other securities issue, usually secondary to the lead-left bank."},{"id":"i_452ae818d246","t":"d","term":"ledger balance","ch":4,"d":1,"hy":true,"body":"A bank balance that reflects all entries to a bank account, regardless of whether the deposited items have been collected and are available for withdrawal."},{"id":"i_9d24aab30fa7","t":"d","term":"ledger cutoff","ch":4,"d":1,"hy":true,"body":"The time of day when a bank deposit must be received in order to be posted to the ledger balance of the depositor’s account."},{"id":"i_f9c2f6786ec2","t":"d","term":"Legal Entity Identifier (LEI)","ch":7,"d":3,"hy":false,"body":"A data standard that identifies participants in financial transactions."},{"id":"i_551e7c5863b0","t":"d","term":"legal risk","ch":16,"d":4,"hy":true,"body":"A type of operational risk that relates to legal actions against a company. A significant source of external operational risk is potential lawsuits or other legal actions instigated by customers, trade partners, or governmental agencies and regulators."},{"id":"i_8ddf7c72e8bf","t":"d","term":"less predictable cash flow","ch":14,"d":1,"hy":false,"body":"In the cash flow forecasting process, this is a cash flow component that is difficult to forecast. Examples of these types of cash flows would be those related to sales of a new product, unexpected repairs, or pending settlement of insurance claims."},{"id":"i_e9d5b4f6127c","t":"d","term":"letter of credit (L/C)","ch":12,"d":1,"hy":false,"body":"A promise by the issuing bank to pay a certain amount under specific circumstances. A commercial L/C (see definition earlier in glossary) is related to a business transaction, while a standby letter of credit (see definition later in the glossary) is typically used as a guarantee."},{"id":"i_1ceb6d313b98","t":"d","term":"leveraged buyout (LBO)","ch":20,"d":2,"hy":false,"body":"A type of acquisition that is financed using a significant proportion of debt, with the primary form of collateral being the acquired firm’s assets."},{"id":"i_abb030978e42","t":"d","term":"liability insurance","ch":16,"d":4,"hy":true,"body":"Any type of insurance policy that protects against damage to other parties that can arise from product defects; business practices; accidents; actions of the organization’s employees, officers, or board of directors; and general negligence in the operation of the organization. Liability insurance typically includes defense costs in the event of litigation."},{"id":"i_80bf0c8d3c58","t":"d","term":"lien","ch":6,"d":2,"hy":true,"body":"A legal claim on an asset or assets. With many types of secured lending, the lender has a lien or legal claim on the assets used as collateral in the event it cannot take physical possession of the assets."},{"id":"i_cf70f9f10373","t":"d","term":"line of credit","ch":13,"d":1,"hy":false,"body":"An agreement in which the lender gives the borrower access to funds up to a maximum amount over a specific period of time. A line of credit may be committed or uncommitted, and secured or unsecured, depending on the negotiations between the lender and borrower. They are usually revolving, meaning the borrower may borrow, repay, and borrow funds again up to the established limit during the period covered by the agreement."},{"id":"i_c2ba30f1529a","t":"d","term":"liquidating dividend","ch":20,"d":2,"hy":true,"body":"A dividend that is paid out of capital rather than earnings. This sometimes occurs when a company or one of its divisions is going out of business and management decides to pay off shareholders through a liquidating dividend. As the name implies, the company liquidates the remaining assets (capital) of the failed company or division to pay the dividend. This approach may also be used by the acquiring company in a leveraged buyout to liquidate the acquired company in order to meet debt service requirements."},{"id":"i_543bd676ae8f","t":"d","term":"liquidity","ch":1,"d":1,"hy":true,"body":"The quantity of a company’s assets that can be quickly converted into cash without a significant risk of loss of value."},{"id":"i_474be91e686b","t":"d","term":"liquidity management flows","ch":10,"d":1,"hy":false,"body":"Cash flows that are employed to use an organization’s liquidity reserves in the most effective manner. If there is a surplus of funds, treasury will need to place them in suitable investments in the short term. Alternatively, if there is a shortage of funds, then treasury may either (1) sell off investments or (2) draw on available debt sources (e.g., credit lines or commercial paper issuance)."},{"id":"i_a87ed255f8cf","t":"d","term":"liquidity premium","ch":13,"d":1,"hy":false,"body":"An adjustment to the base interest rate to account for the lack of liquidity on an investment."},{"id":"i_b9cdecc7c70e","t":"d","term":"liquidity risk","ch":5,"d":1,"hy":false,"body":"A type of risk that is typically divided into two areas: funding liquidity risk and asset liquidity risk. Funding liquidity risk relates primarily to an organization’s ability to raise necessary cash to meet its obligations as they come due. It is often linked to the ability to raise capital (both short- and long-term) in a timely manner, and it typically is managed by holding marketable securities or open (i.e., available) lines of credit. See also asset liquidity risk."},{"id":"i_eacb54622ea1","t":"d","term":"liquidity/working capital ratio","ch":9,"d":2,"hy":false,"body":"A type of ratio that measures a firm’s ability to meet its payment obligations on short-term debt and helps ascertain whether cash is being used effectively."},{"id":"i_8144cc6b76d8","t":"d","term":"loan covenant","ch":13,"d":1,"hy":true,"body":"A requirement included in a loan agreement that serves to protect the lender. Loan covenants impose either restrictions (known as restrictive or negative covenants) and/ or obligations (known as affirmative or positive covenants) on the part of an organization’s management. They typically have a significant impact on an organization’s financial decision making."},{"id":"i_010d36cc47b5","t":"d","term":"loan participation","ch":13,"d":1,"hy":false,"body":"A type of lending arrangement in which a financial institution purchases an interest in another lender’s credit facility. The purchaser is called a participant, and the seller is the lead institution. The participant does not have a separate note and has only an indirect relationship with the borrower."},{"id":"i_07bf71bb9974","t":"d","term":"loan sales","ch":3,"d":3,"hy":false,"body":"An offering of commercial banks that involves the structuring of lending facilities so that short-term loans can be sold to other banks and investors."},{"id":"i_4ae870c58a82","t":"d","term":"loan syndication","ch":13,"d":1,"hy":true,"body":"A type of lending arrangement in which multiple financial institutions share the funding of a single credit facility. The syndicate, or group of lenders, is led by an agent who acts as the intermediary between the company and the syndicate to negotiate credit terms and documentation, make advances and collect payments on the loan, and disseminate information."},{"id":"i_53bb82683da7","t":"d","term":"lockbox system","ch":12,"d":1,"hy":true,"body":"A collection tool in which a financial institution or third-party vendor receives mailed payments (typically checks, but also payment card details) at specified post office box (lockbox) addresses, processes the remittances, and credits the payments into a payee’s account."},{"id":"i_35d2fefab011","t":"d","term":"London Interbank Offered Rate (LIBOR)","ch":13,"d":1,"hy":false,"body":"Historically, a widely used market reference rate. Replaced by market interest rates including ESTER, SOFR, and SONIA."},{"id":"i_cf604daecb4f","t":"d","term":"long-term bond","ch":6,"d":2,"hy":true,"body":"A bond with a maturity of greater than 10 years."},{"id":"i_183b9711a267","t":"d","term":"long-term debt to capital ratio","ch":9,"d":2,"hy":true,"body":"A type of debt management ratio that measures the percentage of a company’s capital (where capital is defined as the sum of long-term debt and equity) that is provided by long-term debt. It is computed as long-term debt divided by long-term debt plus equity."},{"id":"i_fef35fa72bf6","t":"d","term":"long-term forecasting","ch":14,"d":1,"hy":false,"body":"A type of cash forecasting in which the forecast covers any period beyond one year. It takes into consideration projections of long-term sales and expenditures, as well as market factors."},{"id":"i_ff6c02e25295","t":"d","term":"long-term investment","ch":19,"d":2,"hy":true,"body":"Any investment with a term greater than one year. See capital investment."},{"id":"i_98abf8645913","t":"d","term":"low-value transfer system","ch":4,"d":1,"hy":false,"body":"An electronic network for the exchange of instructions for lowervalue payments among financial institutions, typically on behalf of consumers. Examples include Automated Clearing House (ACH) in the US, Bacs in the United Kingdom, and Electronic Clearing (ECG) in Hong Kong, as well as STEP2 in the Single Euro Payments Area (SEPA)."},{"id":"i_31d03f8441e6","t":"d","term":"Lynx","ch":4,"d":1,"hy":false,"body":"The Canadian real-time gross settlement system."},{"id":"i_e3c88ec3795e","t":"d","term":"Macaulay duration","ch":19,"d":2,"hy":false,"body":"A measure of a bond’s price sensitivity to interest rate changes that is calculated as the bond’s weighted average time to maturity. It represents the time before a bond investor is repaid by the bond’s total cash flows."},{"id":"i_dad3b4d79fbb","t":"d","term":"machine learning","ch":15,"d":5,"hy":true,"body":"A branch of artificial intelligence (AI) in which technology learns how to identify patterns in data. It can be used to analyze data to identify trends or patterns, via the use of algorithms."},{"id":"i_a82b3ecbec79","t":"d","term":"magnetic ink character recognition (MICR)","ch":4,"d":1,"hy":false,"body":"A data capture process that translates the machine-readable information on a check into a digital data entry. See also MICR line."},{"id":"i_69631890825c","t":"d","term":"mail float","ch":10,"d":1,"hy":true,"body":"The time interval or delay between the day a payment (and any related remittance information) is mailed and the day it is received by a payee or at a payee’s processing site."},{"id":"i_00de3ec6e161","t":"d","term":"maker","ch":4,"d":1,"hy":false,"body":"The entity that creates a check or other negotiable instrument. Also referred to as a payor or drawer."},{"id":"i_0522f055aef9","t":"d","term":"margin call","ch":5,"d":1,"hy":false,"body":"A demand for a borrower to post additional security. This is typically made by a broker holding an asset as security against the borrower’s credit risk, following a fall in the value of the held asset below a pre-agreed level."},{"id":"i_a46c473a2604","t":"d","term":"mark to market","ch":5,"d":1,"hy":true,"body":"The accounting act of recording the price or value of a security, portfolio, or account to reflect its current market value rather than its book value."},{"id":"i_d16de2d0bbd9","t":"d","term":"market risk","ch":16,"d":4,"hy":true,"body":"A type of risk that involves the possibility that fluctuations in financial market prices and rates will reduce the value of a security or a portfolio. It is usually divided into general risk (i.e., risk related to overall market rates and conditions) and firm-specific risk (i.e., risk related solely to an individual firm)."},{"id":"i_ba38071f084e","t":"d","term":"market value per share","ch":6,"d":2,"hy":false,"body":"The current price at which a share of stock is traded. Though this is not technically part of the accounting statements, it is often included in reports issued by a company and financial reporting services."},{"id":"i_ff8c4c79548e","t":"d","term":"marketability","ch":5,"d":1,"hy":true,"body":"A measure of the ability of a security to be bought and sold. Along with maturity, it is one of the primary determinants of liquidity. The existence of an active secondary market ensures that short-term securities suitable for liquidity management purposes are readily marketable."},{"id":"i_adf9879e9420","t":"d","term":"Markets in Financial Instruments Directive (MiFID) II","ch":2,"d":4,"hy":false,"body":"An EU regulation covering transaction reporting requirements, which also requires financial institutions to charge for research and transaction processing separately."},{"id":"i_2ac0a40db188","t":"d","term":"master budget","ch":9,"d":2,"hy":true,"body":"An annual budget for an entire organization. The master budget has two chief components: (1) the operating budget or profit plan and (2) the financial budget."},{"id":"i_5ed085decdb9","t":"d","term":"matching","ch":10,"d":1,"hy":true,"body":"An internal control method that involves the matching of an invoice to the original purchase order to help confirm that the order was placed and that the invoice complies with the agreed terms. A further match against receiving records ensures the order was fulfilled."},{"id":"i_745676d5662b","t":"d","term":"material adverse change (MAC) clause","ch":6,"d":2,"hy":false,"body":"A clause in a loan agreement that allows a lender to refuse funding or declare a borrower to be in default, even if all agreements are in full compliance, if the lender believes a material adverse change has occurred in the borrower’s condition."},{"id":"i_f2e8010d4705","t":"d","term":"materiality","ch":8,"d":1,"hy":true,"body":"An accounting concept that involves determining the significance of the impact of information on the financial position of the entity being reported. In most accounting applications, there is usually a significant degree of judgment involved in the preparation of the accounts. Where decisions are required about the appropriateness of a particular accounting judgment, the materiality convention suggests that this should only be an issue if the judgment is significant or material to the presentation of the accounts. The concept of materiality is therefore an important issue for auditors of financial accounts."},{"id":"i_4e94f5a6eb44","t":"d","term":"maturity matching","ch":6,"d":2,"hy":true,"body":"A practice that involves (1) matching the life of a debt issue to the life of the specific assets financed or (2) matching the maturity of an investment to the future need for funds."},{"id":"i_2588430ee6e0","t":"d","term":"maturity premium","ch":13,"d":1,"hy":true,"body":"An adjustment to the base interest rate of a longer-term security to account for the increased price risk created by the longer maturity."},{"id":"i_878a0d08e137","t":"d","term":"maturity-matching financing strategy","ch":10,"d":1,"hy":true,"body":"A current asset financing strategy that involves using long-term financing (i.e., debt and equity) to finance permanent current assets and fixed assets. Short-term financing is used to finance fluctuating current assets."},{"id":"i_d9ac43282418","t":"d","term":"medium-term forecasting","ch":14,"d":1,"hy":false,"body":"A type of cash flow forecasting in which the forecasts are generally for periods of three to twelve months. These forecasts are an integral part of cash budgeting. They project the sources and uses of funds on a daily, monthly, or quarterly basis. They are used to determine the necessary size of a company’s credit facility to meet its working capital needs or the availability of excess cash for short-term investing. They also serve as a benchmark for performance by facilitating the comparison of actual cash flows to projected cash flows based on the cash budget."},{"id":"i_879fba617c99","t":"d","term":"merchant acquirer","ch":4,"d":1,"hy":true,"body":"The financial institution that processes and settles payment card transactions on behalf of a merchant."},{"id":"i_5db19965ade7","t":"d","term":"merchant discount","ch":4,"d":1,"hy":true,"body":"A type of bundled merchant card processing fee in which the merchant is charged one fee by its card processor that covers all of the cost components of the transaction. The term discount is used because this type of fee is typically subtracted directly from any card settlement."},{"id":"i_d31fcfae70eb","t":"d","term":"merchant services","ch":12,"d":1,"hy":true,"body":"The term typically used to describe the products offered by a bank, internet service provider, or other firm (referred to as a merchant processor) that processes credit and debit card transactions. While the term principally refers to the acceptance and processing of card transactions, it also often includes ancillary services such as returns and adjustments, point-of-sale (POS) terminals, supplies, and customer support."},{"id":"i_d9b58fcc5f1e","t":"d","term":"MICR line","ch":4,"d":1,"hy":true,"body":"The machine-readable information on the bottom of a check. A MICR line is printed using a special font and magnetic ink. MICR is an acronym for magnetic ink character recognition. While initially read using special magnetic scanning equipment, many MICR lines are now processed using optical character recognition (OCR)."},{"id":"i_9460a52bdbeb","t":"d","term":"middleware","ch":10,"d":1,"hy":false,"body":"Computer-based software that links two different applications."},{"id":"i_ab4e4bd13c53","t":"d","term":"mobile banking","ch":15,"d":5,"hy":false,"body":"The provision of banking and financial services through mobile devices, such as smartphones and tablets."},{"id":"i_2e7fba8e00a0","t":"d","term":"mobile payments","ch":15,"d":5,"hy":false,"body":"Electronic payments made using mobile devices, such as smartphones or tablets."},{"id":"i_91f404b09416","t":"d","term":"mobile wallet","ch":4,"d":1,"hy":false,"body":"An emerging payment type that uses smartphones and tablets equipped with near field communication (NFC) chips or a bar code. Examples include Alipay, Google Pay, and Apple Pay."},{"id":"i_2101c7ef281f","t":"d","term":"modified duration","ch":19,"d":2,"hy":false,"body":"A measure of a bond’s price sensitivity to interest rate changes that is calculated by dividing the Macaulay duration by the sum of one plus the yield to maturity. It indicates the change in bond price given a 1% change in the relevant interest rate."},{"id":"i_30ea54cb2fd5","t":"d","term":"Monetary Control Act","ch":2,"d":4,"hy":false,"body":"See Depository Institutions Deregulation and Monetary Control Act of 1980 (DIDMCA)."},{"id":"i_f658eba0194e","t":"d","term":"monetary policy","ch":2,"d":4,"hy":true,"body":"Government policy related to monitoring and controlling a country’s money supply and interest rates."},{"id":"i_19912115ef7d","t":"d","term":"money laundering","ch":2,"d":4,"hy":true,"body":"Any financial transaction that generates an asset or a value as the result of an illegal act, which may involve actions such as tax evasion or false accounting."},{"id":"i_23dc0897b84b","t":"d","term":"money market","ch":5,"d":1,"hy":true,"body":"That part of the global financial market that deals with financial instruments that are easily converted to cash (i.e., highly liquid) and have very short maturities, typically one year or less. In addition, most money market instruments are debt-type securities, which are also known as fixed-income securities."},{"id":"i_a654b8cb2247","t":"d","term":"money market deposit account (MMDA)","ch":7,"d":3,"hy":false,"body":"A type of demand deposit account that pays an unregulated rate of interest determined by individual institutions. Also called a money market demand account."},{"id":"i_1d276f7641a6","t":"d","term":"money market fund (MMF)","ch":5,"d":1,"hy":false,"body":"A commingled pool of money market instruments, typically established and managed by financial institutions, in which fund investors have an ownership interest. The funds may be offered in the domestic currency or, where allowed by local regulators, in a foreign currency."},{"id":"i_f01b0dfff40c","t":"d","term":"money market yield (MMY)","ch":13,"d":1,"hy":false,"body":"A calculation for restating semiannual, quarterly, or monthly discount bond or note yields into an annual yield. In the US, this type of yield is calculated on a -day year basis, while the bond equivalent yield is based on a -day year."},{"id":"i_a8bba59dea47","t":"d","term":"money order","ch":4,"d":1,"hy":true,"body":"A prepaid instrument issued by various third parties such as banks, postal services, or consumer outlets (e.g., convenience stores and check-cashing agencies), where the purchaser is the instrument’s payor and the money order is the obligation of the issuer."},{"id":"i_91951324f577","t":"d","term":"Monte Carlo simulation","ch":16,"d":4,"hy":true,"body":"A type of simulation/analytical technique that uses probability distributions and random numbers to simulate values for various models. This approach uses specialized software to quickly simulate thousands of iterated values, through modeled scenario analysis. The resulting probability distribution is analyzed to infer which values are most likely to occur."},{"id":"i_6148dca13cb6","t":"d","term":"monthly billing","ch":10,"d":1,"hy":false,"body":"A term of sale whereby the seller issues a monthly statement covering all invoices prior to a cutoff date, typically toward the end of each month."},{"id":"i_33dc22b469cc","t":"d","term":"mortgage bond","ch":6,"d":2,"hy":true,"body":"A type of bond used to finance specific assets, such as real estate or manufacturing equipment, that are pledged as security against the issue. Mortgage bonds usually include substantial financial covenants or indenture agreements."},{"id":"i_788503fbae17","t":"d","term":"mortgage-backed security (MBS)","ch":5,"d":1,"hy":false,"body":"A type of asset-backed security that uses pools of mortgages (mainly residential) as the source of cash flows to the investors."},{"id":"i_632f9f77ddfd","t":"d","term":"multicurrency account","ch":10,"d":1,"hy":true,"body":"A special arrangement between a bank (or payment service provider) and a company, in which the bank (or payment service provider) lets the customer receive or make payments in a range of currencies from a single account or multiple subsidiary accounts."},{"id":"i_c0bc5335b046","t":"d","term":"multicurrency bond","ch":6,"d":2,"hy":true,"body":"A type of bond that is usually issued as (1) a currency option bond that allows investors to choose among several predetermined currencies, or (2) a currency cocktail bond that is denominated in a standard basket of several currencies (e.g., special drawing rights)."},{"id":"i_88f84e11bf63","t":"d","term":"multifactor authentication","ch":15,"d":5,"hy":true,"body":"An authentication method for information technology and network purposes requiring the presence of different factors of authentication."},{"id":"i_73e429c35af8","t":"d","term":"multilateral netting system","ch":10,"d":1,"hy":true,"body":"A type of netting system that is similar to a bilateral system but involves more than two subsidiaries. Each subsidiary informs a central treasury management center of all planned intercompany (usually cross-border) payments through an electronic system. Multilateral netting is used primarily for intercompany transactions between subsidiaries."},{"id":"i_21c0c4b60d7c","t":"d","term":"municipal bond (muni)","ch":6,"d":2,"hy":false,"body":"A sub-sovereign bond issued by a municipality, typically in the United States and usually in the form of a general obligation or revenue bond. General obligation bonds are paid from the proceeds of general tax revenues. Alternatively, revenue bonds are linked directly to, and repaid from, the revenues generated from specific public projects or services (e.g., stadiums, toll roads and bridges, or public utilities). Most US municipal bonds are exempt from federal and, in some cases, state and local income taxes."},{"id":"i_1f58938f52f6","t":"d","term":"municipal securities","ch":3,"d":3,"hy":true,"body":"Types of debt (bonds or notes) issued by city, county, or state government entities that generally have some type of income tax exemption for any interest paid on them. Commonly called munis."},{"id":"i_c01cbfcf724c","t":"d","term":"mutual fund","ch":5,"d":1,"hy":true,"body":"A collective investment vehicle in which multiple investors place cash. The cash is then used to acquire assets (e.g., stocks, bonds, government instruments) in the name of the mutual fund. The held assets are known as the mutual fund’s portfolio."},{"id":"i_09bbff1a415b","t":"d","term":"mutual fund company","ch":6,"d":2,"hy":false,"body":"A company that uses cash invested in a mutual fund to acquire a range of assets in the name of the mutual fund. The mutual fund company acts as the asset manager for the fund. A mutual fund company may create various types of funds to meet different investor demands."},{"id":"i_236dc6049348","t":"d","term":"Nacha","ch":4,"d":1,"hy":false,"body":"A trade organization that is responsible for managing the development, administration, and governance of the US automated clearinghouse (ACH) system. Formerly known as the National Automated Clearing House Association."},{"id":"i_4f501925f848","t":"d","term":"National Book-Entry System (NBES)","ch":5,"d":1,"hy":false,"body":"A real-time gross settlement system used for the transfer of US Treasury, government agency, and other securities."},{"id":"i_a10f521b4993","t":"d","term":"National Credit Union Administration (NCUA)","ch":2,"d":4,"hy":false,"body":"An independent US federal agency that charters and supervises federal credit unions. It also operates the National Credit Union Share Insurance Fund (NCUSIF), insuring the savings of account holders in all federal credit unions and almost all state-chartered credit unions."},{"id":"i_6af587115448","t":"d","term":"nationalization","ch":7,"d":3,"hy":true,"body":"A government takeover of a company."},{"id":"i_bc73e3fa0a05","t":"d","term":"nationally recognized statistical rating organization (NRSRO)","ch":13,"d":1,"hy":false,"body":"In the United States, a type of company that assigns credit ratings for issuers of certain types of short- and long-term debt obligations, as well as for the debt instruments themselves. Ratings can be on either a solicited or unsolicited basis. Also known as a credit rating agency."},{"id":"i_296e20d52f6a","t":"d","term":"natural disaster risk","ch":16,"d":4,"hy":false,"body":"A type of event risk related to losses resulting from naturally occurring events, such as storms, floods, or earthquakes. Natural disaster events leave organizations open to possible operational risk. These events could range from a temporary power outage and other disruption caused by a major earthquake or hurricane to a requirement for staff to quarantine as a result of an epidemic."},{"id":"i_9af44cefb72d","t":"d","term":"natural hedging","ch":17,"d":4,"hy":true,"body":"The use of identified correlations to manage financial risk exposures. Also called passive hedging."},{"id":"i_fedc531c22e7","t":"d","term":"near field communication (NFC)","ch":4,"d":1,"hy":false,"body":"A short-range wireless connectivity standard that uses magnetic field induction to enable communication between devices when they are touched together or brought within a few centimeters of each other."},{"id":"i_9c53f3f0c114","t":"d","term":"negotiating bank","ch":12,"d":1,"hy":true,"body":"In a letter of credit (L/C) transaction, this is the bank that examines the documents presented by the beneficiary, receives payment from the issuing bank, and pays the beneficiary."},{"id":"i_69d458f54ad3","t":"d","term":"neobank","ch":3,"d":3,"hy":true,"body":"A financial services firm that provides banking services digitally (i.e., without a physical branch network)."},{"id":"i_381a50620ec6","t":"d","term":"net asset value (NAV)","ch":5,"d":1,"hy":false,"body":"A value that represents the price per share of a mutual fund or an exchange-traded fund. It is generally calculated as the total value of all the securities or assets in the fund (less any liabilities), divided by the number of shares outstanding. For most funds, the NAV will fluctuate as the market values of the securities in the fund portfolio change. The primary exception is a government money market fund, which generally has a fixed NAV equivalent to one unit of the currency of denomination."},{"id":"i_151fb2ca6995","t":"d","term":"net borrower","ch":10,"d":1,"hy":false,"body":"A company with more debt than the value of its invested cash and cash in bank accounts."},{"id":"i_48e38ceee31a","t":"d","term":"net investment hedge","ch":8,"d":1,"hy":true,"body":"A type of hedge designed to hedge currency risk associated with a company’s net investment in a foreign operation."},{"id":"i_334648c67919","t":"d","term":"net investor","ch":10,"d":1,"hy":false,"body":"A company with invested cash and cash in bank accounts of a value in excess of its total outstanding debt."},{"id":"i_4994b7dcb462","t":"d","term":"net present value (NPV)","ch":9,"d":2,"hy":false,"body":"A type of financial analysis, this value is calculated by netting the present value (PV) of anticipated cash inflows with the PV of cash outflows."},{"id":"i_ec87e0c45f0d","t":"d","term":"net profit margin","ch":9,"d":2,"hy":true,"body":"A performance ratio that shows the percentage of profits earned after all expenses and taxes are deducted from revenues. It is defined as net income divided by revenues. Also known as return on sales or return on revenues."},{"id":"i_c1a0f69439e0","t":"d","term":"net settlement","ch":4,"d":1,"hy":false,"body":"A type of settlement in a payment system that occurs when many transactions are combined and then sorted by sending and receiving banks. At day’s end (or at another agreed-upon point in time), the net amount either owed by or owed to each bank is determined and only the net amount of value is actually transferred. At this point, electronic credit transactions are considered to be final."},{"id":"i_9fd0a7c74b41","t":"d","term":"net terms","ch":10,"d":1,"hy":true,"body":"A term of sale whereby the seller specifies a net due date by which the buyer must pay in full."},{"id":"i_4470ca774dd4","t":"d","term":"net working capital (NWC)","ch":11,"d":1,"hy":false,"body":"A working capital metric that is defined as current assets less current liabilities. NWC is not a ratio: it is an absolute measure of the dollar amount by which current assets exceed current liabilities."},{"id":"i_a8776a8adb6a","t":"d","term":"netting","ch":10,"d":1,"hy":true,"body":"A technique in which credits and debits between participating entities are offset against each other, so that only the net balance is transferred between the parties at the end of the cycle. When used internationally, the use of a netting system can reduce the number of intercompany cross-border payments among the firm’s units through the elimination or consolidation of funds denominated in different currencies."},{"id":"i_cea661a22917","t":"d","term":"nonbank financial institution/intermediary","ch":3,"d":3,"hy":false,"body":"A financial services firm that does not accept demand deposits from the general public but may offer a variety of financial services including leasing, factoring, payment services, pension funds, mutual funds, and insurance plans."},{"id":"i_c5a1b360051e","t":"d","term":"noninsurance","ch":16,"d":4,"hy":true,"body":"An approach to risk retention, this technique involves relying on normal revenues to pay for small, normal losses as current expenses. Noninsurance is appropriate for losses that an organization can absorb readily as costs of doing business, but not for highly disruptive, potentially ruinous accidents."},{"id":"i_62f21f7219de","t":"d","term":"non-repetitive (free-form) wire","ch":12,"d":1,"hy":false,"body":"A type of wire transfer where both the debit and credit parties can be changed for each transaction. As a result, additional security measures are typically required. Examples of such measures are callbacks, secondary levels of approval, and segregation of duties."},{"id":"i_75876ff85243","t":"d","term":"non-repudiation","ch":15,"d":5,"hy":true,"body":"The inability of the purported maker or originator of a statement, document, or payment to challenge the validity of the original item. The term may also be used to refer to the inability of a sender or receiver to deny having sent or received the item."},{"id":"i_0b93422bf360","t":"d","term":"nonresident account","ch":7,"d":3,"hy":true,"body":"An account with a global financial institution that is owned by a nonresident of the country in which the global financial institution is chartered."},{"id":"i_be7c5f53afab","t":"d","term":"notional pooling","ch":12,"d":1,"hy":true,"body":"A type of cash concentration that does not require the physical movement of cash. Instead pooling is accomplished by making balancing entries on a set of mirror accounts with no changes to the bank accounts held by company entities. The bank managing the notional pool provides an interest statement that reflects the net offset."},{"id":"i_7677f59469c3","t":"d","term":"notional principal","ch":17,"d":4,"hy":true,"body":"The base amount of a financial transaction, used to calculate interest payments. The notional principal is never actually exchanged, but is only used for calculation purposes, hence the term notional. In an interest rate swap, the notional principal is the dollar amount used to calculate the interest rate payments that are exchanged as part of the transaction."},{"id":"i_9e10e42da632","t":"d","term":"off-balance-sheet arrangement","ch":8,"d":1,"hy":false,"body":"A US Securities and Exchange Commission (SEC) term used to refer to any transaction, agreement, or other contractual arrangement that obligates the reporting company but does not appear on the balance sheet. It is intended to include offbalance-sheet arrangements for which a company may have contingent liabilities or obligations that are not readily apparent to an investor. These arrangements must be disclosed in the management’s discussion and analysis (MD&A) portion of financial statements."},{"id":"i_644d27e9123c","t":"d","term":"off-balance-sheet financing","ch":6,"d":2,"hy":true,"body":"A type of arrangement designed to provide financing that does not appear on the borrowing company’s balance sheet. Examples of off-balance-sheet financing include joint ventures, research and development partnerships, sales of receivables (i.e., factoring), and some operating leases."},{"id":"i_ed428e249bf1","t":"d","term":"Office of Foreign Assets Control (OFAC)","ch":2,"d":4,"hy":true,"body":"An office of the US Department of the Treasury that administers and enforces economic and trade sanctions. OFAC can impose controls on financial transactions and freeze foreign assets under US jurisdiction."},{"id":"i_6936a8ada425","t":"d","term":"Office of the Comptroller of the Currency (OCC)","ch":2,"d":4,"hy":true,"body":"A bureau of the US Treasury Department that was established by Congress in 1863 to regulate the national banking system. It is the primary chartering authority and regulator for national banks."},{"id":"i_15f29083eaf4","t":"d","term":"official bank check","ch":4,"d":1,"hy":false,"body":"A type of check that is issued by a bank and draws on the bank’s own funds. Also known as a cashier’s check."},{"id":"i_50156aa8546c","t":"d","term":"ongoing validation","ch":14,"d":1,"hy":true,"body":"In the selection and validation of a forecasting model, this process involves using continuing feedback from comparisons of projected versus actual values and allows continuous evaluation and improvement of the forecast."},{"id":"i_11da6bdff819","t":"d","term":"on-us check clearing","ch":4,"d":1,"hy":true,"body":"A type of check-clearing process that involves a single bank and occurs when a payee deposits a check in an account at the same bank on which it is drawn."},{"id":"i_dafa4787c370","t":"d","term":"on-we check clearing","ch":4,"d":1,"hy":true,"body":"A type of check-clearing process that occurs when checks are deposited at a financial institution that are drawn on related financial institutions or on financial institutions that share a common check-processing system, thus eliminating the need to clear the checks through another bank."},{"id":"i_ae713b432dcd","t":"d","term":"open account (open book credit)","ch":10,"d":1,"hy":false,"body":"A form of credit extension that is the most common type of commercial trade credit. A seller issues an invoice as formal evidence of the obligation and records the sale as an account receivable. The buyer is billed for each transaction by an invoice and/or monthly statement. Full payment of invoiced amounts is expected within the specified credit terms unless certain discounts or deductions are available to the buyer. A buyer’s creditworthiness is reviewed periodically, but the buyer does not need to apply for credit each time it places an order."},{"id":"i_1cb253d9d8d4","t":"d","term":"open banking","ch":15,"d":5,"hy":false,"body":"A process through which third parties are permitted access to bank data and systems via the use of application programming interfaces (APIs), facilitating bank account data aggregation and the provision of banking services."},{"id":"i_617ba41b49af","t":"d","term":"open item system","ch":10,"d":1,"hy":true,"body":"A cash application process most commonly used in business-to-business sales. Each invoice sent to a customer is recorded in the accounts receivable file. When a payment is received, it is matched with the specific invoices being paid. Any payment discrepancies are noted (e.g., discounts, allowances, adjustments, or returns)."},{"id":"i_ce81e9687497","t":"d","term":"open-loop card","ch":4,"d":1,"hy":false,"body":"A credit card—either bank-issued credit card, American Express, or Discover— that is accepted anywhere the card logo is displayed."},{"id":"i_31da8997e8af","t":"d","term":"operating budget","ch":9,"d":2,"hy":true,"body":"A component of a master budget, this budget focuses on day-to-day operations. Also known as a profit plan."},{"id":"i_6d392787d01d","t":"d","term":"operating cycle","ch":1,"d":1,"hy":true,"body":"A representation of the flow of funds through a company from the acquisition of raw materials, through the production cycle and the sale of products or services, and finally to the collection of payments from customers."},{"id":"i_43990fb89b20","t":"d","term":"operating lease","ch":6,"d":2,"hy":true,"body":"A type of lease that is established so that the lessor retains ownership of the leased assets at the end of the lease period. Further, the lessor may provide maintenance for the equipment. Only operating leases with terms under a year can be recorded on an offbalance-sheet basis, meaning that the lease payment is reflected only on the lessee’s income statement. All other operating lease transactions must be recorded on the lessee’s balance sheet, while the lease payments also appear as an expense on the income statement."},{"id":"i_d6a726296594","t":"d","term":"operating leverage","ch":9,"d":2,"hy":true,"body":"A concept that examines the responsiveness of operating profits to changes in sales. Operating leverage is determined by the extent to which fixed costs are used in a company’s operating cost structure. The higher the proportion of fixed costs, the higher the company’s operating leverage."},{"id":"i_432cb72e8a4b","t":"d","term":"operating profit margin","ch":9,"d":2,"hy":true,"body":"A performance ratio that shows the percentage of revenue remaining after cost of goods sold, operating expenses, and amortization are deducted from revenue. It is computed as earnings before interest and taxes (EBIT) divided by revenues."},{"id":"i_e3dbf1af7b3a","t":"d","term":"operational risk","ch":16,"d":4,"hy":true,"body":"The risk of direct and indirect losses resulting either from external events that impact an organization’s operations or from inadequate and failed internal processes, people, and systems. Operational risk can be a significant cause of financial loss."},{"id":"i_0e7af7085130","t":"d","term":"opportunity cost","ch":9,"d":2,"hy":true,"body":"The value of the best known alternative not taken when two or more mutually exclusive alternatives are available."},{"id":"i_60c88dd345eb","t":"d","term":"optical character recognition (OCR)","ch":4,"d":1,"hy":false,"body":"A processing method for data entry that reads preprinted information on remittance documents and creates a digital data file."},{"id":"i_26b472f7d713","t":"d","term":"optimal capital structure","ch":20,"d":2,"hy":true,"body":"The mix of long-term debt and equity that produces the minimum weighted average cost of capital for a firm."},{"id":"i_14eb14ece52d","t":"d","term":"option","ch":17,"d":4,"hy":true,"body":"A contract giving the buyer of the contract the right, but not the obligation, to buy or sell a fixed amount of an underlying asset at a fixed price on or before a specified date, based on the style of the option."},{"id":"i_0b21afa91bd7","t":"d","term":"option premium","ch":17,"d":4,"hy":false,"body":"The price paid for the option contract."},{"id":"i_f637326a320a","t":"d","term":"order-to-cash timeline","ch":10,"d":1,"hy":true,"body":"The process or steps involved in converting orders or sales of goods into cash or good funds in the merchant’s bank account. Also known as the customer-to-cash timeline."},{"id":"i_9024b75ebde8","t":"d","term":"originating depository financial institution (ODFI)","ch":4,"d":1,"hy":false,"body":"In an automated clearinghouse (ACH) transaction, this is the financial institution that initiates the transaction on the originator’s behalf."},{"id":"i_ea8ec8c7114c","t":"d","term":"origination","ch":6,"d":2,"hy":true,"body":"An investment bank function that involves consultation with a company raising funds about the characteristics of a securities issue and any underlying documents. The investment bank also monitors market conditions and advises the company about the best time to bring the issue to market in order to maximize the price per issued share and the amount of funds the firm wishes to raise."},{"id":"i_0cffba6100f2","t":"d","term":"origination desk","ch":6,"d":2,"hy":false,"body":"A subset of trading professionals who are tasked with evaluating, pricing, and managing the placement of new securities issues. Also known as originators."},{"id":"i_5dcaa69487c0","t":"d","term":"originator","ch":4,"d":1,"hy":false,"body":"(1) The party that creates an automated clearinghouse (ACH) transaction. (2) In investment banking, a subset of trading professionals who are charged with evaluating, pricing, and managing the placement of new securities issues. Also known as an origination desk."},{"id":"i_e912b99d87d4","t":"d","term":"other-than-temporary impairment (OTTI)","ch":13,"d":1,"hy":false,"body":"A classification for securities that are impaired (i.e., market value is less than adjusted cost) and whose impairment is not or cannot be expected to be cured in the foreseeable future."},{"id":"i_3fe29033b12f","t":"d","term":"out-of-sample validation","ch":14,"d":1,"hy":false,"body":"In the selection and validation of a forecasting model, this process tests the forecast using data that was not used to develop it."},{"id":"i_94579bd4dc55","t":"d","term":"outsourcing","ch":1,"d":1,"hy":false,"body":"Utilizing a third party to perform all or part of a core function."},{"id":"i_bf9d9698cf47","t":"d","term":"overdraft","ch":3,"d":3,"hy":true,"body":"A situation that occurs when items are presented against a demand deposit account in excess of the balance in that account."},{"id":"i_8c2c589d7b64","t":"d","term":"over-the-counter (OTC) market","ch":6,"d":2,"hy":false,"body":"A type of market that is more decentralized than a formal securities exchange. OTC markets conduct trading activity via online auction-style markets between participating brokers and dealers. Government, municipal, and corporate debt, and some equity issuances that are not traded on exchanges, are sometimes traded in the OTC markets."},{"id":"i_65e794a0e15f","t":"d","term":"par value","ch":2,"d":4,"hy":true,"body":"The face value of a security, such as commercial paper or a company share."},{"id":"i_f15485e8927d","t":"d","term":"payables conversion period","ch":10,"d":1,"hy":false,"body":"See days payables."},{"id":"i_ce45c1bf47c5","t":"d","term":"payable-through-draft (PTD)","ch":4,"d":1,"hy":false,"body":"A payment instrument resembling a check that is drawn against the payor rather than the bank. It is handled like a check through the clearing process, but the responsibility for paying the draft lies with the payor, referred to as the drawee in the case of drafts."},{"id":"i_fb5382f484f6","t":"d","term":"payback period","ch":9,"d":2,"hy":true,"body":"The number of years required to recover the initial investment in an asset or project."},{"id":"i_18e78411401b","t":"d","term":"payee","ch":4,"d":1,"hy":true,"body":"In a payment system, the one receiving the payment."},{"id":"i_3b5f7b46070d","t":"d","term":"payee positive pay","ch":12,"d":1,"hy":false,"body":"A positive pay service that matches against the payee field, in addition to the serial number and amount of a check, in an effort to detect an altered payee."},{"id":"i_9e03538bf05c","t":"d","term":"paying bank","ch":4,"d":1,"hy":false,"body":"In a payment clearing process, the bank or financial institution where the payor’s account resides. The paying bank processes the value transfer on the payor’s behalf."},{"id":"i_8417610c318f","t":"d","term":"Payment Card Industry Data Security Standard (PCI DSS)","ch":4,"d":1,"hy":false,"body":"A worldwide information security standard defined by the Payment Card Industry Security Standards Council. The standard was created to help organizations that process card payments prevent payment card fraud through increased controls around the data they hold and exchange. The standard applies to all organizations that store, process, or transmit cardholder information from any card branded with the logo of one of the major card brands."},{"id":"i_7b0e16f8648a","t":"d","term":"payment factory","ch":12,"d":1,"hy":false,"body":"A single term that is used for a wide variety of operating structures, all aimed at centralizing a company’s disbursements."},{"id":"i_a91e5af14add","t":"d","term":"payment float","ch":10,"d":1,"hy":true,"body":"The time interval or delay between the day that a bill or invoice is sent/received (depending on the perspective of the seller or buyer) and the day that payment is actually credited to the biller’s bank account."},{"id":"i_f88eba389309","t":"d","term":"payment on behalf of (POBO)","ch":10,"d":1,"hy":false,"body":"A service where a separate entity (usually a shared services center or in-house bank) manages disbursements for other group entities."},{"id":"i_0603a5be292f","t":"d","term":"payment rail","ch":4,"d":1,"hy":false,"body":"Infrastructure that enables the clearing and settlement of specific payment types."},{"id":"i_52e1020a0e4f","t":"d","term":"payment service provider","ch":4,"d":1,"hy":false,"body":"A nonbank third-party provider offering various payment-related services."},{"id":"i_13499bf3b84a","t":"d","term":"payment system","ch":4,"d":1,"hy":true,"body":"A series of processes and technologies (i.e., a payment instrument, a clearing channel, and a settlement mechanism) that transfer monetary value from one party to another."},{"id":"i_9427b8729c41","t":"d","term":"payor","ch":4,"d":1,"hy":true,"body":"In a payment system, the one making the payment."},{"id":"i_020eb1c48689","t":"d","term":"payor swaption","ch":17,"d":4,"hy":false,"body":"A contract giving the buyer of the contract the right, but not the obligation, to enter into a swap, in which the buyer makes fixed-rate interest payments and receives floatingrate interest payments."},{"id":"i_663489583765","t":"d","term":"payroll card (pay card)","ch":4,"d":1,"hy":false,"body":"A pre-funded stored-value card used to replace payroll checks or direct deposit of payroll."},{"id":"i_31715dc32395","t":"d","term":"pension fund","ch":1,"d":1,"hy":false,"body":"A fund that invests contributions from employers and/or employees for the future retirement needs of the employees."},{"id":"i_0ad11a8f366a","t":"d","term":"pension plan","ch":2,"d":4,"hy":true,"body":"A type of retirement plan, usually tax-exempt, wherein an employer makes contributions toward a pool of funds set aside for an employee’s future benefit. The pool of funds is then invested on the employee’s behalf, allowing the employee to receive benefits upon retirement. A pension plan typically falls into one of two categories: defined benefit, where the employee receives a predetermined income (based on salary), and defined contribution, where the employee receives an income based on the funds paid into the plan during the employee’s working life. The US (k) and (b) plans are examples of defined contribution pension plans."},{"id":"i_71d08940145f","t":"d","term":"percentage-of-sales method","ch":14,"d":1,"hy":false,"body":"A medium-term cash forecasting technique that involves projecting financial statements based on the historical relationship between sales and liquid accounts from the financial statements that tend to change in value along with sales. Cash, accounts receivable, inventory, and accounts payable are the more important accounts. Account size (e.g., cash or inventory) is expressed as a percentage of sales. This percentage is then used in conjunction with forecasted sales to produce a forecast of account size."},{"id":"i_f8e60b5e34b1","t":"d","term":"perfect hedge","ch":17,"d":4,"hy":false,"body":"A hedge that eliminates all market risk from a given transaction. In other words, the hedge is exactly the inverse of the base transaction. Perfect hedges are hard to create since many derivatives are traded in standard amounts or have standard settlement dates."},{"id":"i_070b4690aa8b","t":"d","term":"performance guarantee","ch":6,"d":2,"hy":true,"body":"A type of guarantee requested by a lender for a loan to a subsidiary of another organization. In some cases, the lender may ask for specific performance guarantees relative to the assets being financed. Under a full guarantee, the parent (or other entity) fully guarantees performance by the subsidiary. Under a best-efforts guarantee, the parent agrees to use its best efforts to persuade the subsidiary to perform, but it does not guarantee subsidiary performance."},{"id":"i_64c5fe2bc653","t":"d","term":"performance measurement","ch":7,"d":3,"hy":false,"body":"The ongoing monitoring and evaluating of the performance of an investment, portfolio, individual, department, or organization."},{"id":"i_e22f4a9d8b2e","t":"d","term":"per-occurrence basis","ch":16,"d":4,"hy":true,"body":"A method for determining the deductible on an insurance policy claim, in which the deductible applies for each occurrence during the policy period."},{"id":"i_2ad72b2e4b29","t":"d","term":"perpetual bond","ch":20,"d":2,"hy":true,"body":"A bond without a maturity date. The issuer makes a regular interest payment but is never required to repay the principal."},{"id":"i_ed6f60f4620f","t":"d","term":"personal guarantee","ch":6,"d":2,"hy":true,"body":"A type of guarantee in which a lender may require a personal pledge on the part of the owner or other principals in a business before granting a loan to the business. This is more common for smaller, privately held companies."},{"id":"i_57024125b8d8","t":"d","term":"phishing","ch":16,"d":4,"hy":true,"body":"The use of deception (primarily via email) to obtain access to confidential information."},{"id":"i_2154d147cd69","t":"d","term":"physical and electronic security risk","ch":16,"d":4,"hy":false,"body":"Risk related to unauthorized physical or electronic access to premises or information. Many organizations require physical security for their premises and employees to help prevent physical or electronic access to critical information (e.g., identity theft), as well as to ensure employees’ safety. Security measures also may include biometric systems, using such technologies as fingerprint, face, or iris (eye) recognition to control physical access to facilities or key equipment. Physical security is especially important for financial institutions, utilities, and defense contractors."},{"id":"i_11aa76b8a501","t":"d","term":"physical pooling","ch":12,"d":1,"hy":true,"body":"A type of cash concentration in which funds in a company’s separate bank accounts are automatically transferred to/from a concentration account in order to eliminate idle cash and fund cash outflows. The participating entities are either in surplus or deficit from a transactional perspective, but the bank accounts themselves have a balance of zero."},{"id":"i_e1f1eb75c7bb","t":"d","term":"pip","ch":17,"d":4,"hy":false,"body":"An acronym for price in percentage or price interest point. One pip is the smallest change in value in a foreign exchange transaction. In most cases, currency pairs are quoted to four decimal points, so a pip is a one-point movement in the fourth decimal point. For example, if GBP/USD is 1.2945, a one-pip movement is to 1.2946."},{"id":"i_7843fc5bea02","t":"d","term":"placement","ch":7,"d":3,"hy":false,"body":"(1) The first stage of money laundering, this is the physical deposit of cash proceeds from illegal activities into a financial institution. (2) See private placement."},{"id":"i_ade9260c1c9e","t":"d","term":"pledge","ch":6,"d":2,"hy":true,"body":"A binding promise in which a borrower offers collateral to a lender as security, usually in return for a loan. The lender has the right to seize the collateral (i.e., pledged assets) if the borrower defaults on the obligation."},{"id":"i_458d4d40c1e4","t":"d","term":"political risk","ch":6,"d":2,"hy":true,"body":"A term applied to a variety of actions that a government may take that negatively impact a company’s operations and/or value. It includes the risk that a company’s operations in a foreign country may be nationalized or expropriated by the government of that country."},{"id":"i_0e2875a46145","t":"d","term":"pooling","ch":12,"d":1,"hy":true,"body":"A liquidity management technique that enables a company to combine balances from different company bank accounts. See notional pooling and physical pooling."},{"id":"i_5d93cfb32b0b","t":"d","term":"positive pay","ch":12,"d":1,"hy":true,"body":"A disbursement service used to combat payments fraud related to both checks and automated clearinghouse (ACH) transactions. For checks, the company transmits a file of payment information to the disbursement bank either at or before the time of the physical distribution of checks. The bank matches check/serial numbers and dollar amounts of checks presented for payment against the issue database and pays only those checks that match all relevant criteria. Any exceptions are conveyed to the company for its decision whether to pay or return the item. In the case of ACH positive pay, the bank will send the company a list of ACH debits showing on the account (i.e., requests for payment received from originators) and ask the company to decide whether to authorize payment."},{"id":"i_c62d4ea001a9","t":"d","term":"prearranged bankruptcy","ch":2,"d":4,"hy":false,"body":"A type of bankruptcy in which management arranges a tentative deal with some of the creditors or parties, but not with all of them. Generally, these deals are done on an informal basis and are not legally binding."},{"id":"i_7d76f1488e5d","t":"d","term":"pre-authorized draft","ch":4,"d":1,"hy":true,"body":"A payment instrument that authorizes the payee to draw or draft against the payor’s account. Also known as a remotely created check (RCC)."},{"id":"i_21445356dfd1","t":"d","term":"predictable cash flow","ch":14,"d":1,"hy":false,"body":"In the cash flow forecasting process, this is a cash flow component that can be predicted with reasonable accuracy."},{"id":"i_24fadfe42093","t":"d","term":"preemptive right","ch":20,"d":2,"hy":true,"body":"A shareholder right that provides existing shareholders the first right to purchase shares of any new stock issue on a pro rata basis (i.e., based on the current proportion of shares owned)."},{"id":"i_7e0ea21b71ae","t":"d","term":"preferred stock","ch":6,"d":2,"hy":true,"body":"An investment security that is a type of equity but is different from common stock in terms of its investor rights and dividend payment streams. In terms of cash flows, it is more like debt than equity because of its fixed dividend payments. Unlike with debt, however, a company does not risk bankruptcy by missing a preferred stock dividend. In addition, preferred dividends are not tax deductible, unlike the interest expense from debt; therefore, the cost of servicing preferred stock is generally much higher than that of a similar debt issue."},{"id":"i_b135fca5bc06","t":"d","term":"prepackaged (pre-pack) bankruptcy","ch":2,"d":4,"hy":false,"body":"In the United States, a type of bankruptcy in which management files with the US Securities and Exchange Commission (SEC) a formal plan that all classes of creditors have voted on and accepted. Essentially, the firm goes to court with all of the details worked out and with everyone agreeing to the plan. Pre-packs are also used in other countries, including the United Kingdom."},{"id":"i_563607f51e89","t":"d","term":"present value (PV)","ch":9,"d":2,"hy":true,"body":"The value at the present time (or discounted value) of anticipated future cash flows or payments."},{"id":"i_f90471340c2d","t":"d","term":"primary market","ch":6,"d":2,"hy":true,"body":"A financial market that offers newly issued debt and equity securities to investors when firms or government units sell securities to raise funds."},{"id":"i_c39a05a4ce53","t":"d","term":"principal preservation","ch":1,"d":1,"hy":false,"body":"See capital preservation."},{"id":"i_b08f26aa848c","t":"d","term":"private equity","ch":8,"d":1,"hy":true,"body":"An investment of either common or preferred stock in an operating company that is not publicly traded on an exchange. This investment sometimes involves the acquisition of an entire company."},{"id":"i_8eb4fc6ea99a","t":"d","term":"private equity firm","ch":3,"d":3,"hy":false,"body":"An entity that uses capital raised from institutional investors and from high-net-worth individuals/family offices to invest in privately held companies."},{"id":"i_359d6926c362","t":"d","term":"private market","ch":6,"d":2,"hy":true,"body":"A financial market for private, or direct, placement, in which securities are offered and sold to a limited number of qualified investors and are not offered to the general public. The investment banking firm, acting as a broker to bring the issuer and investors together, meets with prospective buyers and confirms the details of the offering."},{"id":"i_481c8456c84a","t":"d","term":"private placement","ch":3,"d":3,"hy":true,"body":"The practice of the direct sale of long-term loans to institutional investors, such as insurance companies and hedge funds."},{"id":"i_ea1f07a07bf8","t":"d","term":"private-label financing","ch":10,"d":1,"hy":false,"body":"A type of financing in which a third party operates the credit function in the seller’s name rather than the seller administering a credit program in-house."},{"id":"i_fafdcda31337","t":"d","term":"process risk","ch":16,"d":4,"hy":true,"body":"A type of internal operational risk related to an organization’s processes. Many organizations experience substantial exposure to losses related to the processes employed in day-to-day business operations. Process risk can arise from any functional area of a business, including procurement, manufacturing, sales, or fulfillment. The risk usually comes from a lack of proper controls or the failure of employees to follow procedures, due to a lack of training."},{"id":"i_fb88c793bbbe","t":"d","term":"processing float","ch":10,"d":1,"hy":true,"body":"The time interval or delay between the time the payee or the payee’s processing site receives the payment and the time the payment (typically a check) is deposited into the payee’s account."},{"id":"i_ce6da321f62e","t":"d","term":"procure-to-pay timeline","ch":10,"d":1,"hy":true,"body":"The time between the purchase of raw materials, retail goods, or services, and the point at which funds leave the firm’s bank account to pay the supplier."},{"id":"i_52bf53a8026e","t":"d","term":"profitability index (PI)","ch":9,"d":2,"hy":false,"body":"A cost/benefit measurement that is similar to net present value, this is a ratio of the present value gained to the cost required to obtain that value. It shows value gained per dollar of inves
