<script id="ctp-data" type="application/json">{"meta":{"built":"2026-06-23","sources":["CTP Platform Glossary (definitions, chapter-tagged)","CTP8 Exam Prep Flash Cards (high-yield signal)","CTP Acronyms & Abbreviations","CTP Exam Formulas BenchPrep (equations image-only -> VERIFY)","CTP8 ETM8 Structure (20-chapter outline)","2026 CTP Candidate Handbook / Test Specifications (OFFICIAL domain weights)"],"domain_weights_source":"OFFICIAL - 2026-2028 CTP Test Specifications","chapter_domain_map_source":"INFERENCE by Claude (AFP publishes none)","cognitive_mix":{"facts_terms":"33-37%","concepts":"38-42%","application":"23-27%","math_computation":"10-15%"},"exam":{"total_q":170,"scored":150,"unscored":20}},"domains":{"1":{"title":"Maintain corporate liquidity (current & future obligations)","q_low":56,"q_high":60},"2":{"title":"Manage capital structure & long-term capital","q_low":34,"q_high":38},"3":{"title":"Manage internal & external relationships","q_low":13,"q_high":17},"4":{"title":"Monitor & control financial/regulatory/operational risk","q_low":24,"q_high":28},"5":{"title":"Assess impact of technologies on treasury","q_low":15,"q_high":17}},"chapter_domain":{"1":{"domain":1,"note":"Role of treasury mgmt - foundational, mapped to liquidity ops"},"2":{"domain":4,"note":"Legal/Regulatory/Tax -> compliance & regulatory risk"},"3":{"domain":3,"note":"Banks & FIs -> external relationships/FSPs"},"4":{"domain":1,"note":"Payment instruments/systems -> cash receipts/disbursements"},"5":{"domain":1,"note":"Money markets -> short-term investing/borrowing"},"6":{"domain":2,"note":"Capital markets -> long-term capital"},"7":{"domain":3,"note":"Relationship mgmt & FSP selection -> relationships"},"8":{"domain":1,"note":"Financial accounting/reporting -> ratios, reconciliation"},"9":{"domain":2,"note":"Financial planning/budgeting/analysis -> capital evaluation (TVM, capital budgeting)"},"10":{"domain":1,"note":"Intro to working capital -> CORE Domain 1"},"11":{"domain":1,"note":"Working capital metrics -> CORE Domain 1"},"12":{"domain":1,"note":"Disbursements/collections/concentration -> CORE Domain 1"},"13":{"domain":1,"note":"Short-term investing & borrowing -> CORE Domain 1"},"14":{"domain":1,"note":"Cash flow forecasting -> CORE Domain 1"},"15":{"domain":5,"note":"Technology in treasury -> Domain 5"},"16":{"domain":4,"note":"Enterprise risk mgmt -> Domain 4"},"17":{"domain":4,"note":"Financial risk mgmt (hedging/FX/IR) -> Domain 4 (FX hedging also Domain 1/2)"},"18":{"domain":4,"note":"Treasury policies & procedures -> Domain 4"},"19":{"domain":2,"note":"Long-term investments -> Domain 2"},"20":{"domain":2,"note":"Capital structure decision -> Domain 2"}},"items":[{"id":"i_0dfa061fea37","t":"d","term":"acceptance","ch":12,"d":1,"hy":true,"body":"A drawee’s signed agreement to pay a negotiable instrument (typically a letter of credit or related draft) as presented. Acceptance acknowledges that all of the terms of the instrument, other than time, have been met and the instrument will be paid at the proper time."},{"id":"i_c3d79aa761de","t":"d","term":"account analysis","ch":7,"d":3,"hy":true,"body":"Largely unique to the US banking system, this is a record of the services provided to the commercial customers of a bank, along with detailed information on balances and credits earned for those balances. The terms account analysis and account analysis statement are often used synonymously. Account analysis can also refer to the process used by the bank to determine earnings credits and service charges in creating this statement."},{"id":"i_16dd9ebcdfa4","t":"d","term":"account analysis statement","ch":7,"d":3,"hy":false,"body":"A periodic statement that lists the fees for banking services provided to the account holder and any offsetting credits for deposited funds."},{"id":"i_44075c117521","t":"d","term":"account information service provider","ch":3,"d":3,"hy":false,"body":"An entity that, with the data owner’s permission, can access and consolidate financial data (e.g., bank account information) from multiple financial institutions and share that data with other entities."},{"id":"i_f5897d50b963","t":"d","term":"account reconciliation program (ARP)","ch":12,"d":1,"hy":false,"body":"A service offered by a financial institution that matches issue information to paid check information and reports outstanding/unpaid items."},{"id":"i_d94ba77c9726","t":"d","term":"account resolution","ch":7,"d":3,"hy":true,"body":"Usually made at the board of directors’ level, this is the basic account or service authorization empowering a representative of the business to enter into agreements for financial services. It usually specifies the functions that can be performed by specific individuals or job titles, the people authorized to open and close accounts, and the entire scope and limitations of the relationship. An account resolution is a specific type of board resolution."},{"id":"i_17e712facfda","t":"d","term":"account takeover","ch":16,"d":4,"hy":true,"body":"A type of fraud in which a hacker gains access to a company’s bank account information and uses that information to remove funds from the account."},{"id":"i_787977faa404","t":"d","term":"account validation","ch":12,"d":1,"hy":false,"body":"The process of confirming that a bank account number and details are accurate and authenticating that the account is held by the intended beneficiary. Typically done by a company before sending a payment to reduce fraud and ensure that the payment is sent to the correct account."},{"id":"i_8b955198b593","t":"d","term":"Accounting Standards Codification (ASC)","ch":8,"d":1,"hy":false,"body":"The detailed set of rules in the United States, referred to as Generally Accepted Accounting Principles (GAAP), that are developed, agreed upon, and published in the form of ASC Topics by the Financial Accounting Standards Board, an independent, self-regulating organization formed in 1973."},{"id":"i_d43a39242f9b","t":"d","term":"accounts receivable (A/R) balance pattern","ch":11,"d":1,"hy":false,"body":"A forecasting tool that specifies the percentage of credit sales during a time period (e.g., one month) that remains outstanding at the end of the current time period and each subsequent time period."},{"id":"i_6b8e358b65e7","t":"d","term":"accredited investor","ch":6,"d":2,"hy":false,"body":"An individual or entity that is entitled to purchase securities that are exempt from registration. Examples include some high-net-worth individuals, banks, brokerdealers, and corporations."},{"id":"i_00e58d3b9bc7","t":"d","term":"Accredited Standards Committee (ASC) X12","ch":15,"d":5,"hy":false,"body":"A not-for-profit organization chartered by the American National Standards Institute (ANSI), responsible for developing and maintaining cross-industry electronic data interchange (EDI) message standards in the United States."},{"id":"i_783358a852e3","t":"d","term":"accrual accounting","ch":8,"d":1,"hy":true,"body":"The accounting approach under which expenses must be reported when the revenues with which they are associated are recognized. Long-lived or fixed assets are capitalized (i.e., recorded as assets on the balance sheet) and depreciated over time because they produce revenues during multiple accounting periods. This practice matches an asset’s cost to the revenues it produces. Under the revenue recognition and matching principles, sales are reported even though cash has not been received. Similarly, expenses are reported even though cash has not been paid out."},{"id":"i_c1d672d97f72","t":"d","term":"accumulated depreciation","ch":8,"d":1,"hy":true,"body":"An asset account (more specifically, a contra asset account) that records the amount of depreciation previously expensed on a company’s assets. It appears on the asset side of the balance sheet, but it is a source of funds when it increases. While depreciation is technically a noncash expense (i.e., there is no actual payment for depreciation), it does have a cash flow impact because it reduces the company’s income taxes by lowering pretax income."},{"id":"i_31b8b83fd274","t":"d","term":"ACH positive pay","ch":12,"d":1,"hy":false,"body":"A disbursement service to combat fraud in which the bank will send the company a list of automated clearinghouse (ACH) debits showing on the account (i.e., requests for payment received from originators) and ask the company to make a decision on whether to authorize payment."},{"id":"i_bd07ea03dc99","t":"d","term":"acquisition financing","ch":20,"d":2,"hy":false,"body":"Any financing specifically arranged to fund a merger or acquisition."},{"id":"i_f8c1748f2070","t":"d","term":"active hedging","ch":17,"d":4,"hy":false,"body":"The process of using various financial instruments (in particular, derivatives) to manage risks associated with future cash flows, or the values of assets or liabilities. Also known as financial hedging, this is a core principle of treasury financial risk management. Financial hedging is similar to the concept of buying insurance to protect an asset, and the purpose of the hedge is to insure the asset’s value (or minimize the risk on a liability) when its market value fluctuates."},{"id":"i_5a4de2ba74ac","t":"d","term":"additional paid-in capital (APIC)","ch":6,"d":2,"hy":false,"body":"An equity account that reflects the difference at the time of issue between the par value and the issuance price (less underwriting costs) of any new stock sold by a company."},{"id":"i_52499b89dae1","t":"d","term":"address verification service (AVS)","ch":4,"d":1,"hy":false,"body":"A system used to verify the identity of the person claiming to own the credit card being used in a transaction. The system will check the billing address of the credit card provided by the user with the address on file at the credit card company."},{"id":"i_53692e66e3d7","t":"d","term":"advance rate","ch":3,"d":3,"hy":false,"body":"The proportion of a borrower’s eligible collateral that a lender is prepared to lend against. When converted to a dollar amount, it is known as a borrowing base."},{"id":"i_96ac8ddf692d","t":"d","term":"advising bank","ch":12,"d":1,"hy":true,"body":"In a letter of credit (L/C) transaction, this is the bank that advises the seller of an L/C in its favor."},{"id":"i_f0f3e15dfaee","t":"d","term":"aggregate basis","ch":16,"d":4,"hy":false,"body":"A method of establishing insurance policy deductibles in which the deductible is set on a per-period basis, regardless of the number of occurrences (claims)."},{"id":"i_d696fc917989","t":"d","term":"aggressive financing strategy","ch":10,"d":1,"hy":true,"body":"A current asset financing strategy that involves a company financing all fixed assets with long-term debt and equity, but financing only a portion of permanent current assets with long-term financing. Short-term financing supports the remainder of permanent current assets and all of the fluctuating current assets."},{"id":"i_15c77c1d0b97","t":"d","term":"aging schedule","ch":11,"d":1,"hy":true,"body":"A schedule that separates accounts receivable (A/R) into current and past-due receivables using set periods (typically, 30-day increments) and is used for measuring A/R."},{"id":"i_dc184744612d","t":"d","term":"all-in rate","ch":13,"d":1,"hy":true,"body":"An interest rate that consists of a base rate, such as the Secured Overnight Financing Rate (SOFR), the US prime rate, or the Fed funds rate, plus a spread that is added to, or occasionally subtracted from (depending on the borrower’s creditworthiness), the base rate. Rates on lines of credit are normally variable and adjust immediately to changes in the base rate."},{"id":"i_17f2d72d1086","t":"d","term":"alpha (smoothing constant)","ch":14,"d":1,"hy":false,"body":"In an exponential smoothing forecasting methodology, this is the weight assigned to the most recent actual value and the most recent forecasted value. It is calculated using a computer program such as a statistics package. The program selects the alpha value that weights past actual values and past forecasted values so as to produce the most accurate forecast of the variable’s value (e.g., the cash flow value in a cash flow forecast) for the next period."},{"id":"i_4d3bc15cda8e","t":"d","term":"American depositary receipt (ADR)","ch":6,"d":2,"hy":false,"body":"A type of security issued by an American custodian bank to allow American investors to trade stock in a non-US company."},{"id":"i_9135cbfccc04","t":"d","term":"American option","ch":17,"d":4,"hy":true,"body":"A type of option contract that can be exercised on or any time prior to the stated expiration (delivery) date of the contract. Contrast with European option and Bermudan option."},{"id":"i_7d5732f8163a","t":"d","term":"amortization","ch":8,"d":1,"hy":true,"body":"The practice of accounting for the decline in the value of an asset over time."},{"id":"i_03ccba21b111","t":"d","term":"analytical forecast","ch":14,"d":1,"hy":false,"body":"A type of forecast that can be used to answer what-if questions or to predict the financial impact of a given action. Also referred to as a simulation."},{"id":"i_e230473730be","t":"d","term":"application programming interface (API)","ch":15,"d":5,"hy":false,"body":"A set of routines, protocols, and tools for building software applications. An API acts as a software gateway between programs, allowing the data from one application to be used in another platform or service."},{"id":"i_24addb8f5828","t":"d","term":"application service provider (ASP)","ch":15,"d":5,"hy":false,"body":"A business that provides computer-based services to customers over a network."},{"id":"i_d05fbe6e25a1","t":"d","term":"arbitrage","ch":17,"d":4,"hy":true,"body":"The process by which an asset is purchased in one financial market and simultaneously sold in another market to produce a riskless profit. Arbitrage is the primary mechanism that ensures efficiency in financial markets."},{"id":"i_e6e886cdcdef","t":"d","term":"ask price","ch":3,"d":3,"hy":true,"body":"The price or yield at which a dealer will sell a security."},{"id":"i_a58f4189a0b9","t":"d","term":"as-of adjustment","ch":4,"d":1,"hy":false,"body":"The practice of a bank adding additional time as part of the collectedbalance calculation when a check takes longer to clear than the initial availability that was granted."},{"id":"i_62dab7410ba0","t":"d","term":"asset allocation","ch":19,"d":2,"hy":true,"body":"The mix of instruments in a capital market investment portfolio, both by type of investment (e.g., bonds, equities, private equity, real estate and other instruments) and by duration."},{"id":"i_9d71c92bb005","t":"d","term":"asset liquidity risk","ch":16,"d":4,"hy":false,"body":"The risk that an investment cannot be sold quickly without experiencing a substantial loss in value. This risk can also affect the yield and pricing on a security. By definition, a liquid security is one that can be converted quickly and easily into cash with very little exposure to market price risk and for a small transaction cost. Also referred to as liquidity risk."},{"id":"i_ca0a3cb23bcb","t":"d","term":"asset manager","ch":5,"d":1,"hy":false,"body":"Investment managers that run mutual funds and separately managed accounts (SMAs). They select appropriate investment instruments for their funds or individual clients, having assessed counterparty and other associated risks. They manage the operational side of the investment process on their clients’ behalf."},{"id":"i_637b94bc8430","t":"d","term":"asset/liability management","ch":19,"d":2,"hy":false,"body":"The process of managing and coordinating the assets and liabilities held in an investment portfolio to maximize earnings and minimize risk. Whenever an investment portfolio utilizes borrowed funds as part of its overall strategy, the issue of asset/liability management arises. This is particularly an issue for banks and large financial institutions that fund their investments with either deposits or borrowed funds. In many cases, the issue is expressed in terms of a maturity mismatch; that is, the institution may be borrowing funds in the short-term markets (e.g., by using commercial paper) while using the proceeds from the financing to create or purchase long-term assets."},{"id":"i_c29070fd736d","t":"d","term":"asset-backed commercial paper (ABCP)","ch":5,"d":1,"hy":false,"body":"An investment that has most of the features of standard commercial paper (CP) but is secured against specific assets—usually short-term trade receivables from a single company or a range of companies. ABCP may be classified as either single-seller, if it is backed by assets from a single institution, or multi-seller, if it is backed by assets purchased from a number of issuers."},{"id":"i_6ec508adbcf8","t":"d","term":"asset-backed security (ABS)","ch":6,"d":2,"hy":false,"body":"A security with income derived from a pool of assets, such as accounts receivable or credit card receivables."},{"id":"i_2cc614c4764b","t":"d","term":"asset-based lending","ch":10,"d":1,"hy":true,"body":"A type of lending that involves commercial loans or lines of credit that are backed by liens on specific assets of the borrowing company. Asset-based lines of credit in the working capital area are typically secured by accounts receivable or inventory and can support temporary financing needs."},{"id":"i_c67a2af69dc2","t":"d","term":"at-the-market (ATM) program","ch":20,"d":2,"hy":false,"body":"A type of stock sales program that allows listed companies to sell additional shares of company stock over time through a designated broker-dealer at the current or prevailing market price to raise additional capital. Also known as a dribble plan."},{"id":"i_b5bce30d3733","t":"d","term":"auditor’s opinion","ch":8,"d":1,"hy":false,"body":"An opinion on a company’s financial statements that is provided by an independent auditor (or audit firm) based on a financial audit. The purpose of conducting an audit is to produce an audit report in which an independent audit firm indicates the scope of the audit and renders an opinion regarding the relevance, completeness, and accuracy of the income statement, statement of financial position, statement of cash flows, any other statements, and all supporting material. In addition, the auditor will examine the strengths of the organization’s internal controls and processes. The auditor’s opinion does not comment on the company’s financial fitness, but rather on whether the financial statements fairly reflect the company’s financial position and are comparable to prior periods."},{"id":"i_176939638191","t":"d","term":"authentication","ch":4,"d":1,"hy":true,"body":"In data or electronic payment security, this is the ability to know, with a reasonable amount of certainty, who is accessing data or initiating a transaction."},{"id":"i_cf9a92a41b62","t":"d","term":"automated clearinghouse (ACH)","ch":4,"d":1,"hy":false,"body":"An electronic network for financial transactions in the United States. ACH processes large volumes of low-value credit and debit transactions in batches. The term ACH is also used to refer to payments made specifically through the US ACH system and as a generic term for ACH-style payments worldwide."},{"id":"i_31288c86d4cf","t":"d","term":"automated clearinghouse (ACH) credit transaction","ch":4,"d":1,"hy":false,"body":"An electronic message that instructs the originating depository financial institution to move funds from the originator’s (payor’s) account to the receiver’s (payee’s) account at the receiving depository financial institution."},{"id":"i_4060b035afbf","t":"d","term":"automated clearinghouse (ACH) debit transaction","ch":4,"d":1,"hy":false,"body":"An electronic message that instructs the originating depository financial institution to move funds from the receiver’s (payor’s) account to the originator’s (payee’s) account. The terms originator and receiver refer to originating and receiving (respectively) the electronic message, not particularly the funds themselves."},{"id":"i_f2c1b76db30d","t":"d","term":"availability","ch":4,"d":1,"hy":true,"body":"In a payment system, this is the point in time when the payee can use the funds provided by the payment, even though the payment may not be final."},{"id":"i_d961bf884102","t":"d","term":"availability float","ch":10,"d":1,"hy":false,"body":"The time interval or delay between the day when a payment is deposited into a bank account and the day when the payee’s account is credited with collected funds."},{"id":"i_d08ac11b12b1","t":"d","term":"availability schedule","ch":4,"d":1,"hy":false,"body":"A schedule that specifies, for each drawee endpoint, when a bank grants available credit for deposited items or includes them in collected balances."},{"id":"i_3410fd2da461","t":"d","term":"available balance","ch":4,"d":1,"hy":true,"body":"A type of bank balance (sometimes referred to as the investable balance) that represents the funds in a customer’s account that the bank was able to invest in incomeproducing assets during the account analysis period. Available balance is also defined as the amount of funds available for withdrawal from an account, based on the bank’s availability schedule and/or local regulations that require specific availability for certain funds (e.g., the Federal Reserve’s Regulation CC in the United States; other countries typically have similar regulations)."},{"id":"i_f9e8e1ca2a97","t":"d","term":"average collected balance","ch":7,"d":3,"hy":true,"body":"The sum of the daily ending collected balances (both positive and negative), divided by the number of days in the analysis period. In many account analysis statements, this item is calculated as the average ledger balance minus the average deposit float."},{"id":"i_3124afa4f408","t":"d","term":"average collection period","ch":11,"d":1,"hy":false,"body":"See days sales outstanding."},{"id":"i_cdc79dacc0c7","t":"d","term":"average daily float","ch":12,"d":1,"hy":false,"body":"The sum of the dollar-days of float for all items received in a certain period divided by the number of days in the period."},{"id":"i_39952f07fac9","t":"d","term":"average deposit float","ch":7,"d":3,"hy":true,"body":"The sum of the daily dollar amount of items (primarily checks) in the process of collection, divided by the number of calendar or business days in the account analysis period."},{"id":"i_bb303ca38003","t":"d","term":"average ledger balance","ch":7,"d":3,"hy":false,"body":"The sum of the daily ending ledger balances (both positive and negative), divided by the number of days in the account analysis period. Balances used in the calculation are net of any current-period adjustments."},{"id":"i_04ba6d73a373","t":"d","term":"balance sheet","ch":3,"d":3,"hy":true,"body":"A financial statement that reports a company’s financial condition—including assets, liabilities, and stockholders’ equity—at a point in time. Also called a statement of financial position."},{"id":"i_451ff9c4c70c","t":"d","term":"balance-forward system","ch":10,"d":1,"hy":true,"body":"A cash application process (most commonly used in consumer transactions) in which payments are applied to the total outstanding balance on an accounts receivable account rather than to specific items. The remaining balance, if any, is then carried forward to the next billing cycle. The balance-forward system is most common in revolving credit situations, such as retail credit cards."},{"id":"i_f43ba0493cff","t":"d","term":"bank capital requirements","ch":2,"d":4,"hy":true,"body":"Rules or regulations that specify the amount of capital (usually defined as equity funds) the owners of a bank must contribute to the business. This is typically in the form of a ratio of the bank’s capital to risk-weighted assets, where the latter includes loans and other investments. The higher the ratio of capital to assets, the lower the risk on the part of the bank."},{"id":"i_8f389686ebc9","t":"d","term":"Bank for International Settlements (BIS)","ch":2,"d":4,"hy":false,"body":"An organization that fosters international monetary and financial cooperation and serves as a bank for central banks. The BIS is also the sponsoring organization for the Basel Committee on Banking Supervision."},{"id":"i_64f0b41fae6c","t":"d","term":"bank obligation","ch":5,"d":1,"hy":true,"body":"A debt instrument issued by a bank to raise funds. Banks raise funds in the money markets through time deposits, banker’s acceptances, and repurchase agreements (repos), collectively referred to as bank obligations or bank paper. Examples of time deposits include savings accounts, certificates of deposit (CDs), and negotiable CDs. Negotiable CDs are high-value time deposits issued by banks and other financial institutions that are bought and sold on the open market."},{"id":"i_7c032b07a30e","t":"d","term":"bank of first deposit","ch":4,"d":1,"hy":false,"body":"In processing checks, this is the bank in which a check is initially deposited as part of the clearing process. Also known as the depository bank or collecting bank."},{"id":"i_907c997d2373","t":"d","term":"bank overlay structure","ch":12,"d":1,"hy":true,"body":"A type of pooling structure that combines both sweeping and pooling. It is typically used when a company’s primary bank has branches in several countries but the branches do not provide a full range of domestic banking services. A local bank is used to provide collection and disbursement transactions and accounts, and to sweep surplus funds into an in-country account held with the primary bank. The primary bank (i.e., overlay bank) then notionally pools or physically transfers cash balances in overlay accounts, providing a multi-country solution."},{"id":"i_30a2b9d48c82","t":"d","term":"bank reconciliation","ch":10,"d":1,"hy":false,"body":"The process of matching bank-held transaction and bank account data (i.e., in a bank statement) with information held by a company in its general ledger. Bank reconciliation is a key part of a company’s fraud prevention plan."},{"id":"i_f6df4dfbf18c","t":"d","term":"Bank Secrecy Act of 1970 (BSA)","ch":2,"d":4,"hy":true,"body":"A US legislative act under which US banks (and, in many cases, companies and individuals) are required to perform due diligence by determining a customer’s identity and monitoring transactions for suspicious activity. The primary intent of the BSA is to deter money laundering and the use of secret foreign bank accounts."},{"id":"i_a996e4ff5164","t":"d","term":"banker’s acceptance (BA)","ch":5,"d":1,"hy":false,"body":"A cross-border financing instrument that can be used to finance the import, export, or domestic shipment of goods, as well as the storage of properly titled goods. BAs are used frequently in conjunction with letters of credit (L/Cs) requiring a time draft drawn on a bank. A BA is created when one company signs an unconditional written order directing a bank to pay a certain sum of money on demand or at a definite time to another company, usually to finance the shipment or temporary storage of goods. The unconditional written order, also known as a time draft, is stamped accepted by the bank."},{"id":"i_83a8717985a5","t":"d","term":"banker’s acceptance (BA) rate","ch":12,"d":1,"hy":false,"body":"The rate at which BAs trade in the secondary market. BAs are sold at a nominal spread over US Treasury bills."},{"id":"i_3beca75ef492","t":"d","term":"bankruptcy","ch":2,"d":4,"hy":false,"body":"A condition of financial failure involving the inability to pay one’s debts in a timely manner. See also insolvency."},{"id":"i_5986d54896cf","t":"d","term":"barter","ch":12,"d":1,"hy":true,"body":"A trade payment method that involves the direct exchange of goods or services between two parties without the exchange of money. It is most frequently used when funds cannot be repatriated due to currency controls or other legal limitations, or as a tool to reduce the cost of holding inventory."},{"id":"i_0cc2de5e7266","t":"d","term":"base erosion and profit shifting (BEPS)","ch":2,"d":4,"hy":false,"body":"A process whereby a multinational corporation artificially books profits to related entities in low-tax jurisdictions, thereby avoiding or reducing its tax liability."},{"id":"i_cb5582d47568","t":"d","term":"Basel Capital Accords","ch":2,"d":4,"hy":false,"body":"A series of recommendations, issued by the Basel Committee on Banking Supervision, regarding the creation of international standards and regulations for how much capital financial institutions must put aside to reduce risks associated with investing and lending, as well as operational risk. There are currently three sets of Basel Accords, referred to as Basel I, Basel II, and Basel III."},{"id":"i_1735547d44ab","t":"d","term":"Basel Committee on Banking Supervision (BCBS)","ch":2,"d":4,"hy":false,"body":"A standards-setting body that operates under the Bank for International Settlements and provides a forum for regular cooperation on banking supervisory matters."},{"id":"i_4014cd14fc58","t":"d","term":"basis point","ch":13,"d":1,"hy":true,"body":"A common measurement unit used for interest rates and other financial percentages. One basis point is equal to one-hundredth of 1%."},{"id":"i_72b081ac9a60","t":"d","term":"beneficial ownership (beneficial interest)","ch":1,"d":1,"hy":false,"body":"Control over funds or accounts, which may be separate from signature authority or legal title. It recognizes that the entity in whose name an account is opened with a bank is not necessarily the person who ultimately controls the funds or who is ultimately entitled to the funds."},{"id":"i_a873d9d1afc9","t":"d","term":"Bermudan option","ch":17,"d":4,"hy":true,"body":"A type of option contract that is exercisable only on specified dates that are spaced evenly over the option’s life, in contrast with both American and European options."},{"id":"i_a295e0bdde19","t":"d","term":"beta","ch":19,"d":2,"hy":true,"body":"A measure of the volatility, or systematic risk, of a security or a portfolio in comparison to the market as a whole."},{"id":"i_829da2345ff7","t":"d","term":"bid price","ch":3,"d":3,"hy":true,"body":"The price or yield at which a dealer will purchase a security."},{"id":"i_322ce07ccc8a","t":"d","term":"bid-offer quote","ch":17,"d":4,"hy":true,"body":"A price quote in which a dealer or other entity provides both the price at which it is willing to purchase (bid) and sell (offer) a specific currency, commodity, or security. The difference between the two is referred to as the bid-offer spread or bid-ask spread."},{"id":"i_5ba904fe849b","t":"d","term":"bilateral netting system","ch":10,"d":1,"hy":true,"body":"A type of netting system in which purchases between two subsidiaries of the same company are periodically netted against each other so that only the net difference is transferred."},{"id":"i_14d49ec42988","t":"d","term":"bilateral repo","ch":5,"d":1,"hy":false,"body":"A repurchase agreement in which the collateral and funds (including any additional collateral requirements) are exchanged directly between the two parties to the agreement."},{"id":"i_dabfa697c95f","t":"d","term":"bill of lading","ch":12,"d":1,"hy":false,"body":"A shipping document that performs three functions: it acts as the document of title for the shipped goods, it is a receipt issued by the carrier, and, consequently, it recognizes that there is a contract of carriage."},{"id":"i_56fde8f43921","t":"d","term":"blockchain","ch":15,"d":5,"hy":true,"body":"A type of distributed ledger technology consisting of data structure blocks that may contain data or programs, with each block holding batches of individual transactions and the results of any executables. Each block contains a time stamp and a link to a previous block."},{"id":"i_15870c83a247","t":"d","term":"blocked currencies","ch":7,"d":3,"hy":true,"body":"A type of political risk, this is the practice of a government restricting the conversion from the local currency into a major trading currency."},{"id":"i_01859a538a95","t":"d","term":"board of directors","ch":1,"d":1,"hy":false,"body":"A group of individuals that are elected as, or elected to act as, representatives of the shareholders to establish corporate management-related policies and to make decisions on major company issues. Such issues include the hiring/firing of executives, dividend policies, and executive compensation."},{"id":"i_e9cbc8b32176","t":"d","term":"Board of Governors","ch":2,"d":4,"hy":true,"body":"The controlling entity for the US Federal Reserve System. The Fed has a decentralized structure, consisting of a network of 12 separately incorporated Federal Reserve Banks. The Federal Open Market Committee (FOMC) is the body responsible for coordinating the Fed’s monetary policy. The Board of Governors oversees the FOMC and the 12 Reserve Banks."},{"id":"i_77f9f583a256","t":"d","term":"board resolution","ch":7,"d":3,"hy":false,"body":"A resolution usually approved by an enterprise’s board of directors that gives a specific individual (or individuals) the authority to facilitate the business of the enterprise. See also account resolution."},{"id":"i_1d2bba5d0b80","t":"d","term":"bond","ch":6,"d":2,"hy":true,"body":"A debt instrument in which an investor loans money to an entity (corporate or governmental) that borrows the funds for a defined period of time, at a fixed or variable interest rate."},{"id":"i_0218b248ad4c","t":"d","term":"bond anticipation note (BAN)","ch":5,"d":1,"hy":false,"body":"A short-term, interest-bearing security issued in the anticipation of future revenues from a longer-term bond issue."},{"id":"i_f3704eb25f82","t":"d","term":"bond equivalent yield (BEY)","ch":13,"d":1,"hy":false,"body":"A calculation for restating semiannual, quarterly, or monthly discount bond or note yields into an annual yield. In the US, this type of yield is calculated on a -day year basis, while the money market yield is based on a -day year."},{"id":"i_2d3bbaa66457","t":"d","term":"bond indenture","ch":6,"d":2,"hy":false,"body":"The contract between the issuing entity of a bond and the bondholders."},{"id":"i_994251ffb779","t":"d","term":"bond rating","ch":6,"d":2,"hy":false,"body":"A quality rating that is assigned to a bond issue to reflect both the probability of default and the loss given default on the issue, in the opinion of the rating agency."},{"id":"i_53f0ceaed9f9","t":"d","term":"book value per share","ch":6,"d":2,"hy":true,"body":"The book value of common equity divided by the number of common shares outstanding."},{"id":"i_ea1ac426bdde","t":"d","term":"borrowing base","ch":10,"d":1,"hy":false,"body":"The amount of money a lender is prepared to loan the borrower against the collateral pledged."},{"id":"i_2dc89f709eca","t":"d","term":"break-even analysis","ch":9,"d":2,"hy":true,"body":"A type of cost/benefit analysis that establishes the level of activity at which total revenue and costs are equal."},{"id":"i_489af647fd15","t":"d","term":"brokerage firm","ch":3,"d":3,"hy":true,"body":"An entity that serves as an intermediary in the purchase and sale of capital market securities. It trades securities for its own account or on behalf of its customers. When executing trade orders on behalf of a customer, the institution acts as a broker. A broker that executes trades for its own account is also a dealer, and may be referred to as a brokerdealer."},{"id":"i_5ec8c4740915","t":"d","term":"broker-dealer","ch":3,"d":3,"hy":false,"body":"See brokerage firm."},{"id":"i_81e4a5523e4e","t":"d","term":"budget","ch":9,"d":2,"hy":false,"body":"An in-depth plan that details how economic resources will be procured and deployed over a specific time period. Budgets typically cover periods ranging from one month to one year."},{"id":"i_a8244044924a","t":"d","term":"business continuity","ch":16,"d":4,"hy":true,"body":"Actions taken with regard to crisis management, alternative operating procedures, and communications to staff and customers. The intent of disaster avoidance, recovery, and remediation measures is to preserve the firm’s revenue stream by maintaining operations."},{"id":"i_0c7c2f94e862","t":"d","term":"business email compromise (BEC)","ch":16,"d":4,"hy":false,"body":"The most common form of cyber attack, this is when a criminal defrauds a company by either taking control of an email account or impersonating an actual email account."},{"id":"i_6b0a2bd9594e","t":"d","term":"Business Identifier Code (BIC)","ch":7,"d":3,"hy":false,"body":"An international standard for uniquely identifying financial institutions included in a financial transaction. Identifiers for the parties (bank or corporate), country, and sometimes branch are included in the code. Also known as a SWIFT code."},{"id":"i_27366311e334","t":"d","term":"business interruption insurance","ch":16,"d":4,"hy":true,"body":"A type of insurance coverage that provides payments to an organization in the event it is unable to pursue a normal line of business for some period of time due to an unforeseen event. Business interruption insurance generally covers the loss of profits, as well as continuing fixed expenses (e.g., debt or lease arrangements), while the organization is temporarily out of business."},{"id":"i_aaabdbcd34d0","t":"d","term":"business risk","ch":16,"d":4,"hy":false,"body":"A type of risk that represents the classic risks to success in operating a business venture, such as uncertainty about the demand for products or services, the price that can be charged for those products or services, and the costs of producing and delivering the products or services."},{"id":"i_12e8faf27180","t":"d","term":"buy side","ch":20,"d":2,"hy":false,"body":"The part of an investment bank that supports companies’ decisions to purchase equity and debt."},{"id":"i_7d58b160d40f","t":"d","term":"call option","ch":17,"d":4,"hy":true,"body":"A type of option contract that gives the contract owner the right, but not the obligation, to buy (call) the underlying asset from the contract writer at a fixed price on or before the delivery date (depending on the style of option)."},{"id":"i_9147552ba0f7","t":"d","term":"call premium","ch":6,"d":2,"hy":false,"body":"See call provision."},{"id":"i_8df875186776","t":"d","term":"call provision","ch":6,"d":2,"hy":true,"body":"A bond provision that gives the issuing entity the right to call a bond or other issue for redemption prior to the original maturity. As compensation to investors for early redemption, a call premium is generally paid when a bond is called. The call premium usually is set on a sliding scale, with larger premiums above par required the earlier an issue is called."},{"id":"i_7cb1f56d3fbe","t":"d","term":"capacity","ch":10,"d":1,"hy":false,"body":"As part of the five Cs of credit, this represents the borrower’s current and future financial resources that are available to repay obligations when due."},{"id":"i_5d8df9b1deff","t":"d","term":"capital","ch":1,"d":1,"hy":true,"body":"The longer-term sources of funds used by a company, such as long-term debt, preferred stock, and common equity."},{"id":"i_4e3a372f037d","t":"d","term":"capital adequacy","ch":3,"d":3,"hy":false,"body":"A factor that measures whether the amount of capital maintained relative to the nature and extent of an institution’s risks is sufficient given management’s ability to identify, measure, monitor, and control these risks."},{"id":"i_509286497594","t":"d","term":"capital asset pricing model (CAPM)","ch":19,"d":2,"hy":false,"body":"A model that describes one possible relationship between risk and the required rate of return on an asset. In the case of common stock, the CAPM is based on the concept that a reasonable investor holds a diversified portfolio of stocks to mitigate risk. As more stocks are added to a portfolio, the overall riskiness and variability of the portfolio is reduced."},{"id":"i_23f7b85b4e7a","t":"d","term":"capital budgeting","ch":9,"d":2,"hy":false,"body":"The process by which proposed large-dollar investments in long-term assets are evaluated."},{"id":"i_0ae14d0455b7","t":"d","term":"capital investment","ch":6,"d":2,"hy":false,"body":"Funds used by a business to purchase long-term, typically fixed assets, such as land, machinery, or buildings. Capital investment may also refer to investments in longterm securities that are typically used to finance the purchase of such assets. Also known as long-term investment."},{"id":"i_bf969a214483","t":"d","term":"capital market","ch":6,"d":2,"hy":false,"body":"A market in which individuals and institutions trade financial securities with maturities in excess of one year. Organizations/institutions in the public and private sectors also often sell long-term (debt and/or equity) securities on the capital markets in order to raise funds. Thus, this type of market is composed of both the primary and secondary markets."},{"id":"i_6a351a42ae2a","t":"d","term":"capital preservation","ch":19,"d":2,"hy":false,"body":"An investment goal in which investors want to maintain the purchasing power of their investments while minimizing the risk of loss. While this is a suitable shortterm investment management strategy, it may not always fit into the guidelines for long-term (capital) investments."},{"id":"i_49cbaf87eb80","t":"d","term":"capital structure","ch":20,"d":2,"hy":false,"body":"The mix of long-term debt (in the form of term loans and various types of bonds) and equity (in the form of preferred stock, common stock, and retained earnings) used to fund the assets held by a firm."},{"id":"i_ebd7d568294d","t":"d","term":"capital structure theory","ch":20,"d":2,"hy":false,"body":"A systematic approach to financing business activities through a combination of debt and equity."},{"id":"i_6182378c6e1a","t":"d","term":"captive finance company","ch":3,"d":3,"hy":true,"body":"A subsidiary of a large industrial corporation that finances purchases solely of the corporation’s products."},{"id":"i_33fce2c24786","t":"d","term":"card verification code/value (CVC/CVV)","ch":4,"d":1,"hy":false,"body":"A number usually printed on the reverse side of a payment card and used as an anti-fraud security feature to help verify possession of the actual payment card by the individual using the card."},{"id":"i_055509110bae","t":"d","term":"card-not-present/MOTO transaction","ch":4,"d":1,"hy":false,"body":"A payment card transaction accepted over the phone or via the internet. Originally called MOTO transactions from mail order or telephone order, these transactions may be assessed higher fees due to increased risk (e.g., fraud and data errors)."},{"id":"i_11c8b1044496","t":"d","term":"cash application","ch":10,"d":1,"hy":false,"body":"The process of applying a customer’s payment against outstanding invoices or receivables."},{"id":"i_6147ae3dbd67","t":"d","term":"cash basis accounting","ch":8,"d":1,"hy":true,"body":"A major accounting method that recognizes revenues and expenses at the time physical cash is actually received or disbursed."},{"id":"i_3de8451461ac","t":"d","term":"cash before delivery (CBD)","ch":10,"d":1,"hy":false,"body":"A term of sale that requires the buyer to make full and final payment before the shipment or receipt of goods. Also known as prepayment terms."},{"id":"i_a8a5aa810e6c","t":"d","term":"cash concentration system","ch":12,"d":1,"hy":true,"body":"A system typically used to transfer funds from outlying depository locations (often at different banks, and sometimes in different countries) to a centrally located bank account at a company’s primary bank, commonly referred to as a concentration or header account. These systems are used in situations where companies may have to deal with a number of separate banks in disbursed geographic locations."},{"id":"i_fa7ce7e5dfa3","t":"d","term":"cash conversion cycle (CCC)","ch":10,"d":1,"hy":false,"body":"In working capital management, this formula explains and calculates how much time elapses from when funds are disbursed in direct support of a revenuegenerating activity until the time when funds are recovered from revenues. It is calculated as days receivables plus days inventory minus days payables. The result is the average number of days between the cash outflow for the acquisition of materials and supplies, and the cash inflow from the sale of products or services."},{"id":"i_56ac20770977","t":"d","term":"cash conversion efficiency","ch":9,"d":2,"hy":true,"body":"An efficiency/asset management ratio that measures how effectively a company has converted sales (or revenues) into cash. It is computed as cash flow from operations divided by revenues."},{"id":"i_6fe2d20bcf72","t":"d","term":"cash dividend","ch":20,"d":2,"hy":false,"body":"The most common form of dividend payment, typically paid on a quarterly basis."},{"id":"i_d1e744172116","t":"d","term":"cash flow at risk (CaR)","ch":16,"d":4,"hy":false,"body":"A type of value at risk (VaR) calculation used to assess the risk of a company experiencing a cash shortfall over a pre-determined period of time."},{"id":"i_bbbe602c99fa","t":"d","term":"cash flow hedge","ch":8,"d":1,"hy":false,"body":"A type of hedge that involves hedging against potential variability in forecasted cash flow. Any unrealized gains or losses on a qualifying derivative in a cash flow hedge are reported as other comprehensive income, and realized gains or losses are reported in current income at the time that the related transactions actually affect current income."},{"id":"i_217c86dc3b68","t":"d","term":"cash flow statement","ch":8,"d":1,"hy":false,"body":"See statement of cash flows."},{"id":"i_7d7640b97370","t":"d","term":"cash flow timeline","ch":10,"d":1,"hy":false,"body":"The interval that begins with the purchase of raw materials or parts from vendors and suppliers at the start of the operating cycle and ends when payment is received from customers at the completion of the operating cycle."},{"id":"i_2ac3a2a2e3bc","t":"d","term":"cash inflows","ch":10,"d":1,"hy":false,"body":"Funds collected from customers, obtained from financial sources (e.g., loans or investment income), and/or received from other sources."},{"id":"i_b34bab084824","t":"d","term":"cash letter","ch":4,"d":1,"hy":false,"body":"In a check-clearing process, a file of check images or a bundle of checks accompanied by a list of individual items and other control documents."},{"id":"i_731a471639b6","t":"d","term":"cash management","ch":1,"d":1,"hy":true,"body":"The subset of treasury management that specifically deals with managing the daily liquidity (available cash) of a company or organization to ensure the company or organization can meet its short-term obligations."},{"id":"i_13f7a82fe009","t":"d","term":"cash on delivery (COD)","ch":10,"d":1,"hy":false,"body":"A term of sale whereby the seller ships the goods and the buyer pays upon receipt. If the buyer refuses to pay, the goods are returned, and the seller must pay the shipping and handling costs."},{"id":"i_47dfc0c06bda","t":"d","term":"cash outflows","ch":10,"d":1,"hy":false,"body":"Funds disbursed to employees; vendors/suppliers; lenders; local, state/ provincial, and federal tax agencies; bondholders; and shareholders."},{"id":"i_539a5cc6c685","t":"d","term":"cash position","ch":1,"d":1,"hy":true,"body":"The quantity of cash that a company is holding at a given point in time."},{"id":"i_3d9a2bead6ee","t":"d","term":"cash positioning","ch":10,"d":1,"hy":false,"body":"The process of determining a company’s overall liquidity position."},{"id":"i_87521960ef91","t":"d","term":"cash reconciliation","ch":14,"d":1,"hy":false,"body":"The process of comparing a company’s expected forecast cash position with its actual cash position."},{"id":"i_9e2f2c6266ec","t":"d","term":"cash terms","ch":10,"d":1,"hy":true,"body":"A term of sale whereby the buyer generally has 7 to 10 days to make payment."},{"id":"i_102c358285dd","t":"d","term":"cash turnover","ch":10,"d":1,"hy":true,"body":"A ratio that indicates the number of cash cycles a firm experiences in a period (typically a year), generally defined as the days in the period ( for a year) divided by the cash conversion cycle."},{"id":"i_952b694fcdc6","t":"d","term":"cashier’s check","ch":4,"d":1,"hy":false,"body":"A payment instrument in the form of a check drawn on a bank’s own funds. Also known as an official bank check."},{"id":"i_f8d6e2dead40","t":"d","term":"center of excellence (COE)","ch":1,"d":1,"hy":false,"body":"See global business services (GBS) group."},{"id":"i_dadb9f0d3692","t":"d","term":"central bank","ch":2,"d":4,"hy":true,"body":"An entity that is responsible for implementing and managing a country’s monetary policy, including the country’s money supply and interest rates."},{"id":"i_c29f007fca4a","t":"d","term":"central bank digital currency (CBDC)","ch":4,"d":1,"hy":false,"body":"A virtual currency that is issued by a central bank but, unlike fiat currency, is not available as physical notes and coin."},{"id":"i_4808a4454b5a","t":"d","term":"central securities depository (CSD)","ch":5,"d":1,"hy":false,"body":"A financial services company that holds securities, in either certificated or noncertificated (dematerialized) form, on behalf of the securities’ actual owners in order to enable book-entry transfer of securities."},{"id":"i_6e23f31948ca","t":"d","term":"century bonds","ch":6,"d":2,"hy":false,"body":"Bonds with a term of years or greater."},{"id":"i_2bb83674ac2d","t":"d","term":"certificate authority","ch":15,"d":5,"hy":false,"body":"A trusted third party that secures the identification information used in a digital certificate."},{"id":"i_c99f39c30f36","t":"d","term":"certificate of deposit (CD)","ch":5,"d":1,"hy":false,"body":"A type of time deposit account that pays the bearer some stated rate of interest (either fixed or variable) over its maturity. It may be issued in any denomination, with maturities generally ranging from one month to five years. In the United States, CDs are covered by the Federal Deposit Insurance Corporation up to the current deposit limits."},{"id":"i_858e26accc8b","t":"d","term":"certificate of incumbency","ch":7,"d":3,"hy":true,"body":"See incumbency certificate."},{"id":"i_197fa5a8a49f","t":"d","term":"certified check","ch":4,"d":1,"hy":true,"body":"A payment instrument drawn on a depositor’s checking account; funds are withdrawn from the depositor’s account at the time of certification, to assure payment with a certification or guarantee by the bank. It carries the signature of a bank officer certifying the check to be genuine and guaranteeing payment. Due to the higher processing costs of certified checks, most banks have replaced them with cashier’s checks."},{"id":"i_3d358fed5aba","t":"d","term":"Chapter 7 bankruptcy","ch":2,"d":4,"hy":false,"body":"A US bankruptcy petition for liquidation filed by a company, which protects the debtor from legal actions by creditors. In Chapter 7 bankruptcy, all remaining assets are liquidated, and the company ceases to exist."},{"id":"i_1f234e4b2fef","t":"d","term":"Chapter 11 bankruptcy","ch":2,"d":4,"hy":false,"body":"A US bankruptcy petition filed by a company that allows it to reorganize under court protection to restructure debts and emerge from bankruptcy after meeting certain conditions imposed by the court."},{"id":"i_5c4122a7d769","t":"d","term":"Chapter 13 bankruptcy","ch":2,"d":4,"hy":false,"body":"A US bankruptcy petition filed by a consumer that allows for the adjustment of debts."},{"id":"i_f0db3fa401ae","t":"d","term":"character","ch":10,"d":1,"hy":false,"body":"As part of the five Cs of credit, this is the perceived honesty or integrity of an individual applicant or a corporate applicant’s officers. Character indicates an intent or willingness to pay, as evidenced by personal or corporate payment history."},{"id":"i_d84c5b37165b","t":"d","term":"charge-back","ch":4,"d":1,"hy":true,"body":"The reversal of a prior outbound transfer of funds from a consumer’s bank account, line of credit, or credit card."},{"id":"i_f0508ec0a12f","t":"d","term":"Check Clearing for the 21st Century Act of 2003 (Check 21)","ch":2,"d":4,"hy":true,"body":"A US law that provided the basis for electronic clearing of checks by allowing the substitution of a copy or image of a check for the original document in the clearing process."},{"id":"i_09c309a0cd0e","t":"d","term":"check conversion","ch":12,"d":1,"hy":true,"body":"The process of converting a paper check to an electronic form, typically an automated clearinghouse (ACH) debit."},{"id":"i_0be85166294a","t":"d","term":"chief executive officer (CEO)","ch":1,"d":1,"hy":false,"body":"The highest-ranking executive in a company whose main responsibilities include developing and implementing high-level strategies, making major corporate decisions, managing the overall operations and resources of the company, and acting as the main point of communication between the board of directors and the corporate operations."},{"id":"i_2fe664f155cb","t":"d","term":"chief financial officer (CFO)","ch":1,"d":1,"hy":false,"body":"The senior executive who is responsible for the financial management of the firm, which includes the accounting and treasury functions. The CFO plays an important role in strategic planning and is pivotal to the capital budgeting and financial planning process. Additionally, the CFO is responsible for accurate financial reporting."},{"id":"i_2636180e5c5f","t":"d","term":"chief risk officer (CRO)","ch":16,"d":4,"hy":false,"body":"The executive accountable to the board of directors for the measurement, management, and reporting of risks that may affect the firm. Sometimes known as the chief risk management officer (CRMO)."},{"id":"i_543b941386ad","t":"d","term":"cleanup period","ch":13,"d":1,"hy":true,"body":"In relation to a commercial line of credit, this is a period of time, usually occurring annually, during which the borrower must pay down all outstanding borrowings and reduce the balance of the loan to zero."},{"id":"i_e21ab62cbcc1","t":"d","term":"clearing","ch":4,"d":1,"hy":true,"body":"The process in which financial institutions use the information contained in a payment instruction, such as a check or wire transfer, to transfer money between themselves on behalf of the payor and the payee (beneficiary), either directly or through some external network."},{"id":"i_1db61e82e4ab","t":"d","term":"clearing channel","ch":4,"d":1,"hy":false,"body":"In a payment system, this is the method used to move either the payment instrument or information related to the instrument between parties involved in the transaction, as well as their banks."},{"id":"i_9b5ded194745","t":"d","term":"clearing float","ch":10,"d":1,"hy":false,"body":"The time interval or delay between the day when a check is deposited by the payee and the day when the payor’s account is debited."},{"id":"i_e285a9e692c8","t":"d","term":"Clearing House Interbank Payments System (CHIPS)","ch":4,"d":1,"hy":false,"body":"A large-dollar funds transfer network operated by The Clearing House Payments Company, a bank-owned company."},{"id":"i_1b8f7e42c556","t":"d","term":"clearinghouse","ch":4,"d":1,"hy":false,"body":"In a payment clearing process, this is a group of banks or other financial institutions (including payment service providers) that agree to exchange payment instruments (paper or electronic) drawn on the member participants."},{"id":"i_610e29e04c3e","t":"d","term":"Clearstream","ch":5,"d":1,"hy":false,"body":"A post-trade services provider owned by Deutsche Boerse AG. Clearstream is one of Europe’s two international central securities depositories (ICSDs). It holds securities to enable book-entry transfer of international securities, as well as domestic securities in Germany and Luxembourg."},{"id":"i_44ebe77c3abd","t":"d","term":"client/server solution","ch":15,"d":5,"hy":false,"body":"A type of technology setup in which individual workstations or computers are connected to a common server over a local or wide area network with a shared database. This allows multiple users to access the application at the same time. The use of a common database ensures that everyone is using the same information and simplifies integration with other systems, such as general ledger, accounts receivable, and accounts payable systems. This type of environment is normally referred to as an installed system, because the software being used is actually installed and resides on the company’s server."},{"id":"i_54d406a960ef","t":"d","term":"closed-loop card","ch":4,"d":1,"hy":false,"body":"A payment card issued by a gas company, department store, or other retailer that is accepted only by the issuing company."},{"id":"i_cd5ae3f7677a","t":"d","term":"coinsurance","ch":16,"d":4,"hy":false,"body":"See reinsurance. Also, in US property insurance, a requirement for the insured to purchase an amount of insurance equal to or greater than a specified proportion of the value of the insured property. And in US health insurance, a requirement for the insured to pay a proportion of any health care costs (rather than a fixed maximum amount)."},{"id":"i_fc07b54ff6d0","t":"d","term":"collateral","ch":6,"d":2,"hy":true,"body":"Assets used as security for a loan or bond issue. They may include physical assets (e.g., plant, equipment, and inventory) or financial assets (e.g., receivables and marketable securities)."},{"id":"i_cfea64d8d965","t":"d","term":"collateral trust bond","ch":6,"d":2,"hy":false,"body":"A type of bond backed by securities of other companies that are owned by the firm issuing the bond."},{"id":"i_c2f6f55e6dd5","t":"d","term":"collateralized loan","ch":10,"d":1,"hy":false,"body":"In inventory financing, this is a type of loan that is arranged using inventory as collateral for the loan, with the lender providing financing for some predetermined percentage of the inventory’s value."},{"id":"i_093adf4169ef","t":"d","term":"collected balance","ch":4,"d":1,"hy":true,"body":"An aggregate of bank account balances that is calculated as the average ledger balance minus the deposit float."},{"id":"i_42c2940cb779","t":"d","term":"collecting bank (presenting bank)","ch":4,"d":1,"hy":false,"body":"(1) In the check-clearing process, this is the bank that accepts a check for deposit and collects the funds from the payor’s bank. The collecting bank is also referred to as the bank of first deposit or the depository bank. (2) In a documentary collection process, this is the bank (the buyer’s bank) that presents the documents to the buyer. The collecting bank is also referred to as the presenting bank (or issuing bank when the transaction includes a letter of credit)."},{"id":"i_5e445ce52fa8","t":"d","term":"collection float","ch":10,"d":1,"hy":true,"body":"The time interval or delay between the time the buyer/payor initiates payment and the time the seller/payee receives good funds; it consists of mail float, processing float, and availability float."},{"id":"i_20ce645f6246","t":"d","term":"collection letter","ch":12,"d":1,"hy":true,"body":"A document in a documentary collection process that specifies the exact procedures to be followed before shipping documents are released to the importer."},{"id":"i_edb30f999216","t":"d","term":"collection on behalf of (COBO)","ch":10,"d":1,"hy":false,"body":"A service where a separate entity (usually a shared services center or in-house bank) manages the receipt of payments to other group entities. Also known as receivables on behalf of (ROBO)."},{"id":"i_bbf9887583a0","t":"d","term":"comfort letter","ch":6,"d":2,"hy":true,"body":"A letter from another party stating actions that it will or will not take on behalf of a borrower. This type of agreement is not technically a guarantee and is not legally enforceable."},{"id":"i_013be0fac314","t":"d","term":"commercial bank","ch":3,"d":3,"hy":true,"body":"A financial institution that accepts deposits and makes commercial loans."},{"id":"i_c864627f3ebc","t":"d","term":"Commercial Book-Entry System (CBES)","ch":5,"d":1,"hy":false,"body":"A multi-tiered, automated system for purchasing, holding, and transferring marketable treasury securities. An entity of the US Federal Reserve, the CBES exists as a delivery system that provides for the simultaneous transfer of securities against the settlement of funds. Securities owners (or their brokers on their behalf) receive interest and redemption payments wired directly to their linked accounts. The CBES is also known as the Treasury/Reserve Automated Debt Entry System, or TRADES."},{"id":"i_00bdf85940a7","t":"d","term":"commercial letter of credit (L/C)","ch":12,"d":1,"hy":false,"body":"A letter of credit (also known as a documentary L/C) that is issued by a bank as the intended mechanism of payment in relation to a trade transaction involving the domestic or international shipment of merchandise. L/Cs are most commonly used in import/export transactions and are sometimes referred to as trade L/Cs."},{"id":"i_6a8c35e2687f","t":"d","term":"commercial paper (CP)","ch":5,"d":1,"hy":false,"body":"Tradable promissory notes that allow the issuer to raise funds in the short-term money market. In the United States, maturity can range from overnight to days for publicly traded CP and up to days for private-placement CP, but most paper issued matures in less than 45 days. CP does not usually pay interest during its term. Instead, it is issued at a discounted price and the face value is paid at maturity."},{"id":"i_121cd165e3a5","t":"d","term":"commitment fee","ch":13,"d":1,"hy":true,"body":"A fee assessed based on the total amount or unused portion of a committed line of credit."},{"id":"i_bb6f8339fb97","t":"d","term":"committed line of credit","ch":13,"d":1,"hy":true,"body":"A credit facility that the lender is legally obliged to provide, subject to the terms and conditions of the agreement, and that cannot be unilaterally withdrawn."},{"id":"i_9c9698e42950","t":"d","term":"Commodity Futures Trading Commission (CFTC)","ch":2,"d":4,"hy":false,"body":"An independent US government agency with the mandate to regulate commodity futures and option markets in the United States."},{"id":"i_759eca9dabc9","t":"d","term":"commodity price risk","ch":16,"d":4,"hy":false,"body":"A type of risk related to the impact of changing commodity prices on the value of an organization. It is the risk that a change in the price (an input price) of a raw material will impact the income (and hence value) of a company that uses that raw material, whether directly or indirectly. It differs considerably from interest rate and foreign exchange risk since most commodities are traded in markets where supply is concentrated in the hands of a few suppliers, which can magnify price volatility."},{"id":"i_7f99b3c29f24","t":"d","term":"common equity","ch":3,"d":3,"hy":true,"body":"The capital contributed by stockholders and earnings retained in the business. Also refers to an account on corporate financial statements that reflects this amount."},{"id":"i_66f54aba0b14","t":"d","term":"common stock","ch":6,"d":2,"hy":true,"body":"A security that represents ownership in a company. The management of a company acts as an agent for shareholders to protect their interests. Equity in the form of common stock usually represents a significant portion of a publicly traded company’s capital base."},{"id":"i_21cff5d14399","t":"d","term":"common-size financial statement","ch":9,"d":2,"hy":true,"body":"A financial statement analysis technique that involves stating line items as percentages rather than amounts. A common-size income statement expresses every line item on the statement as a percentage of revenue, and a commonsize balance sheet expresses each account as a percentage of total assets. Common-size statements enable direct comparisons of financial data for firms of different sizes."},{"id":"i_465d27344037","t":"d","term":"company processing center","ch":12,"d":1,"hy":false,"body":"A business function where check and/or payment card processing, along with deposit preparation, are performed in-house."},{"id":"i_d92baafa4cac","t":"d","term":"competition risk","ch":16,"d":4,"hy":false,"body":"A type of risk where the actions of a company’s competitors affect a company’s ability to meet its own objectives."},{"id":"i_a8e8b80259f4","t":"d","term":"comprehensive income","ch":8,"d":1,"hy":true,"body":"The sum of net income and other items that must bypass the income statement because they have not been realized, including items such as an unrealized holding gain or loss from available-for-sale securities and foreign currency translation gains or losses."},{"id":"i_2598e086a8cf","t":"d","term":"concentration account","ch":12,"d":1,"hy":true,"body":"An account used by an organization to receive funds from collection accounts or to provide funding for disbursement accounts. These accounts are sometimes referred to as header accounts, especially when used in conjunction with a zero balance account (ZBA) and other balance accounts."},{"id":"i_4dd588e4274d","t":"d","term":"concentration flows (funding flows)","ch":10,"d":1,"hy":false,"body":"A practice involving internal transfers among operating units of a company and between a firm’s various bank accounts, with the objectives of pooling funds for other purposes (e.g., to pay down debt or to invest) or funding various disbursement accounts."},{"id":"i_f8eb525d26e1","t":"d","term":"conditions","ch":10,"d":1,"hy":true,"body":"As part of the five Cs of credit, this factor assesses the general, existing macroeconomic environment that impacts a borrower’s ability to pay or the willingness of a lender to grant credit."},{"id":"i_746975d7006f","t":"d","term":"confirming bank","ch":12,"d":1,"hy":false,"body":"In a letter of credit (L/C) transaction, this is the bank that commits to the seller that payment will be made if documents meet the terms and conditions of the L/C, regardless of the issuing bank’s ability to pay."},{"id":"i_5d3e1b6428c0","t":"d","term":"conservative financing strategy","ch":10,"d":1,"hy":true,"body":"A current asset financing strategy that involves using longterm financing (i.e., debt and equity) to finance fixed assets, permanent current assets, and some portion of fluctuating current assets. Short-term financing is used for the remainder of the fluctuating current assets."},{"id":"i_0d54ede2876d","t":"d","term":"consignment","ch":10,"d":1,"hy":true,"body":"A term of sale whereby the supplier (sometimes referred to as the consignor) ships goods to another party (sometimes referred to as the consignee) who has no obligation to pay until the goods have been sold."},{"id":"i_79f41a1f18d6","t":"d","term":"consolidated remittance processing (CRP)","ch":12,"d":1,"hy":false,"body":"A service that provides a single collection point for all types of remittance payments (both electronic and paper) and consolidates all remittance information into one stream of data in a common format. Also known as integrated receivables."},{"id":"i_45e5893ebdf2","t":"d","term":"Consumer Financial Protection Bureau (CFPB)","ch":2,"d":4,"hy":false,"body":"An independent consumer protection entity within the US Federal Reserve that was created as part of the Dodd-Frank Act of 2010."},{"id":"i_89a68d3b2e8a","t":"d","term":"continuous linked settlement (CLS)","ch":2,"d":4,"hy":false,"body":"A process that allows a simultaneous exchange of the payments for both sides of underlying financial transactions (e.g., foreign exchange contracts, non-deliverable forward contracts, and over-the-counter derivative contracts), thereby eliminating settlement risk."},{"id":"i_f74add1708bb","t":"d","term":"contractual transfer","ch":16,"d":4,"hy":true,"body":"A form of risk transfer in which the burden of the risks in question is contractually transferred to another party, who is not an insurer."},{"id":"i_bbfb7f3854fe","t":"d","term":"controlled disbursement","ch":12,"d":1,"hy":true,"body":"A bank service (unique to the United States) that provides same-day notification to a company of the dollar amount of checks that will clear against its disbursement account on a given day. The disbursement account is typically not funded each day until after the daily notification is received."},{"id":"i_2ff38ea238a4","t":"d","term":"convertible security (convertible bond or preferred stock)","ch":6,"d":2,"hy":false,"body":"A type of corporate security that can be converted by the holder, or sometimes the issuer, into another type of security at a fixed ratio or pre-stated price. Convertible bonds can be converted into shares of common or preferred stock. Convertible preferred stock can be converted into common stock. Sometimes referred to simply as a convertible."},{"id":"i_1469596fc89a","t":"d","term":"correlation","ch":14,"d":1,"hy":true,"body":"The degree of association between two variables. As part of regression analysis in cash flow forecasting, correlation calculations involve a statistical identification of the degree of association between a cash flow and another variable. Once this relationship is established, the cash flow can be forecasted based on the actual or expected behavior of the other variable. Correlation does not mean there is a cause-and-effect relationship between the two variables, but rather that when one of two correlated variables changes, the other one does too."},{"id":"i_17de5e169b39","t":"d","term":"correspondent bank","ch":4,"d":1,"hy":true,"body":"In a payment clearing process, this is one of two banks that have accounts with each other for the purpose of clearing and settlement of payment items between the banks. The collecting bank maintains a depository account with another bank, called a correspondent bank. The collecting bank sends cash letters to the correspondent bank, which presents the items to the paying bank through a local clearinghouse or the country’s central bank. The collecting bank’s depository account at the correspondent bank is then credited with the proceeds of the checks."},{"id":"i_a1759915572a","t":"d","term":"cost of capital","ch":6,"d":2,"hy":true,"body":"A measure of the cost a company would incur to raise funds to make investments in assets. The overall cost of capital for a company is a function of the mix of capital components used and the individual costs of each component."},{"id":"i_4b221af48bbf","t":"d","term":"cost of goods sold (COGS)","ch":8,"d":1,"hy":false,"body":"The expense associated with providing the goods or services whose sale is recognized as revenues. COGS includes labor and material directly used in manufacturing the product sold, as well as any indirect or allocated manufacturing expenses."},{"id":"i_35f28e431904","t":"d","term":"cost/benefit analysis","ch":12,"d":1,"hy":true,"body":"A business decision process that assesses whether the relevant economic benefits of a given course of action exceed the relevant economic costs."},{"id":"i_8d4609a61c74","t":"d","term":"counterparty risk","ch":7,"d":3,"hy":true,"body":"The risk that the other party in a contract or financial transaction will not perform as promised. One component of counterparty risk is related to credit and default risk. In a generic context, however, the concept of counterparty risk extends to the risk related to any type of performance failure on the part of any of the counterparties with which an organization must interact."},{"id":"i_7c6ba6d38afe","t":"d","term":"countertrade","ch":12,"d":1,"hy":true,"body":"A trade payment method used by companies that do not have access to sufficient hard currencies (i.e., internationally traded currencies) to pay for imports from other countries. As an example, an exporter ships merchandise to the countertrading country. In exchange, it takes merchandise that may be sold elsewhere in the world."},{"id":"i_1149bbb2128d","t":"d","term":"country risk premium","ch":9,"d":2,"hy":false,"body":"A requirement to earn a higher rate of return on a project in a particular country, reflecting the additional risk of doing business in that country compared with a domestic project."},{"id":"i_d591af8d11b9","t":"d","term":"covariance","ch":19,"d":2,"hy":true,"body":"A measure of the degree to which returns on two assets/stocks move in tandem. A positive covariance means that asset returns move together, while a negative covariance means that returns move inversely. Negative covariance is a desired property for stocks in a portfolio as this can significantly reduce the portfolio’s risk."},{"id":"i_353f9df0ed0f","t":"d","term":"covenant","ch":6,"d":2,"hy":true,"body":"An additional requirement that is placed on debt or bond issues and that imposes constraints on the actions of the company’s management. Covenants may be negative (i.e., actions the company cannot take, such as the double pledging of collateral) or affirmative (i.e., actions the company must take, such as providing regular financial statements or maintaining certain financial ratios)."},{"id":"i_1d43d6391391","t":"d","term":"coverage ratio","ch":9,"d":2,"hy":true,"body":"A type of financial ratio concerned primarily with measuring a company’s ability to make payments on (i.e., service) its debt."},{"id":"i_da7f47127252","t":"d","term":"credit card","ch":4,"d":1,"hy":false,"body":"A payment card issued by a company that provides the holder of the card the ability to borrow funds, typically at the point of sale, to pay for a transaction."},{"id":"i_24dca05685c9","t":"d","term":"Credit Card Accountability Responsibility and Disclosure Act of 2009 (Credit CARD Act)","ch":2,"d":4,"hy":false,"body":"A US law designed to protect consumers from arbitrary pricing and notification practices by credit card companies."},{"id":"i_0715c26ead28","t":"d","term":"credit default swap (CDS)","ch":19,"d":2,"hy":false,"body":"A derivative contract in which a credit exposure is exchanged between two parties. CDS prices are sometimes viewed as a proxy for credit risk."},{"id":"i_748e6085eca3","t":"d","term":"credit enhancement","ch":6,"d":2,"hy":true,"body":"An addition to a borrowing arrangement or debt securities issue meant to improve the overall credit rating on the loan or issue. It generally provides either a guarantee of payment in the event of default or an agreement to provide financing to roll over the debt issue upon maturity."},{"id":"i_5ce57ee86769","t":"d","term":"credit manager","ch":10,"d":1,"hy":false,"body":"A credit management function/position that administers policies for establishing credit standards, defines the terms of trade credit extension, approves customers for credit sales, and sets individual and aggregate credit limits within policy guidelines."},{"id":"i_71b58394684d","t":"d","term":"credit transfer","ch":4,"d":1,"hy":true,"body":"A payment type in which one person or company authorizes a bank or payment service provider to credit a bank account held in the name of another party for payment or payments that are due."},{"id":"i_99cd689762a0","t":"d","term":"credit union","ch":3,"d":3,"hy":false,"body":"A member-owned, not-for-profit financial cooperative that can provide financial services similar to those offered by other types of financial institutions, including banks and insurance companies. In the United States, they are chartered by either federal or state agencies and originally were intended to restrict membership to individuals with a common affiliation (e.g., an employer, association, community organization, or geographic location) but may now include businesses as members."},{"id":"i_d5f7560be1cd","t":"d","term":"crowdfunding","ch":6,"d":2,"hy":false,"body":"A private financing technique used, typically by start-up or smaller companies, to access equity finance. In a crowdfunding model, a relatively large number of investors each typically pledges a relatively small amount of funding."},{"id":"i_8548d20d0514","t":"d","term":"cryptocurrency","ch":15,"d":5,"hy":true,"body":"A form of virtual currency that uses distributed ledger technology, or blockchain, to verify and record transactions."},{"id":"i_4f994ca249d7","t":"d","term":"cumulative voting","ch":20,"d":2,"hy":true,"body":"A form of voting that allows a shareholder as many votes per share owned as there are open positions on the board in the same election."},{"id":"i_f0d9e784d69c","t":"d","term":"cure period","ch":6,"d":2,"hy":true,"body":"A period of time, often specified in a loan agreement, in which an event of default may be corrected before the lender may pursue default remedies."},{"id":"i_3c92de909cdf","t":"d","term":"currency derivative","ch":17,"d":4,"hy":true,"body":"A hedging instrument that allows trading partners to establish predetermined exchange rates for set periods, which effectively protects against foreign exchange risk. Currency derivatives include option, futures, swap, and forward contracts."},{"id":"i_e00927108916","t":"d","term":"current account","ch":7,"d":3,"hy":true,"body":"A bank depository account that is both a store of value (deposits) and, perhaps more importantly for treasury management purposes, a vehicle through which an account holder uses a bank to transfer funds to, and receive deposits from, a third party. Referred to as a checking or demand deposit account (DDA) in the United States."},{"id":"i_84791a3c26f9","t":"d","term":"current asset turnover ratio","ch":9,"d":2,"hy":true,"body":"An efficiency/asset management ratio that measures how many times the firm has turned over the stock of its most liquid assets with the flow of revenue. It is computed as revenues divided by current assets."},{"id":"i_e65e6d5e4c00","t":"d","term":"current assets","ch":8,"d":1,"hy":true,"body":"A term that generally refers to assets that are expected to be converted into cash within one year."},{"id":"i_eb6a285038c9","t":"d","term":"current liabilities","ch":8,"d":1,"hy":true,"body":"A term that generally refers to liabilities that are required to be paid for within one year."},{"id":"i_596f392f4ef1","t":"d","term":"current ratio","ch":10,"d":1,"hy":true,"body":"A ratio defined as total current assets divided by total current liabilities. It is therefore the ratio of cash and assets expected to become cash in one year or less, to shortterm liabilities that must be paid in one year or less."},{"id":"i_10a456880bff","t":"d","term":"custodian","ch":6,"d":2,"hy":true,"body":"A third party that typically takes possession of securities, receives delivery or book entry of principal and interest payments, performs record keeping, and provides maintenance services for an investment portfolio."},{"id":"i_be6ef44860d2","t":"d","term":"customer identification program (CIP)","ch":7,"d":3,"hy":false,"body":"The processes used by a financial institution to verify and validate the stated identity of a customer. A CIP is normally part of the “know your customer” and anti-money laundering processes of a financial institution."},{"id":"i_b1d8337b15fc","t":"d","term":"cutoff time","ch":4,"d":1,"hy":false,"body":"A time by which a specific process, such as depositing payments, must be completed for processing in the current cycle. For example, checks deposited after the current day’s cutoff time will typically be processed the next day."},{"id":"i_2745d8250d44","t":"d","term":"cyber risk","ch":16,"d":4,"hy":true,"body":"A type of risk associated with security breaches involving employee, customer, and corporate data. These security breaches may come from both internal and external sources. Data may be corrupted, ransomed, or stolen and sold to third parties. Security breaches also include denial-of-service attacks where data communication is blocked."},{"id":"i_93f92dfa9438","t":"d","term":"cyclical pattern","ch":14,"d":1,"hy":false,"body":"A pattern that repeats without regard to time of year."},{"id":"i_f90453ec712c","t":"d","term":"dashboard","ch":15,"d":5,"hy":true,"body":"A user interface or display that summarizes and presents information
