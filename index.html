in a way that is easy to read and understand."},{"id":"i_204fe1db58ba","t":"d","term":"day count convention","ch":9,"d":2,"hy":false,"body":"The practice used to calculate accrued interest on debt securities. Each market has its own convention, which describes how the number of days in a month (30 or actual) and in a year ( , , or ) are counted when performing these calculations."},{"id":"i_320d4343a687","t":"d","term":"daylight overdraft","ch":4,"d":1,"hy":false,"body":"A type of overdraft position that occurs when a financial institution permits a corporation to make payments that exceed the available balance on the corporation’s account. These overdraft positions are usually eliminated by funds that arrive later in the day."},{"id":"i_3714ce8db48a","t":"d","term":"days cash held","ch":11,"d":1,"hy":true,"body":"A measure of a firm’s liquidity that shows how long a firm can continue to pay operating expenses without any additional revenue. Also known as days cash on hand."},{"id":"i_cac548815cb8","t":"d","term":"days inventory (DI)","ch":10,"d":1,"hy":false,"body":"In the cash conversion cycle, this is the average number of days that elapse from the purchase of raw materials until the sale of finished goods. Also referred to as days sales in inventory. May be used interchangeably with inventory period or inventory conversion period, but those terms may also be used to describe the length of this process for a specific product, while days inventory is always the average of that time period for all of a company’s products."},{"id":"i_c022a20b6c5c","t":"d","term":"days payables (DP)","ch":10,"d":1,"hy":false,"body":"In the cash conversion cycle, this is the average number of days between the purchase/receipt of materials, supplies, or services, and the issuance of payment for them. Also referred to as the payables conversion period."},{"id":"i_2d68dcc7c82b","t":"d","term":"days receivables (DR)","ch":10,"d":1,"hy":false,"body":"In the cash conversion cycle, this is the average number of days required to collect on credit. Also referred to as the receivables conversion period."},{"id":"i_8f70ebcc0bc6","t":"d","term":"days sales outstanding (DSO)","ch":11,"d":1,"hy":false,"body":"The average number of days required to convert a credit sale into a cash inflow. Also referred to as the average collection period."},{"id":"i_ed5af2b547e6","t":"d","term":"days working capital (DWC)","ch":11,"d":1,"hy":false,"body":"The number of days sales invested in working capital."},{"id":"i_3cd957a381fd","t":"d","term":"debentures","ch":6,"d":2,"hy":true,"body":"Unsecured bonds that represent general claims against the issuer organization’s assets and/or cash flows, and may carry a higher interest cost (to the issuer) than secured bonds."},{"id":"i_30c939643e41","t":"d","term":"debit card","ch":4,"d":1,"hy":true,"body":"A card that allows access to funds directly from a cardholder’s checking or savings deposit account and can be either signature-based or personal identification number (PIN)- based. Often referred to as EFTPOS in many parts of the world. EFTPOS refers to electronic funds transfer (EFT) at the point of sale (POS)."},{"id":"i_eb1d419d7d2c","t":"d","term":"debt indenture","ch":6,"d":2,"hy":true,"body":"A legal document that outlines the rights and obligations of the borrower (bond issuer) and lender (bondholder). It is a contract between the issuing company and the bondholders, which includes various restrictive covenants that impose constraints on the actions of the company’s management."},{"id":"i_c8c5835931a0","t":"d","term":"debt management ratio","ch":9,"d":2,"hy":true,"body":"A type of ratio that measures the firm’s degree of indebtedness and its ability to service its debt."},{"id":"i_a55c0ed88092","t":"d","term":"debt market","ch":6,"d":2,"hy":true,"body":"A financial market in which participants can issue new debt, or buy and sell debt securities."},{"id":"i_da004316c518","t":"d","term":"debt to equity ratio","ch":9,"d":2,"hy":false,"body":"The measurement of the degree of debt financing used per dollar of equity capital."},{"id":"i_00e40d31ab11","t":"d","term":"debt to tangible net worth ratio","ch":9,"d":2,"hy":true,"body":"A type of debt management ratio that excludes intangible assets (e.g., goodwill, patents, trademarks, and copyrights) on the balance sheet. It is computed as total debt divided by total equity minus intangible assets."},{"id":"i_a6950a3092c2","t":"d","term":"deemed dividend","ch":20,"d":2,"hy":true,"body":"A situation that occurs when payments on loans, sales of stock, or other transactions may be interpreted by tax authorities as an attempt by a company to avoid paying taxes on dividends. The payments may be considered (i.e., “deemed”) dividends and appropriate taxes may then be charged. Deemed dividends are a potential issue for any global company and can vary significantly from country to country."},{"id":"i_187c8f1506b6","t":"d","term":"default premium","ch":13,"d":1,"hy":true,"body":"An adjustment to the base interest rate to account for possible default on an investment."},{"id":"i_b5642bd6a072","t":"d","term":"default/credit risk","ch":5,"d":1,"hy":true,"body":"A form of risk that refers to the likelihood that the payments owed to investors will not be made under the original terms. It is related to how a change in the credit quality of a company, including its ability to make payments in a timely manner, would affect the value of a security or portfolio of investments. Issuers of money market instruments with higher default risk must offer investors a higher yield to compensate for the increased risk. This increased yield represents a risk premium (i.e., the incremental yield above an otherwise comparable security)."},{"id":"i_f4efc31cc7ba","t":"d","term":"defeasance of debt","ch":6,"d":2,"hy":true,"body":"A financial management method that removes debt from a borrowing organization’s balance sheet without actually retiring the debt issue. In this arrangement, the borrower places sufficient funds in escrow, usually in government securities, to pay for interest and principal on the debt issue. Because control of both the debt and escrow funds is relinquished, and payment and retirement of the debt issue is now guaranteed, this debt and the related securities can be removed from the balance sheet and do not need to be considered in relation to any restrictive covenants the organization may have regarding debt."},{"id":"i_444b49f7b1af","t":"d","term":"degree of certainty","ch":14,"d":1,"hy":true,"body":"In the cash flow forecasting process, this is the practice of designating cash flows as known cash flows, predictable cash flows, less predictable cash flows, or volatile cash flows."},{"id":"i_0d7cceaeedd0","t":"d","term":"demand deposit account (DDA)","ch":3,"d":3,"hy":false,"body":"An account through which an account holder uses a bank to transfer funds to, and receive deposits from, a third party. Also known as a checking account or a current account."},{"id":"i_217a3e73c8d7","t":"d","term":"demand guarantee","ch":12,"d":1,"hy":false,"body":"Similar to a standby letter of credit, this is a document in which a third party commits to making payment to a beneficiary in the event that the primary counterparty cannot."},{"id":"i_a6316daa15d8","t":"d","term":"departmental (unnamed) card","ch":4,"d":1,"hy":false,"body":"A variation on the purchasing card in which each department has its own purchasing card for general use by that department. The card is linked to the department rather than to an individual, and, unlike most cards, there is no individual’s name on the card."},{"id":"i_2fcc9284ea89","t":"d","term":"deposit deadline","ch":4,"d":1,"hy":true,"body":"The time within the banking day when an item must be ready for transit at the depository bank’s processing center to qualify for the availability stated in the availability schedule."},{"id":"i_54e3fb2b249c","t":"d","term":"deposit float","ch":4,"d":1,"hy":false,"body":"The sum of the daily dollar amount of items in the process of collection (primarily checks), divided by the number of calendar or business days in the account analysis period."},{"id":"i_9f3c5cfceba2","t":"d","term":"deposit insurance (deposit guarantee)","ch":2,"d":4,"hy":false,"body":"A regulatory safeguard that protects the assets of smaller deposit customers (typically consumers, although corporate accounts are also often covered up to a certain amount) who would be most harmed by a bank failure."},{"id":"i_ef82191483c7","t":"d","term":"depositary receipt (DR)","ch":6,"d":2,"hy":false,"body":"A type of negotiable financial instrument (typically an equity security) that trades on a local exchange but actually represents stock ownership in a foreign, publicly listed company. See also American depositary receipt (ADR) and global depositary receipt (GDR)."},{"id":"i_2d8cc289e3d2","t":"d","term":"depository bank","ch":4,"d":1,"hy":true,"body":"The bank or financial institution in which a check is deposited for processing and clearing. Also known as the bank of first deposit, collecting bank, or payee’s bank."},{"id":"i_97ba07d1021b","t":"d","term":"Depository Institutions Deregulation and Monetary Control Act of 1980 (DIDMCA)","ch":2,"d":4,"hy":false,"body":"A US legislative act that provided for a phase-out of interest rate ceilings for financial institutions, mandated that all depository institutions hold reserves at the Federal Reserve (the Fed), made Fed services such as the discount window and check clearing available to all deposit-taking institutions, and mandated that the Fed price or eliminate its float in the check-clearing system. The act is also referred to as the Monetary Control Act."},{"id":"i_490bc069e3ef","t":"d","term":"Depository Trust & Clearing Corporation (DTCC)","ch":5,"d":1,"hy":true,"body":"An investment-industry-owned corporation that works through its subsidiaries to provide clearing, settlement, and information services for equities, corporate and municipal bonds, government and mortgage-backed securities, money market instruments, and over-the-counter derivatives. It was formed in 1999 by the combination of the Depository Trust Company (DTC) and the National Securities Clearing Corporation (NSCC), both of which are now subsidiaries of the DTCC."},{"id":"i_28e734a5839b","t":"d","term":"depreciation","ch":8,"d":1,"hy":true,"body":"The measurement of the deterioration of an asset over the reporting period."},{"id":"i_1c8ac8d97a42","t":"d","term":"derivative","ch":8,"d":1,"hy":true,"body":"A financial product that acquires its value by inference through a formulaic connection to another asset. The other asset is termed the underlying asset and can be a financial instrument (e.g., a stock or bond), currency, or commodity."},{"id":"i_a1212e1da2ea","t":"d","term":"digital certificate","ch":15,"d":5,"hy":true,"body":"An electronic commerce security product that ties the identity of the user (private key) to the user’s public key and may also authenticate the devices used to create documents or transactions."},{"id":"i_e8a7bc52636f","t":"d","term":"digital signature","ch":15,"d":5,"hy":true,"body":"A message encoded with the sender’s secret, private key that the receiver can use to identify the source. A digital signature is essentially an electronic signature used in place of a written signature and is tied to a document and to the signer, meaning the signer’s digital signature will be different for each document signed."},{"id":"i_80f0a45ce74c","t":"d","term":"digitized signature","ch":15,"d":5,"hy":true,"body":"A scanned version of a written signature. A digitized signature should not be confused with a digital signature, which is an electronic signature used in place of a written signature."},{"id":"i_84e4fb3573cf","t":"d","term":"direct debit","ch":4,"d":1,"hy":false,"body":"A payment type in which one person or company authorizes another to automatically debit its bank account for payment or payments that are due."},{"id":"i_953438f4cffd","t":"d","term":"direct deposit","ch":12,"d":1,"hy":false,"body":"A transfer made from a company’s account to the account of an employee, shareholder, vendor, or trading partner using an automated clearinghouse (ACH) credit transaction. Also known as a credit transfer."},{"id":"i_cf86061d052f","t":"d","term":"direct method forecast","ch":14,"d":1,"hy":false,"body":"A forecasting technique based on actual and predicted cash flows."},{"id":"i_eccd05d345ed","t":"d","term":"disaster recovery","ch":1,"d":1,"hy":true,"body":"The restoration of systems and communications after an event (e.g., storm or cyberattack) causes an outage."},{"id":"i_67433801d394","t":"d","term":"disbursement float","ch":10,"d":1,"hy":true,"body":"The time interval or delay between the day when a payment is initiated and the day when funds are debited from the payor’s account."},{"id":"i_631e088a6812","t":"d","term":"disbursements schedule","ch":14,"d":1,"hy":true,"body":"A schedule that involves forecasting the cash disbursements for purchases and other cash outflows, such as payroll, taxes, interest, dividends, rent, and debt repayments. It is a component of the receipts and disbursements forecast process."},{"id":"i_e27344cb5f8a","t":"d","term":"discount (discount rate)","ch":13,"d":1,"hy":false,"body":"(1) Used in the valuation of discount investments such as US Treasury bills, commercial paper, and banker’s acceptances, this is the rate used to determine the present value or purchase price of the instrument. In calculations, the discount rate is defined as the dollar discount divided by the par, or maturity, value and then annualized using the appropriate day count convention (e.g., a -day year for US money market instruments). (2) Used in discussions of monetary policy, this is the rate of interest charged by the US Federal Reserve to US financial institutions."},{"id":"i_202972959e46","t":"d","term":"discount brokerage","ch":3,"d":3,"hy":true,"body":"A brokerage firm that lets investors make trades at reduced prices but provides little or no investment advice."},{"id":"i_e0e22f50c137","t":"d","term":"discount terms","ch":10,"d":1,"hy":true,"body":"A term of sale whereby the seller offers a discount on payments made prior to the net due date. Terms of 2/10 net 30 mean that the total amount is due within 30 days of the invoice date, but the buyer can take a 2% discount if it pays within 10 days."},{"id":"i_b9f4273f6420","t":"d","term":"distributed ledger technology","ch":15,"d":5,"hy":false,"body":"A distributed database that maintains a continuously growing list of records secured from tampering and revision. Data is geographically spread across multiple sites, countries, and/or institutions."},{"id":"i_c6fbbcc82340","t":"d","term":"distribution","ch":3,"d":3,"hy":true,"body":"An investment bank function that involves a securities sale to investors by an investment bank or syndicate of investment banks (sometimes performed by a brokerage firm on behalf of the investment bank or syndicate)."},{"id":"i_aa56d3198ba6","t":"d","term":"distribution forecast","ch":14,"d":1,"hy":false,"body":"A short-term forecasting methodology that uses historical patterns to allocate proportions of total cash flow over a time period."},{"id":"i_c6da83952ddd","t":"d","term":"diversification","ch":19,"d":2,"hy":true,"body":"A method of managing risk by including a wide variety of investments with differing characteristics in a portfolio so that the risk of loss due to the failure of any one individual security is minimized."},{"id":"i_86f8f1f8e538","t":"d","term":"dividend capture","ch":13,"d":1,"hy":true,"body":"A tax-motivated, short-term investment strategy that is available to corporations that pay taxes in the United States. A corporation may exclude from its taxable income 50–65% of the dividends received from stock owned in another corporation, as long as it owns the stock for at least 46 days of the 91-day period starting 45 days prior to the ex-dividend date. Even though dividend capture requires an equity investment, the strategy is considered a short-term investment because the stock is held only long enough to capture the dividend and qualify for the dividend exclusion."},{"id":"i_9c3e8e1a5134","t":"d","term":"dividend declaration date","ch":20,"d":2,"hy":true,"body":"The date when the board of directors announces (declares) a dividend."},{"id":"i_bf617afffb25","t":"d","term":"dividend payment date","ch":20,"d":2,"hy":true,"body":"The date when a dividend is paid."},{"id":"i_c16d921a2c1a","t":"d","term":"dividend policy","ch":20,"d":2,"hy":true,"body":"A company’s policy regarding whether to pay dividends and, if so, how much and when to pay. Dividend policies are typically set by the chief executive officer or board of directors, often after a recommendation from the treasurer."},{"id":"i_31a222c6b396","t":"d","term":"dividend record date","ch":20,"d":2,"hy":true,"body":"The date on which all shareholders of record are entitled to receive a declared dividend. Also known as a shareholder-of-record date, or just holder-of-record date."},{"id":"i_e8da2c22f5ab","t":"d","term":"dividend reinvestment plan (DRIP)","ch":20,"d":2,"hy":false,"body":"A plan that enables existing shareholders to purchase additional shares directly from the company on a when-desired basis, normally with no commission or with only a small processing charge. These plans also allow investors to reinvest dividends automatically in additional shares of company stock."},{"id":"i_02b5bb7ea3bd","t":"d","term":"dividend signaling","ch":20,"d":2,"hy":true,"body":"A theory that dividends have information content or a signaling effect. Dividends are observed to contain information that signals management’s intentions to investors and may provide information regarding expected future earnings."},{"id":"i_360691127e08","t":"d","term":"documentary collection","ch":12,"d":1,"hy":true,"body":"A trade payment mechanism that processes the collection of a draft and accompanying shipping documents through international correspondent banks. Instructions regarding the transaction specifics are contained in a collection letter that accompanies the documentation. It is the responsibility of the exporter (i.e., the seller) to determine the instructions specified in the collection letter."},{"id":"i_099d4544b6b6","t":"d","term":"documents against acceptance","ch":12,"d":1,"hy":false,"body":"A type of collection letter (in a documentary collection process) that uses a time draft, which is a draft payable on a specified future date, that must be accepted by the importer before the collecting bank may release documents. Upon maturity of the time draft, it is presented to the importer for payment."},{"id":"i_994c57a9c896","t":"d","term":"documents against payment","ch":12,"d":1,"hy":false,"body":"A type of collection letter (in a documentary collection process) that uses a sight draft, which is a draft payable on demand, that requires the collecting bank to receive full and final payment of the amount owed prior to releasing the documents."},{"id":"i_42c87418a9c4","t":"d","term":"Dodd-Frank Wall Street Reform and Consumer Protection Act of 2010","ch":2,"d":4,"hy":true,"body":"Legislation enacted in the United States in response to concerns related to the financial services industry in the wake of the global financial crisis of 2007–2009. The act had a major impact on the regulation of banks and other financial institutions and brought financial consumer protection under a single authority."},{"id":"i_067d28080be7","t":"d","term":"dollar discount","ch":13,"d":1,"hy":true,"body":"The difference between the purchase price and the par, or maturity, value on discounted investment instruments, such as US Treasury bills, commercial paper, and banker’s acceptances. This difference represents interest earned on the investment."},{"id":"i_07e29097bde4","t":"d","term":"dollar-days","ch":12,"d":1,"hy":true,"body":"A unit of measurement that reflects both a transaction’s dollar amount and the number of days of float delay. The dollar-days of float on an individual check are calculated by multiplying the dollar amount of the check by the number of days from the time the payor mails the check to the time when the payee is granted credit, or availability, of collected funds."},{"id":"i_0e7766b460fd","t":"d","term":"draft","ch":12,"d":1,"hy":false,"body":"A financial instrument that represents a commitment to pay by the issuing bank. A sight draft is payable on demand, while a time draft is payable at some specified point in the future."},{"id":"i_25cd6113cb16","t":"d","term":"drawdown (reverse) wire","ch":12,"d":1,"hy":false,"body":"A type of wire transfer that is a request sent by a company’s bank to a second bank requesting that the second bank initiate a wire transfer from either the company’s account or another party’s account at the second bank, sending the funds back to the first bank. The party being debited must pre-authorize the transfer."},{"id":"i_0ea4a96a8873","t":"d","term":"dual- or multi-class stock","ch":20,"d":2,"hy":false,"body":"Stock issued in more than one class (e.g., Class A and Class B)."},{"id":"i_5daa29d3c78c","t":"d","term":"dual reporter","ch":8,"d":1,"hy":false,"body":"A multinational company with entities that must prepare financial statements to more than one set of standards (e.g., US GAAP and IFRS)."},{"id":"i_81475c82de27","t":"d","term":"DuPont approach","ch":9,"d":2,"hy":true,"body":"An integrated ratio analysis technique that looks at the return on equity (ROE) as a relationship among an organization’s net profit margin, asset management, and financial leverage."},{"id":"i_5d3f344b5bd2","t":"d","term":"duration","ch":19,"d":2,"hy":true,"body":"A measurement of a financial instrument’s sensitivity to interest rate changes. See Macaulay duration and modified duration."},{"id":"i_5a56387355a0","t":"d","term":"Durbin Amendment","ch":2,"d":4,"hy":false,"body":"An amendment to the Dodd-Frank Act in the United States that restricts interchange fees, or fees that financial institutions may charge for processing debit card payments, and that is intended to increase competition in payment processing."},{"id":"i_677132f43ac6","t":"d","term":"earnings before interest and taxes (EBIT)","ch":8,"d":1,"hy":true,"body":"A measure of operating income or profit that is calculated as gross profit less operating expenses, depreciation, and amortization. EBIT is traditionally used to evaluate a firm’s ability to generate operating profits and to meet its financial and tax obligations."},{"id":"i_43650d18d805","t":"d","term":"earnings before interest, taxes, depreciation, and amortization (EBITDA)","ch":8,"d":1,"hy":true,"body":"A measure of operating profitability that is calculated as gross profit less operating expenses (but not subtracting depreciation and amortization). EBITDA first came into common use with leveraged buyouts in the 1980s, when it was used to indicate the ability of a company to service debt. As time passed, it became popular in industries with expensive assets that had to be written down over long periods. Many companies, especially in the technology sector, now commonly quote EBITDA."},{"id":"i_2147e08168b2","t":"d","term":"earnings credit allowance","ch":7,"d":3,"hy":true,"body":"The total dollar value of earnings credit (imputed interest) that can be used by a company to offset the bank service charges incurred during the account analysis period."},{"id":"i_843483bc6e6e","t":"d","term":"earnings credit rate","ch":7,"d":3,"hy":false,"body":"A short-term rate that is multiplied by the investable balance held in a corporate bank account to determine the earnings credit allowance for the period, as part of the account analysis process."},{"id":"i_4cc04e4cef25","t":"d","term":"earnings multiplier approach","ch":19,"d":2,"hy":false,"body":"A relative valuation model in which a company’s earnings multiplier, or earnings multiple, is compared with those of other companies or against an industry average. The earnings multiplier, or earnings multiple, is calculated as the company’s stock price divided by its earnings per share (EPS)."},{"id":"i_0a0fce3aca08","t":"d","term":"EBIT","ch":8,"d":1,"hy":true,"body":"See earnings before interest and taxes."},{"id":"i_b550ae9642f6","t":"d","term":"EBITDA","ch":8,"d":1,"hy":false,"body":"See earnings before interest, taxes, depreciation, and amortization."},{"id":"i_1297cdd11ada","t":"d","term":"EBITDA margin","ch":9,"d":2,"hy":false,"body":"A measure of operating profitability calculated by dividing EBITDA (earnings before interest, taxes, depreciation, and amortization) by total revenues."},{"id":"i_b7071931ed18","t":"d","term":"economic development bond","ch":6,"d":2,"hy":true,"body":"A type of bond typically issued by a developing country or sponsoring organization, such as the World Bank or the International Monetary Fund, for the express purpose of fostering development of infrastructure and related projects."},{"id":"i_f27c716d17b1","t":"d","term":"economic order quantity (EOQ) model","ch":10,"d":1,"hy":false,"body":"A model used to calculate optimal inventory levels, given specified ordering and holding costs."},{"id":"i_6d7a2eda142f","t":"d","term":"economic risk","ch":17,"d":4,"hy":false,"body":"A form of foreign exchange risk that represents the long-term effect of changes in exchange rates on the present value of future cash flows. Multinational corporations that conduct business in several different currencies are, in the long run, always subject to fluctuations in cash flows because of exchange rate changes. Even companies that only make domestic sales are exposed to economic risk whenever there is foreign competition within the local market or if they, or their suppliers, source inputs from abroad. Also known as operating risk."},{"id":"i_17abfefafb3e","t":"d","term":"economic sanctions","ch":12,"d":1,"hy":false,"body":"Government-imposed restrictions on doing business with a named person or entity, or within a particular country."},{"id":"i_9847eafaf66a","t":"d","term":"economic value added (EVA)","ch":9,"d":2,"hy":false,"body":"A performance measurement ratio that isolates the funds available to all suppliers of capital and then relates that total to the amount of capital supplied. It can be computed by multiplying earnings before interest and taxes (EBIT) by one minus the company’s tax rate, and then subtracting an implied capital charge, calculated as the product of the weighted average cost of capital (WACC) and long-term debt and equity."},{"id":"i_f7f02427b974","t":"d","term":"economies of scale","ch":1,"d":1,"hy":true,"body":"A relationship that indicates that as a company expands, its average unit cost of production falls."},{"id":"i_662239afe527","t":"d","term":"efficiency/asset management ratio","ch":9,"d":2,"hy":true,"body":"A type of ratio that measures how effectively assets are utilized."},{"id":"i_26844c449f4b","t":"d","term":"electronic bank account management (eBAM)","ch":15,"d":5,"hy":false,"body":"A type of bank account management process that attempts to digitalize much of the process by employing electronic messages and files in the data exchange between banks and their customers. Bank account management refers to the management of the various facets of an organization’s relationship with its bank(s), including opening and closing accounts, managing authorized signatories, and maintaining proper copies of documentation."},{"id":"i_d6e93f724a69","t":"d","term":"electronic bill presentment and payment (EBPP)","ch":12,"d":1,"hy":false,"body":"A system for integrating the billing and payment processes, thereby enabling companies to send electronic statements and receive electronic remittances from customers. It is the retail consumer version of electronic invoice presentment and payment (EIPP)."},{"id":"i_18e92fdfea1d","t":"d","term":"Electronic Data Gathering, Analysis, and Retrieval (EDGAR) database","ch":8,"d":1,"hy":true,"body":"A database that contains a searchable listing of US Securities and Exchange Commission (SEC) filings for public companies."},{"id":"i_1c1a5f30ac77","t":"d","term":"electronic data interchange (EDI)","ch":15,"d":5,"hy":false,"body":"A traditional building block of electronic commerce that is based on an infrastructure using standardized communication formats to exchange business data between two trading partners."},{"id":"i_bfb8d6b2e323","t":"d","term":"Electronic Federal Tax Payment System (EFTPS)","ch":12,"d":1,"hy":true,"body":"A system that serves as the primary method for collecting and accounting for US federal taxes withheld by employers from individuals’ salaries and wages, as well as corporate business, sales, and excise taxes."},{"id":"i_605d05659878","t":"d","term":"electronic funds transfer (EFT)","ch":4,"d":1,"hy":false,"body":"A payment that is cleared and settled electronically."},{"id":"i_3a2262765f73","t":"d","term":"electronic invoice presentment and payment (EIPP)","ch":12,"d":1,"hy":false,"body":"A system for integrating the billing and payment processes, thereby enabling companies to send electronic statements and receive electronic remittances from customers. EIPP is typically used for corporate customers."},{"id":"i_b28115499fdb","t":"d","term":"electronic lockbox","ch":12,"d":1,"hy":true,"body":"A variation of the lockbox approach that provides a single collection point for all automated clearinghouse (ACH) and wire payments for organizations with a large number of electronic funds transfer (EFT) collections. It can also process electronic remittance information."},{"id":"i_15fd144c1cb5","t":"d","term":"Electronic Signatures in Global and National Commerce Act of 2000 (E-Sign Act)","ch":2,"d":4,"hy":true,"body":"US legislation that was enacted to support electronic commerce (e-commerce) initiatives and grant digital signatures the same legal status as handwritten ink signatures. It establishes the legal certainty of e-commerce transactions and provides a measure of confidence around the enforceability of electronic transactions."},{"id":"i_4a3c2502c61b","t":"d","term":"employee risk","ch":16,"d":4,"hy":true,"body":"A type of risk that is related to employees and represents a significant source of internal operational risk. The general risk of intentional employee fraud is known as defalcation risk, while the specific case of theft of money, securities, or property by an employee is known as fidelity risk. A more significant source of internal risk stems from unintentional actions by employees. Examples include employee errors in data entry or reentry, as well as transposition or deletion of numbers."},{"id":"i_fdd85fbc3d1b","t":"d","term":"EMV","ch":4,"d":1,"hy":false,"body":"An acronym for Europay, Mastercard, and Visa that refers to a global standard for the use of smart cards (or chip cards) as either debit or credit cards."},{"id":"i_d780042543b5","t":"d","term":"encryption","ch":15,"d":5,"hy":true,"body":"The process of transforming information using some type of computer-based model to make it unreadable to anyone except those possessing special knowledge, similar to a password, usually referred to as a key."},{"id":"i_44079a8f87b1","t":"d","term":"enterprise resource planning (ERP) system","ch":15,"d":5,"hy":false,"body":"A sophisticated information management, production, and accounting software package that links different functional areas or operational divisions of a company on an enterprise-wide basis."},{"id":"i_d99fb503a1f1","t":"d","term":"enterprise risk management (ERM)","ch":16,"d":4,"hy":false,"body":"A comprehensive, organization-wide approach to identifying, measuring, and managing the various risks that threaten the achievement of an organization’s strategic objectives and therefore its overall operations. It is characterized as having a viewpoint that encompasses all areas of the organization."},{"id":"i_e8fa7dc9edc1","t":"d","term":"environmental, social and governance (ESG) strategy","ch":1,"d":1,"hy":false,"body":"A strategy to identify and manage the environmental, social, and governance factors that could impact a company’s ability to meet its long-term objectives."},{"id":"i_8f5b28c9dcd2","t":"d","term":"environmental, social, and governance (ESG) bond","ch":6,"d":2,"hy":false,"body":"A type of bond that may be used to raise funds for general use, or to fund specific environmental or social projects. Issuers of ESG bonds have to meet certain principles or key performance indicator’s (e.g., sustainability targets); failure to do so may require the issuer to pay a higher coupon rate on the bond."},{"id":"i_f9c5201088fe","t":"d","term":"environmental, social, and governance (ESG) risk","ch":16,"d":4,"hy":false,"body":"The risk that a failure to manage ESG issues will result in reputational risk and/or financial loss."},{"id":"i_b78df58274ca","t":"d","term":"equipment trust certificate","ch":6,"d":2,"hy":true,"body":"A type of bond that is secured by movable equipment (e.g., an aircraft, a fleet of trucks, or railroad equipment). Each certificate is backed by a specific asset or group of assets (i.e., there is no blanket lien securing the issue)."},{"id":"i_54a1acb7011a","t":"d","term":"equity capital","ch":9,"d":2,"hy":true,"body":"The invested capital of an organization (as contrasted with borrowed or debt capital). From an accounting point of view, equity capital consists of all preferred and common equity accounts, including retained earnings, and is typically represented by securities such as shares of common and preferred stock."},{"id":"i_a4aa049f191b","t":"d","term":"equity market","ch":6,"d":2,"hy":true,"body":"A market where shares in companies are issued and traded. Consisting of both primary and secondary markets, it is also known as the stock market."},{"id":"i_9d8b2bad860c","t":"d","term":"equity price risk","ch":16,"d":4,"hy":true,"body":"A type of risk usually associated with volatility in stock prices. The general form of this risk refers to the sensitivity of an instrument or portfolio value to a change in broad stock market indices, while the firm-specific portion of this risk relates just to the company in question."},{"id":"i_9e677e4ac1d5","t":"d","term":"equity securities","ch":6,"d":2,"hy":true,"body":"Stock (shares) that represents the ownership of publicly owned corporations."},{"id":"i_90b601b6ca8d","t":"d","term":"escheatment","ch":2,"d":4,"hy":true,"body":"The process of turning over unclaimed assets to the government, in specific instances. In the business world, escheat statutes primarily impact banks or companies that hold unclaimed assets of customers or employees. The most general occurrence of escheat is when an entity (e.g., a bank) holds money or property (e.g., an account in that bank) and the property goes unclaimed for some specified period of time (generally referred to as a dormant account). In many jurisdictions, if the owner cannot be located, such property must be escheated to the government."},{"id":"i_d6e01aa1d166","t":"d","term":"escrow","ch":6,"d":2,"hy":false,"body":"An arrangement where assets owed by one party to another party are held by a third party until a particular condition is met."},{"id":"i_3442496b96dd","t":"d","term":"STR","ch":13,"d":1,"hy":true,"body":"See euro short-term rate."},{"id":"i_6e6b518ae7b5","t":"d","term":"STR)","ch":13,"d":1,"hy":false,"body":"The risk-free reference rate for the European Central Bank (ECB)."},{"id":"i_bb46cba4c740","t":"d","term":"Eurobond","ch":6,"d":2,"hy":true,"body":"A type of bond sold simultaneously in many countries outside the country of the borrower and denominated in a currency other than that of the country in which it is issued. Usually, a Eurobond is issued by an international syndicate and categorized according to the currency in which it is denominated. Sometimes called an external bond."},{"id":"i_d931496b64c9","t":"d","term":"Euroclear","ch":5,"d":1,"hy":false,"body":"One of Europe’s two international central securities depositories (ICSDs). It holds securities to enable book-entry transfer of international securities, as well as domestic securities in a number of European countries, including France, Ireland, and the United Kingdom."},{"id":"i_7b57196c64df","t":"d","term":"Eurodollar","ch":5,"d":1,"hy":true,"body":"A deposit denominated in US dollars held in a financial institution outside of the United States. It may be issued as a negotiable Eurodollar certificate of deposit or as a nonnegotiable Eurodollar time deposit, both of which are interest-bearing."},{"id":"i_b635bf543773","t":"d","term":"European Central Bank (ECB)","ch":2,"d":4,"hy":false,"body":"The central bank for the European Union (EU). The ECB conducts a unified monetary policy for the eurozone, which includes all EU members that have adopted the euro as their common currency."},{"id":"i_97b69d4e30d9","t":"d","term":"European Market Infrastructure Regulation (EMIR)","ch":2,"d":4,"hy":false,"body":"An EU regulation intended to increase the stability of the over-the-counter (OTC) derivatives market throughout Europe. EMIR implements reporting and clearing obligations for OTC derivatives analogous to the requirements of the Dodd-Frank Act in the United States."},{"id":"i_d0aa5ee65ccc","t":"d","term":"European option","ch":17,"d":4,"hy":true,"body":"A type of option contract that may only be exercised on the actual option (delivery) date specified in the contract. European options can be contrasted with American options, which may be settled any time before or on the specified option date. Contrast also with Bermudan option."},{"id":"i_ced12fd407f5","t":"d","term":"European Union (EU)","ch":2,"d":4,"hy":false,"body":"A union of more than two dozen member countries in Europe that have organized to work toward common political, social, and economic interests."},{"id":"i_acc70ec9f2ca","t":"d","term":"event of default","ch":6,"d":2,"hy":true,"body":"An action or circumstance by which a borrower breaches or violates any term or condition under a debt agreement."},{"id":"i_3bd014fb48f7","t":"d","term":"event risk","ch":16,"d":4,"hy":true,"body":"A type of risk associated with unexpected events related to a given organization. Event risk includes an unplanned corporate reorganization or a large natural disaster."},{"id":"i_143b48b7d588","t":"d","term":"excess balance","ch":7,"d":3,"hy":true,"body":"A situation that occurs in an account when its average collected balance is greater than either the amount that the financial institution requires as a compensating balance or the target level that a company has chosen to maintain."},{"id":"i_20157235475c","t":"d","term":"ex-dividend date","ch":20,"d":2,"hy":true,"body":"The first date on which a stock is sold without entitlement to the upcoming dividend. The ex-dividend date is usually one business day prior to the shareholder-of-record date, thereby enabling brokerage firms to send an updated list of shareholders to a company on time."},{"id":"i_b0ee9b234fca","t":"d","term":"exotic currency","ch":17,"d":4,"hy":true,"body":"A foreign exchange term used for a currency that is not widely traded. These currencies can be difficult and expensive to trade due to a lack of liquidity or available counterparties."},{"id":"i_906c8f7c8937","t":"d","term":"exponential smoothing","ch":14,"d":1,"hy":true,"body":"A statistical forecasting technique that produces a forecasted value based on the most recent actual value, the most recent forecasted value, and a number between zero and one that is used to weight these two values. The weight, designated by the Greek letter alpha (α), is referred to as the smoothing constant and is calculated using a computer program such as a statistics package."},{"id":"i_15b604ef5b13","t":"d","term":"export credit agency (ECA)","ch":10,"d":1,"hy":false,"body":"The general term for an entity that provides companies with financing and insurance products to support the exporting of goods, especially into emerging markets. ECAs can be government-owned or private institutions that act as the intermediary between the government and the exporting companies. Also known as an export credit bank."},{"id":"i_174e0eb1f867","t":"d","term":"export financing","ch":10,"d":1,"hy":true,"body":"Government support of export activities through export loans, credit guarantees, or a combination of both."},{"id":"i_eaf6c58671d7","t":"d","term":"Export-Import (EXIM) Bank of the United States","ch":10,"d":1,"hy":false,"body":"The official export credit agency of the United States."},{"id":"i_0d2c62730b35","t":"d","term":"expropriation","ch":7,"d":3,"hy":true,"body":"The purchase of private property by a government body without the owner’s consent, based on a sovereign right called eminent domain. Also known as compulsory purchase."},{"id":"i_353c392cc7bc","t":"d","term":"eXtensible markup language (XML)","ch":15,"d":5,"hy":false,"body":"A computer-based language that is an extension of hypertext markup language (HTML) that allows the content and structure of data to be defined."},{"id":"i_e3590048020c","t":"d","term":"external controls","ch":18,"d":4,"hy":true,"body":"Measures that affect a company’s operations, but which are enacted by the government or other organizations rather than by the company itself. These may include any rule or regulation that has an effect on the actions of the company, any tax law enacted by the government which affects the flow of money, a lease that restricts what a company can or cannot do with its office space, or other such measures."},{"id":"i_6b28979fea5f","t":"d","term":"external theft/fraud risk","ch":16,"d":4,"hy":true,"body":"The risk of theft or fraud involving individuals external to the targeted company. Traditionally, the primary source of external theft or fraud risk has been related to the payment process, often involving false invoices or check, credit card, or automated clearinghouse (ACH)/wire fraud."},{"id":"i_7b67eeee258a","t":"d","term":"extrapolation","ch":14,"d":1,"hy":true,"body":"This process uses identified past trends to predict the pattern of future cash flows."},{"id":"i_64e33f94bcb9","t":"d","term":"face value","ch":6,"d":2,"hy":false,"body":"The nominal price of a security (e.g., as printed on the physical document). Also known as par value."},{"id":"i_7a7bc4496e50","t":"d","term":"factor","ch":3,"d":3,"hy":true,"body":"A type of nonbank financial institution that provides short-term financing to companies by purchasing accounts receivable at a discount."},{"id":"i_5694f8f8fb67","t":"d","term":"factoring","ch":10,"d":1,"hy":false,"body":"An accounts receivable (A/R) financing process that involves the outright sale of receivables to a factor, a company that specializes in the financing and management of receivables. The factoring may be performed on a with or without recourse basis. In a with recourse arrangement, the factor may return any uncollectible A/R to the seller for full credit. In a without recourse factoring arrangement, the factor takes all the risk of default on the A/R."},{"id":"i_ff2644c8c926","t":"d","term":"fair value","ch":8,"d":1,"hy":true,"body":"Under US Accounting Standards Codification (ASC) Topic , the fair value of an asset or liability is defined by determining the price that would be received in an asset sale or the price paid to transfer a liability. The valuation price must be market-based and take into consideration all observable valuation inputs, such as competition and risk. ASC Topic expands this application by stating that fair value should be applied to all financial assets and liabilities except for certain specified types of assets."},{"id":"i_bda7aa3ac0db","t":"d","term":"fair value hedge","ch":8,"d":1,"hy":false,"body":"A type of hedge in which the risk being hedged is a change in the fair value of an asset or a liability. Changes in fair value may arise through changes in interest rates (for fixed-rate loans), foreign exchange rates, equity prices, or commodity prices."},{"id":"i_16d7e6539430","t":"d","term":"family office","ch":3,"d":3,"hy":false,"body":"A company set up to manage investments on behalf of one or more high-networth individuals."},{"id":"i_d5141846751f","t":"d","term":"Federal Deposit Insurance Corporation (FDIC)","ch":2,"d":4,"hy":true,"body":"An independent agency of the US federal government whose primary role is to protect depositors from losses caused by bank insolvency. The FDIC preserves and promotes public confidence in the US financial system by (1) insuring deposits in banks and thrift institutions up to a maximum of $ , per depositor; (2) identifying, monitoring, and addressing risks to the Deposit Insurance Fund; and (3) limiting the effect on the economy and the financial system when a bank or thrift institution fails."},{"id":"i_2a2bf0c9de36","t":"d","term":"Federal Home Loan Mortgage Corporation (FHLMC, or Freddie Mac)","ch":5,"d":1,"hy":false,"body":"A stockholder-owned, government-sponsored enterprise chartered by the US Congress in 1970 to keep money flowing to mortgage lenders in support of homeownership and rental housing for middleincome Americans. The FHLMC purchases, guarantees, and securitizes mortgages to form mortgage-backed securities (MBSs)."},{"id":"i_3ddf8a5dcf79","t":"d","term":"Federal National Mortgage Association (FNMA, or Fannie Mae)","ch":5,"d":1,"hy":false,"body":"A US government-sponsored enterprise that was created in 1938 to expand the flow of mortgage money by creating a secondary mortgage market. Fannie Mae is a publicly traded company that operates under a congressional charter that directs Fannie Mae to channel its efforts into increasing the availability and affordability of homeownership for low-, moderate-, and middle-income Americans."},{"id":"i_8d813a94b22f","t":"d","term":"Federal Open Market Committee (FOMC)","ch":2,"d":4,"hy":true,"body":"The committee of the US Federal Reserve that runs the open market operations that help to implement US monetary policy and control the money supply."},{"id":"i_456912dc1772","t":"d","term":"Federal Reserve (the Fed)","ch":2,"d":4,"hy":false,"body":"The central bank for the United States, from the perspective of monetary policy."},{"id":"i_b8bc94d17bda","t":"d","term":"FedGlobal ACH Payments","ch":4,"d":1,"hy":true,"body":"A service offered by the US Federal Reserve Bank to provide a framework for sending cross-border automated clearinghouse (ACH) transactions between the United States and Mexico or Panama."},{"id":"i_189f38a0eb4d","t":"d","term":"FedNow","ch":4,"d":1,"hy":false,"body":"A 24/7/ payment settlement system, launched by the US Federal Reserve in 2023."},{"id":"i_512c62d8e95b","t":"d","term":"Fedwire","ch":4,"d":1,"hy":true,"body":"A high-value, real-time gross settlement (RTGS) transfer system operated by the US Federal Reserve."},{"id":"i_6acfc6f85131","t":"d","term":"fiduciary","ch":3,"d":3,"hy":true,"body":"An individual or institution to which certain property is given to hold in trust according to a trust agreement."},{"id":"i_19125971a6fe","t":"d","term":"finality","ch":4,"d":1,"hy":true,"body":"In a payment system, this is the point in time when a payment can no longer be taken back or retracted by a payor or payor’s bank, and the payee has full use of the funds."},{"id":"i_7076d4466b98","t":"d","term":"finance lease","ch":20,"d":2,"hy":true,"body":"Under US Generally Accepted Accounting Principles (US GAAP), a type of lease that has terms that are different from those of operating leases. Finance leases are essentially an alternative to borrowing the funds and purchasing the asset in question. Referred to as a capital lease before Accounting Standards Codification (ASC) ."},{"id":"i_8b53502d7c42","t":"d","term":"Financial Accounting Standards (FASs)","ch":8,"d":1,"hy":false,"body":"The former name of US Accounting Standards Codification (ASC) Topics."},{"id":"i_87309740df8b","t":"d","term":"Financial Accounting Standards Board (FASB)","ch":8,"d":1,"hy":true,"body":"An independent, self-regulating US organization, formed in 1973 and made up of accounting professionals, that establishes financial accounting and reporting standards in the United States, collectively referred to as Generally Accepted Accounting Principles (GAAP)."},{"id":"i_8cf7f6409cc9","t":"d","term":"Financial Action Task Force (FATF)","ch":2,"d":4,"hy":false,"body":"An international, intergovernmental organization composed of members from more than 35 countries, whose primary purpose is the development and promotion of policies, at both the national and international levels, to combat money laundering and terrorist financing."},{"id":"i_1d05b99a6d39","t":"d","term":"financial budget","ch":9,"d":2,"hy":true,"body":"A component of a master budget, this budget addresses an organization’s financing and investing activities."},{"id":"i_85f029bd43e1","t":"d","term":"Financial Crimes Enforcement Network (FinCEN)","ch":2,"d":4,"hy":true,"body":"The primary US government agency (operating as a bureau of the US Treasury) that oversees and implements policies to prevent and detect money laundering by criminal or terrorist organizations. FinCEN serves as the US financial intelligence unit (FIU)."},{"id":"i_ecc908e1931b","t":"d","term":"Financial Industry Regulatory Authority (FINRA)","ch":2,"d":4,"hy":false,"body":"The largest independent regulator for all securities firms and registered securities representatives doing business in the United States."},{"id":"i_0831bee46e0a","t":"d","term":"financial institution (FI)","ch":3,"d":3,"hy":false,"body":"An organization that provides some type of financial services to the public. Types of FIs include commercial banks, credit unions, insurance companies, brokerage firms, and asset managers."},{"id":"i_cebb9eb1c2f8","t":"d","term":"financial institution risk","ch":16,"d":4,"hy":false,"body":"The risk of loss to an organization associated with the failure, either operational or financial, of a financial institution used by an organization."},{"id":"i_8787dc5f424e","t":"d","term":"financial intelligence unit (FIU)","ch":2,"d":4,"hy":false,"body":"A specialized government agency established in many countries to monitor and deal with the problems of money laundering and similar financial crimes. FinCEN in the United States is an FIU."},{"id":"i_c4b641158716","t":"d","term":"financial leverage","ch":9,"d":2,"hy":true,"body":"A concept that examines the fixed costs of financing. Generally, the higher the level of debt capital used in a company, the higher the interest costs and the greater the amount of financial leverage. Financial leverage is also the measure of a company’s use of debt in its capital structure."},{"id":"i_0ad7aabb8c97","t":"d","term":"financial planning & analysis (FP&A)","ch":1,"d":1,"hy":false,"body":"An organizational function that involves determining the need for present and future funding to support operations. An important part of this function is the forecasting of revenues, income, and external financing required to support the company’s planned growth."},{"id":"i_40344ee46646","t":"d","term":"financial risk","ch":1,"d":1,"hy":true,"body":"The risk that the overall value of an organization may change in response to a change in interest rates, foreign exchange rates, or commodity prices."},{"id":"i_c4ab692a5852","t":"d","term":"financial service provider (FSP)","ch":7,"d":3,"hy":false,"body":"A vendor that provides treasury-related services."},{"id":"i_41ac5e4c935f","t":"d","term":"Financial Stability Oversight Council (FSOC)","ch":2,"d":4,"hy":true,"body":"A US agency created under the Dodd-Frank Act, whose primary responsibility is to prevent systemic risk from threatening the financial system by identifying threats to financial stability and gaps in regulations, and facilitating coordination across federal and state agencies. While the FSOC has a strong systemic oversight role, it has limited enforcement power and can only make recommendations to the primary regulators."},{"id":"i_fd0cd32558b9","t":"d","term":"financial statements","ch":8,"d":1,"hy":true,"body":"Accounting reports that summarize a company’s operating results and financial position at a point in time. Analyzing these statements provides insights into (1) how well the company has managed its liquidity position, (2) how effectively it used and financed its assets, (3) whether it had a proper balance between debt and equity financing compared to peers, (4) how well it controlled operating and financing costs, and (5) whether the profit it earned was satisfactory in relation to the levels of revenue it experienced and the investment in assets that support its operations."},{"id":"i_56d5c2e0df1b","t":"d","term":"financial supply chain","ch":16,"d":4,"hy":true,"body":"The connection of trading partners from order placement to receipt of payment. It refers to the flow of financial information and money in counterpoint to the flow of goods and services. The treasury area plays a pivotal role in managing the organization’s financial supply chain, through working capital management practices and by ensuring adequate liquidity sources."},{"id":"i_5a6b5b288501","t":"d","term":"FinCEN Customer Due Diligence (CDD) Rule","ch":2,"d":4,"hy":false,"body":"A US regulation written by the Financial Crimes Enforcement Network (FinCEN) that requires financial institutions to adopt policies and procedures to identify and verify both customers and beneficial owners of companies when opening bank accounts, with beneficial owners defined as those who either have an ownership of 25% or more of an organization, or who control the organization. FIs are also required to report any suspicious transactions."},{"id":"i_52eff54907f3","t":"d","term":"finished goods","ch":10,"d":1,"hy":true,"body":"A type of inventory that consists of completed items or materials available for sale. It lets a company fill orders when received rather than depend upon product completion to satisfy customer demands."},{"id":"i_c75e51b5c34e","t":"d","term":"FinTech company","ch":3,"d":3,"hy":false,"body":"A technology company that provides financial services."},{"id":"i_809a091a8020","t":"d","term":"firm value","ch":6,"d":2,"hy":true,"body":"An economic measure reflecting the market value of a business. It is a sum of claims by all claimants: creditors (secured and unsecured) and shareholders (preferred and common)."},{"id":"i_4a4fae6ab051","t":"d","term":"five Cs of credit","ch":10,"d":1,"hy":true,"body":"A credit analysis process that considers the character, capacity, capital, collateral, and conditions of the potential borrower."},{"id":"i_ab2a21d89ab8","t":"d","term":"fixed asset turnover ratio","ch":9,"d":2,"hy":true,"body":"An efficiency/asset management ratio that measures how efficiently fixed assets (or property, plant, and equipment) are used. It is computed as revenues divided by net property, plant, and equipment."},{"id":"i_8c71277670c3","t":"d","term":"fixed cost","ch":9,"d":2,"hy":true,"body":"A type of cost that does not vary in total over a wide range of activity or time period and is not immediately impacted by changes in business activities. In cost accounting, fixed costs are contrasted with variable costs, which do change based on volume or activity levels."},{"id":"i_032b03b27857","t":"d","term":"fixed/floating ratio","ch":19,"d":2,"hy":true,"body":"A measurement of the balance in an investment or debt portfolio between instruments paying a fixed rate of interest and those paying a floating rate of interest. It acts as a measure of exposure to interest rate risk, from both investment and funding perspectives."},{"id":"i_fa7422aa28b4","t":"d","term":"fixed-charge coverage ratio","ch":9,"d":2,"hy":true,"body":"A coverage ratio that is similar to the times interest earned (TIE) ratio but also takes into account fixed charges other than interest, such as payments on leases. It is computed as earnings before interest and taxes (EBIT) plus fixed charges, divided by interest expense plus fixed charges."},{"id":"i_8ae568ae97b9","t":"d","term":"fixed-income capital","ch":6,"d":2,"hy":false,"body":"A type of capital that has fixed payments and includes capital such as bond securities and term loans."},{"id":"i_685e80366130","t":"d","term":"float","ch":10,"d":1,"hy":true,"body":"The time interval or delay between the start and the completion of a specific phase or process occurring along the cash flow timeline."},{"id":"i_e2c029a1fedb","t":"d","term":"floating-rate debt","ch":6,"d":2,"hy":false,"body":"A type of debt issue that carries interest payments that reset periodically based on movement in a representative interest rate index. Also known as adjustable-rate debt."},{"id":"i_c87cf4f2ec69","t":"d","term":"floating-rate note (FRN)","ch":5,"d":1,"hy":false,"body":"A note with a variable interest rate. The adjustments to the interest rate are made periodically and are tied to a certain money market reference rate. FRNs typically have a maturity of one year or longer."},{"id":"i_37d50a52fd78","t":"d","term":"float-neutral terms","ch":12,"d":1,"hy":false,"body":"Sales terms offered for electronic payment in which either the timing (i.e., value date) of a payment is adjusted or a discount is offered so as to maintain whatever float the buyer was receiving with the paper payment."},{"id":"i_79bacb65de06","t":"d","term":"floor planning","ch":10,"d":1,"hy":true,"body":"In inventory financing, this is a type of asset-based lending used for high-value durable goods, such as automobiles, trucks, or heavy equipment. Loans are made against each individual item, are recorded by serial number, and are not fully repaid until the item is sold."},{"id":"i_6c15aa4a10f0","t":"d","term":"flotation costs","ch":9,"d":2,"hy":true,"body":"The costs of issuing a security (usually the underwriting costs), not related to direct interest or equity costs."},{"id":"i_a81e3b628f69","t":"d","term":"forced reinvestment","ch":7,"d":3,"hy":true,"body":"A type of political risk in which funds cannot be transferred out of a country in any form, or the amount that can be transferred is limited."},{"id":"i_8d98dce3ba79","t":"d","term":"forecasting horizon","ch":14,"d":1,"hy":true,"body":"In the cash forecasting process, this is the time interval over which information is to be forecasted."},{"id":"i_2d75c5ba1485","t":"d","term":"foreign bond","ch":6,"d":2,"hy":true,"body":"A type of bond sold in a particular country by a foreign borrower but usually denominated in the domestic currency of the country where issued. These bonds are primarily regulated by the authorities in the country of issue."},{"id":"i_abf7a4952fc6","t":"d","term":"foreign check","ch":4,"d":1,"hy":true,"body":"A check deposited at a bank in one country that is drawn on a bank in another country."},{"id":"i_9d316f0699e3","t":"d","term":"Foreign Corrupt Practices Act (FCPA)","ch":7,"d":3,"hy":true,"body":"US legislation that specifically prohibits payments to foreign officials or their family members for the purpose of gaining any improper business advantage."},{"id":"i_4d27781112f1","t":"d","term":"foreign currency account","ch":3,"d":3,"hy":true,"body":"A bank account where deposit balances may be held in a currency other than that of the country in which the bank is located."},{"id":"i_2c7db4c186c8","t":"d","term":"foreign currency translation","ch":8,"d":1,"hy":true,"body":"A process used to convert the financial results of a parent company’s foreign subsidiaries to its reporting currency."},{"id":"i_af0983fe124b","t":"d","term":"foreign exchange (FX)","ch":3,"d":3,"hy":false,"body":"The conversion of one country’s currency into that of another."},{"id":"i_98836e423fb2","t":"d","term":"foreign exchange (FX) risk","ch":16,"d":4,"hy":false,"body":"A type of risk that arises from the exposure an organization has as a result of transactions, assets, and liabilities that are denominated in a foreign currency. As FX rates fluctuate, so too can the value of these items, ultimately impacting the overall value of a firm."},{"id":"i_eea86a0f8b28","t":"d","term":"foreign tax credit","ch":2,"d":4,"hy":true,"body":"A type of tax credit available to a company with foreign income that has already been taxed by the foreign jurisdiction. For example, a US company’s income derived from its non-US operations typically is included in its tax return to determine the amount of US income tax due. If income from foreign sources has already been subjected to foreign income taxes, the same income is taxed twice. To relieve the effect of double taxation, US tax law grants a US company a tax credit against its total US income tax liability for foreign income taxes paid by the parent company and its subsidiaries. This credit is called the foreign tax credit."},{"id":"i_ace0c5e90ac0","t":"d","term":"forward","ch":17,"d":4,"hy":true,"body":"An agreement between two parties to buy or sell a fixed amount of an asset to be delivered at a future date and at a price agreed upon today. The underlying asset in a forward contract can be a financial instrument (e.g., a stock index fund or debt instrument), a currency (e.g., the euro or pound), or a commodity (e.g., gold or coffee)."},{"id":"i_bd792ce6edb5","t":"d","term":"forward foreign exchange (FX) rate","ch":17,"d":4,"hy":false,"body":"A rate quoted for the delivery (or settlement) of currency beyond the terms of a spot contract (i.e., for a specified date in the future)."},{"id":"i_c558ffc39185","t":"d","term":"forward market","ch":3,"d":3,"hy":false,"body":"A financial market in which contracts for future delivery (futures) of currency or commodities are bought and sold."},{"id":"i_b3114e4b4188","t":"d","term":"forward points","ch":17,"d":4,"hy":false,"body":"The adjustment to a spot foreign exchange (FX) rate to reflect the difference between two currencies’ interest rates at the time the trade is executed."},{"id":"i_902f57528401","t":"d","term":"forward rate agreement (FRA)","ch":17,"d":4,"hy":false,"body":"A forward contract in which two parties agree that a certain interest rate will apply to a certain notional principal at a future date. The agreement will specify the forward date of the agreement, the benchmark reference rate to be used, and the term of the underlying benchmark, typically in months or years. Also known as an interest rate forward."},{"id":"i_ace7c5c4aa55","t":"d","term":"free cash flow (FCF)","ch":9,"d":2,"hy":false,"body":"A measurement of the amount of cash generated during a period that is available to shareholders and creditors. It adjusts net income for noncash charges (i.e., depreciation and amortization), changes to working capital, and capital expenditures, and is considered a fundamental component of assessing firm value."},{"id":"i_a77e9dfcd46d","t":"d","term":"free-fall bankruptcy","ch":2,"d":4,"hy":false,"body":"A type of bankruptcy in which a firm goes (or is forced) into bankruptcy and has no structured plan for coming out of bankruptcy."},{"id":"i_c64894908b50","t":"d","term":"freight payment services","ch":12,"d":1,"hy":true,"body":"An outsourced form of accounts payable wherein specialists pay all of a shipper’s freight bills, audit bills for possible overcharges and duplicate payments, and provide reports that help a company compare costs for different routes and carriers."},{"id":"i_d0ec28e2375d","t":"d","term":"friendly acquisition","ch":20,"d":2,"hy":false,"body":"A situation in which a target company’s management and board of directors agree to a merger or acquisition by another company."},{"id":"i_b244171b13e1","t":"d","term":"full guarantee","ch":6,"d":2,"hy":true,"body":"A level of guarantee for a subsidiary in which the guaranteeing party (the parent organization or another party) fully guarantees any borrowing arrangement by the subsidiary and agrees to take over the loan if the subsidiary fails to make timely payments."},{"id":"i_b667487df2f4","t":"d","term":"full-service brokerage","ch":3,"d":3,"hy":false,"body":"A brokerage that employs industry specialists as research analysts to provide investment advice to institutions and individual investors."},{"id":"i_5ed7d8fd6bd6","t":"d","term":"functional currency","ch":8,"d":1,"hy":true,"body":"For determining foreign exchange translation exposure, this is the currency of the primary economic environment in which the entity operates. Normally, the majority of the entity’s business activities are transacted in that currency."},{"id":"i_1671e386b591","t":"d","term":"future value (FV)","ch":9,"d":2,"hy":false,"body":"For an investment made today, this is the expected value of the investment at a specified future date."},{"id":"i_f6bfaeae02ad","t":"d","term":"futures","ch":17,"d":4,"hy":true,"body":"Similar to forwards, these are agreements between two parties to buy or sell a fixed amount of an asset to be delivered at a future date and at a price agreed upon today. Futures differ, however, in the following ways. First, they are standardized contracts (i.e., standard contract sizes and delivery dates). Second, they are typically traded on organized exchanges rather than over the counter, with the exchange acting as counterparty to all futures contracts. Third, they are generally not settled with delivery of the underlying asset; instead, they typically are closed out (i.e., settled financially between the two parties) prior to maturity."},{"id":"i_709905c6be7e","t":"d","term":"General Data Protection Regulation (GDPR)","ch":2,"d":4,"hy":false,"body":"An EU regulation relating to the use of the personal data of EU citizens. It places obligations on companies holding data on EU citizens to only hold necessary data, to adopt measures to control access to that data, and to protect that data against loss and accidental deletion."},{"id":"i_ff506f7c096c","t":"d","term":"Generally Accepted Accounting Principles (US GAAP)","ch":8,"d":1,"hy":false,"body":"A detailed set of rules that govern US accounting standards. These principles are developed, agreed upon, and published in the form of Accounting Standards Codification (ASC) Topics by the Financial Accounting Standards Board (FASB)."},{"id":"i_a7feee953caa","t":"d","term":"geopolitical risk","ch":16,"d":4,"hy":true,"body":"A type of risk that arises from the impact of global political uncertainty on a company’s ability to achieve its business objectives in a particular jurisdiction."},{"id":"i_e4d31fe42671","t":"d","term":"giro","ch":4,"d":1,"hy":true,"body":"A method of transferring money by instructing a bank to directly transfer funds from one bank account to another without the use of checks. A giro payment is the functional equivalent of an automated clearinghouse (ACH) credit. Although the term giro is still widely used in many countries, separate giro-processing systems have largely been replaced by other electronic transfer systems."},{"id":"i_d6132acffe32","t":"d","term":"global business services (GBS) group","ch":1,"d":1,"hy":false,"body":"A department, operation, or team within a multiunit organization that may provide a range of services similar to that of a shared services center (e.g., finance, human resources, and logistics) but which also tends to incorporate some business advisory services (e.g., continuous improvement or internal consulting) to improve operational efficiency across the organization’s business units. Often referred to as a center of excellence (COE)."},{"id":"i_932dd49947a3","t":"d","term":"global depositary receipt (GDR)","ch":20,"d":2,"hy":false,"body":"A type of security issued by a non-US custodian bank to allow investors to trade stock in a company outside that company’s home market."},{"id":"i_d22cf322be5e","t":"d","term":"global financial institution (global FI)","ch":3,"d":3,"hy":false,"body":"A financial institution that operates in multiple countries in more than one part of the world, providing services to both domestic and multinational corporations."},{"id":"i_b78c094212ef","t":"d","term":"good funds","ch":10,"d":1,"hy":false,"body":"Collected funds in an account that are immediately usable by the owner of the account."},{"id":"i_0c6ead7c41ad","t":"d","term":"goodwill","ch":8,"d":1,"hy":true,"body":"An account that can be found in the assets portion of a company’s balance sheet. Goodwill can often arise when one company is purchased by another company. In an acquisition, the amount paid for the company over book value usually accounts for the target firm’s intangible assets."},{"id":"i_c72b2ace2604","t":"d","term":"Gordon growth model","ch":19,"d":2,"hy":true,"body":"A common stock valuation model used to determine the intrinsic value of a stock based on a future series of dividends that grow at a constant rate. This model works well for firms that pay a steadily growing dividend. Also referred to as the dividend discount model."},{"id":"i_7cee66959887","t":"d","term":"Government National Mortgage Association (GNMA, or Ginnie Mae)","ch":5,"d":1,"hy":false,"body":"A wholly owned agency of the US government that provides liquidity for government-sponsored mortgage programs through its mortgage-backed securities plan."},{"id":"i_1d3c319d9c69","t":"d","term":"government paper","ch":5,"d":1,"hy":true,"body":"A range of short-term promissory notes, generally referred to as Treasury bills or government-issued promissory notes, issued by national, provincial, and local government agencies and authorities, as well as other government entities, in order to raise funds in the short-term money market."},{"id":"i_9e42be5b1a5d","t":"d","term":"government warrant","ch":4,"d":1,"hy":true,"body":"In government finance, this is an order to pay that instructs a treasurer to pay the warrant holder on demand or after a maturity date. Warrants deposited in a bank are routed (based on the magnetic ink character recognition [MICR] line information) to a collecting bank that processes them as collection items. The collecting bank presents the warrants to the government entity’s treasury department for payment each business day."},{"id":"i_a1fe75b35ef5","t":"d","term":"Governmental Accounting Standards Board (GASB)","ch":8,"d":1,"hy":true,"body":"The authoritative standard-setting body for US state and local governments, as well as for public schools, state universities, and other government-affiliated agencies."},{"id":"i_06ed97773166","t":"d","term":"governmental and not-for-profit (G/NFP) organization","ch":8,"d":1,"hy":false,"body":"A type of organization that does not have shareholders or other owners but is organized to serve a collective group. Governmental agencies provide goods, services, or information to benefit the public as a whole or its particular segments. They raise cash primarily through taxes and fees paid by members of the community, regardless of whether those paying such taxes and fees derive any benefit from the resulting goods or services. Nongovernmental not-for-profit organizations serve specific constituencies who pay for some or all the benefits provided."},{"id":"i_5d06d8dfa50c","t":"d","term":"government-sponsored enterprise (GSE)","ch":5,"d":1,"hy":false,"body":"A company that is created by a national government in order to participate in or help support various commercial activities on the government’s behalf. These organizations are generally formed for a specific purpose and are designed to support a certain economic sector. In the United States, examples would include Freddie Mac and Fannie Mae. GSE is a US term; the more generic global term is state-owned enterprise."},{"id":"i_b35a0dc1ef91","t":"d","term":"green bond","ch":6,"d":2,"hy":true,"body":"(1) A type of bond used by federally qualified organizations to raise funds to promote sustainability by developing underutilized or abandoned properties (e.g., brownfield sites). (2) A type of corporate bond that designates proceeds for environmental projects, renewable energy projects, or making buildings more energy efficient."},{"id":"i_807026667e22","t":"d","term":"gross profit margin","ch":9,"d":2,"hy":true,"body":"A performance ratio that shows the percentage of revenue remaining after the cost of goods sold is deducted from revenue. It is computed as gross profit divided by revenues."},{"id":"i_834f66517196","t":"d","term":"gross settlement","ch":4,"d":1,"hy":true,"body":"A type of settlement in a payment system in which each transaction results in a separate value transfer between the payor and payee. In most gross settlement systems, the settlement is on a real-time basis, resulting in a real-time gross settlement (RTGS) system."},{"id":"i_3e6ea2dc4661","t":"d","term":"group captive","ch":16,"d":4,"hy":true,"body":"An approach to risk retention in which a subsidiary is owned by multiple owners for the purpose of insuring the risk of the parent owners or their affiliates. Also known as an association captive, it provides risk financing for the owners of the subsidiary. This shared ownership makes the group captive arrangement a form of insurance by virtue of the transfer of risk. In most cases, group captives are industry-based, which allows risk transfer across similar risks."},{"id":"i_29b25bdc1bec","t":"d","term":"guarantee of payment or collection","ch":6,"d":2,"hy":false,"body":"An agreement in which the guaranteeing party (usually a parent company) promises to make payment on a loan for another party (usually a subsidiary) or to collect payment from that party, but only if that party formally defaults on the loan."},{"id":"i_985f7a52e0e6","t":"d","term":"guaranteed cost insurance program","ch":16,"d":4,"hy":false,"body":"A type of insurance program in which a fixed premium is paid at the beginning of the policy period and the insurer assumes the risk for paying all losses occurring during the policy period that fall within the scope and amount of the policy."},{"id":"i_ff274b1c2906","t":"d","term":"haircut","ch":6,"d":2,"hy":false,"body":"In terms of loans or bonds, a reduction in the market value of any assets used as security, when calculated for collateral purposes."},{"id":"i_fa57a629775f","t":"d","term":"header account","ch":12,"d":1,"hy":false,"body":"See concentration account."},{"id":"i_4722c402f0fb","t":"d","term":"hedge instrument","ch":8,"d":1,"hy":false,"body":"A financial product that is used to reduce or eliminate risks associated with an uncertain future cash flow or position."},{"id":"i_92c1ff57bdec","t":"d","term":"hedging","ch":17,"d":4,"hy":true,"body":"The act of taking a financial position to reduce or offset the risk posed by another financial position. In active hedging, an organization uses various financial instruments to manage risks associated with future cash flows, or the values of assets or liabilities. In passive (or natural) hedging, an organization uses identified correlations to manage financial risk exposure, by allowing them to offset each other in the event of market fluctuation."},{"id":"i_b1fdbd434276","t":"d","term":"high-yield bond","ch":6,"d":2,"hy":true,"body":"A high-paying bond with a lower credit rating than investment-grade corporate bonds, Treasury bonds, and municipal bonds. Because of the higher risk of default, these bonds pay a higher yield than investment-grade bonds. Also referred to as junk bonds or non-investment-grade bonds (i.e., an investment quality rating of BB+ or lower from Standard & Poor’s [S&P], or Ba1 or lower from Moody’s)."},{"id":"i_00819c0e54f9","t":"d","term":"issue","ch":12,"d":1,"hy":true,"body":"A situation that arises when a third party, someone other than the payee or the depository bank, accepts or cashes a negotiable instrument (e.g., a check) in good faith that subsequently turns out to be fraudulent. This is a uniquely US problem that results from US law regarding negotiable instruments such as checks."},{"id":"i_8c767deb7576","t":"d","term":"hold-harmless agreement","ch":16,"d":4,"hy":false,"body":"A legal contract in which one party agrees not to hold another party legally liable for certain risks (e.g., a contractor working at a company location agrees not to hold the company liable in the event of an accident)."},{"id":"i_5e52b8f690ef","t":"d","term":"holding period","ch":13,"d":1,"hy":true,"body":"The expected period of time that a particular investor will hold a given investment or asset, generally the time between when the asset is purchased and when it is sold."},{"id":"i_10f7bbfe23be","t":"d","term":"holding period yield","ch":13,"d":1,"hy":false,"body":"The yield computed for the time a security is held. However, yields are quoted on an annualized basis, so the holding period yield is adjusted by determining how many holding periods occur in one year and using that number to annualize the yield."},{"id":"i_8c7859e86ec0","t":"d","term":"home currency","ch":8,"d":1,"hy":true,"body":"The currency of the country in which an entity’s headquarters are located."},{"id":"i_af38ec64a008","t":"d","term":"hosted solution","ch":15,"d":5,"hy":true,"body":"A type of software solution in which the vendor runs the application on its own technology platform, and firms access the software over the internet from their preferred devices. Also known as software as a service (SaaS) or cloud computing."},{"id":"i_5a01e8589fcc","t":"d","term":"hostile takeover","ch":20,"d":2,"hy":true,"body":"The acquisition of one company (called the target company) by another (called the acquirer) that is accomplished by going directly to the target company’s shareholders to get the acquisition approved."},{"id":"i_4c11251e0b52","t":"d","term":"hurdle rate","ch":9,"d":2,"hy":true,"body":"A predetermined required rate of return used by companies to decide whether to invest in a project."},{"id":"i_f790c294ab4a","t":"d","term":"hybrid lockbox","ch":12,"d":1,"hy":true,"body":"A lockbox system (sometimes referred to as “wholetail”) that combines features of wholesale and retail lockboxes, and is configured, usually on a customized basis, to process both business-to-business and consumer-to-business payments."},{"id":"i_ab6c6c474010","t":"d","term":"hybrid security","ch":6,"d":2,"hy":true,"body":"A type of security that is generally created by combining the elements of two or more different types of securities into one. Typically, a hybrid will behave like a fixedincome security (bond) under certain circumstances and an equity security (stock) under other circumstances."},{"id":"i_6f37eb8d51c3","t":"d","term":"image replacement document (IRD)","ch":4,"d":1,"hy":false,"body":"In the United States, this is a paper reproduction of the original check that contains an image of the front and back of the original check and is the legal equivalent of the original check."},{"id":"i_3b4a5e8b5c9c","t":"d","term":"imaging technology","ch":12,"d":1,"hy":false,"body":"A technology that allows paper documents, such as checks and remittance advices, to be scanned, converted to digital images, and stored for subsequent distribution, handling, and processing. Also known as image technology."},{"id":"i_6d4a572666a0","t":"d","term":"impairment of capital rule","ch":3,"d":3,"hy":true,"body":"A regulatory restriction on the amount that a financial institution can lend or invest in a particular company or industry, based on the quality of the financial institution’s existing loan portfolio."},{"id":"i_ba723e999f62","t":"d","term":"imprest account","ch":12,"d":1,"hy":false,"body":"An account maintained at a fixed amount for a particular purpose or activity. Sometimes used as a petty cash account."},{"id":"i_9efb5e54e47c","t":"d","term":"income bond","ch":6,"d":2,"hy":true,"body":"A type of bond that pays interest only if a company has profits, thus reducing some of the risk of issuing debt from a company’s viewpoint."},{"id":"i_99f991fb3a76","t":"d","term":"income statement","ch":8,"d":1,"hy":true,"body":"A financial statement that summarizes revenues earned, expenses incu
