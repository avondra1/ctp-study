tment. PI is calculated as present value of cash inflows divided by present value of cash outflows."},{"id":"i_70e4683c0a0d","t":"d","term":"profitability/performance ratio","ch":9,"d":2,"hy":false,"body":"A type of ratio that measures profit relative to the amount of revenue or the level of financing."},{"id":"i_2b588805ae60","t":"d","term":"project financing","ch":6,"d":2,"hy":false,"body":"A type of financing that applies to large projects, often in the energy area (e.g., energy exploration, refineries, and utility power plants). Project financing is also commonly used for private infrastructure projects (e.g., stadiums, shopping centers, toll roads, and commercial or residential developments). The typical project financing arrangement is complex, involving several companies or sponsors forming a separate legal entity to operate the project. Lenders are paid from the project’s cash flows and generally do not have recourse to the project’s individual sponsors or owners."},{"id":"i_97826d17f794","t":"d","term":"projected closing cash position","ch":14,"d":1,"hy":false,"body":"A forecast of the day’s ending cash position that is determined by taking the day’s opening available bank balance(s), adding any expected settlements in the collection (lockbox, wire, and automated clearinghouse [ACH]) and concentration accounts (in depository banks), and deducting any projected disbursement totals. A projected closing cash position statement is also known as a daily cash forecast or merely a cash report."},{"id":"i_c31b8fb53afe","t":"d","term":"promissory note","ch":6,"d":2,"hy":false,"body":"The legal portion of a debt contract; an unconditional promise to pay a specified amount plus interest at a defined rate either on demand or on a certain date."},{"id":"i_aebe7a3915ad","t":"d","term":"proof of deposit (POD)","ch":4,"d":1,"hy":false,"body":"An availability assignment method used in banking in which availability is assigned to each check as it is processed."},{"id":"i_feeb338d42f5","t":"d","term":"property insurance","ch":16,"d":4,"hy":true,"body":"A type of insurance that provides for reimbursement in the event of a loss of or damage to some type of asset (e.g., buildings, equipment, or inventory). Policies often cover the replacement value of the items in question, paying the costs of completely replacing those assets at their current market prices rather than at their historical or book value."},{"id":"i_6b00d32f7b4f","t":"d","term":"provisional credit","ch":12,"d":1,"hy":false,"body":"Credit applied to a firm’s bank account before a transaction can be verified by a bank (e.g., when funds are deposited in a smart safe)."},{"id":"i_d799bae6088a","t":"d","term":"proxy","ch":20,"d":2,"hy":false,"body":"An instrument by which a shareholder can assign their right to vote at the annual meeting to another individual."},{"id":"i_99e69f0350a4","t":"d","term":"public-key infrastructure (PKI)","ch":15,"d":5,"hy":false,"body":"A data encryption methodology designed to provide security over traditionally unsecure networks, such as the internet. PKI involves the use of dual keys: a public key and a private key."},{"id":"i_acbd78d1502e","t":"d","term":"purchase price","ch":13,"d":1,"hy":true,"body":"The price that an investor pays for a security. This price is important as it is the main component in calculating the returns achieved by the investor."},{"id":"i_a433a04a01c0","t":"d","term":"purchasing card","ch":4,"d":1,"hy":true,"body":"A payment card, typically a credit card, used by a business for the purchase of supplies, inventory, equipment, and service contracts. Also known as a procurement card or p-card."},{"id":"i_c2a6f602919e","t":"d","term":"put option","ch":17,"d":4,"hy":true,"body":"A type of option contract that gives the contract owner the right, but not the obligation, to sell (put) the underlying asset to the contract writer at a fixed price on or before the delivery date (depending on the style of the option)."},{"id":"i_a55f76e6dcce","t":"d","term":"put provision","ch":6,"d":2,"hy":true,"body":"A condition that allows a bondholder to resell a bond back to the issuer at a preestablished price (which is generally par) on certain stipulated dates prior to maturity. The put provision is an added degree of security for the bondholder, since it establishes a floor price for the bond."},{"id":"i_8d7e44909fdc","t":"d","term":"qualified institutional buyer (QIB)","ch":6,"d":2,"hy":false,"body":"In US law, this is an investor that is specifically recognized as being financially sophisticated and needing less protection than typical consumers. QIBs are primarily institutional investors that manage at least $ million in securities ($10 million in the case of a registered broker-dealer that invests in non-affiliate securities), and can be financial institutions, pension funds, corporations, insurance companies, investment companies, or employee benefit plans, or an entity owned entirely by qualified investors. Known outside the United States as a qualified institutional investor (QII)."},{"id":"i_6458f44eade7","t":"d","term":"qualified institutional investor (QII)","ch":6,"d":2,"hy":false,"body":"See qualified institutional buyer (QIB)."},{"id":"i_094b292243b0","t":"d","term":"quantitative credit analysis","ch":10,"d":1,"hy":true,"body":"A type of credit analysis that begins with an analysis of the applicant’s financial statements, usually using ratio analysis. Liquidity and working capital ratios, debt management and coverage ratios, and profitability measures are most often included."},{"id":"i_9696fc7d03c7","t":"d","term":"quick ratio (acid test ratio)","ch":11,"d":1,"hy":false,"body":"A liquidity ratio that is calculated as cash plus short-term investments and accounts receivable, divided by total current liabilities. It is also known as the acid test ratio because it is a more stringent measure of liquidity than the current ratio, as it excludes inventory (due to its lower liquidity) and prepaid expenses (which have little to no likelihood of converting into cash)."},{"id":"i_8bdfef93980c","t":"d","term":"random movement","ch":14,"d":1,"hy":false,"body":"A change in a series not identifiable as a trend or a seasonal or cyclical influence."},{"id":"i_346929d8ad22","t":"d","term":"ransomware","ch":16,"d":4,"hy":true,"body":"A type of malicious software (malware) that allows a third-party fraudster to assume control of an organization’s computer systems. The fraudster then typically charges the hacked organization a ransom to regain control of its data and/or prevent publication of sensitive data."},{"id":"i_9d54cbfe97c8","t":"d","term":"RAROC","ch":9,"d":2,"hy":false,"body":"See risk-adjusted return on capital."},{"id":"i_c8d3be202ff4","t":"d","term":"rating agency/credit rating agency","ch":6,"d":2,"hy":false,"body":"A company that assigns credit ratings that, in its opinion, rate a debtor’s likelihood of default."},{"id":"i_2af0b3dad38d","t":"d","term":"real risk-free rate of interest","ch":13,"d":1,"hy":true,"body":"The rate demanded by lenders (i.e., investors or savers) to compensate for delaying their use of the money today, in the absence of any risk or inflation, for a one-year maturity."},{"id":"i_caca8d1a3241","t":"d","term":"realized gains/losses","ch":8,"d":1,"hy":true,"body":"Gains or losses that are realized when a transaction that was previously recorded in the financial statements is completed. Contrast with unrealized gains/losses."},{"id":"i_d7740e45987f","t":"d","term":"real-time gross settlement (RTGS) system","ch":4,"d":1,"hy":false,"body":"A type of payment system in which each transaction results in a separate value transfer between the payor and payee, and the payment to the payee is final and irrevocable at the time the receiving bank’s account is credited or at the time the receiving bank is notified of the payment, whichever is earlier. A common example of an RTGS system is a wire transfer system."},{"id":"i_0a890b585c34","t":"d","term":"receipts and disbursements forecast","ch":14,"d":1,"hy":false,"body":"A short-term cash forecasting model, this forecast begins by creating separate schedules of cash receipts and disbursements, and then combining them. The schedules are prepared on a cash basis, rather than on an accrual basis, due to the need to forecast cash rather than earnings. The model tends to forecast cash accurately in the short term and near medium term, especially when accounts receivable and accounts payable data are incorporated. This technique is typically the basis of a direct method forecast."},{"id":"i_118dba3c1eb5","t":"d","term":"receipts schedule","ch":14,"d":1,"hy":false,"body":"A component of the receipts and disbursements forecast process, this is a projection of collections from customers (e.g., cash sales or payments on accounts receivable) and other cash inflows (e.g., interest or dividends received from investments). It should also include expected, nonrecurring cash inflows, such as the proceeds from asset sales and external financing activities."},{"id":"i_20564f812795","t":"d","term":"receivables conversion period","ch":10,"d":1,"hy":false,"body":"See days receivables."},{"id":"i_b1d4e7902ad9","t":"d","term":"receivables on behalf of (ROBO)","ch":10,"d":1,"hy":false,"body":"See collection on behalf of (COBO)."},{"id":"i_8029e7aeed18","t":"d","term":"receiver","ch":4,"d":1,"hy":false,"body":"The payee or beneficiary of a payment whose account is credited (increased) for the value of the transaction."},{"id":"i_5e3da30a305f","t":"d","term":"receiver swaption","ch":17,"d":4,"hy":false,"body":"A contract giving the buyer of the contract the right, but not the obligation, to enter into a swap, in which the buyer makes floating-rate interest payments and receives fixed-rate interest payments."},{"id":"i_ee6224905865","t":"d","term":"receiving bank","ch":4,"d":1,"hy":false,"body":"In a payment clearing process, this is the bank or financial institution where the payee’s account resides. It processes the transaction on behalf of the payee."},{"id":"i_c453e04c1571","t":"d","term":"receiving depository financial institution (RDFI)","ch":4,"d":1,"hy":false,"body":"In an automated clearinghouse (ACH) transaction, this is the financial institution that acts as an intermediary between the originator and the receiver, on the receiver’s side of the transaction."},{"id":"i_f4d9a0bf311f","t":"d","term":"recourse","ch":10,"d":1,"hy":true,"body":"A term related to using a factoring arrangement. In this case, the seller is liable for any bad debts the factor cannot collect."},{"id":"i_db7c7ebd8b20","t":"d","term":"Red Flags Rule","ch":7,"d":3,"hy":true,"body":"US regulations requiring financial institutions and creditors to develop and implement written identity theft prevention programs that provide for the identification of, detection of, and response to patterns, practices, or specific activities (i.e., red flags) that could indicate identity theft."},{"id":"i_cb7192462553","t":"d","term":"reference interest rate","ch":13,"d":1,"hy":true,"body":"A benchmark interest rate that is used to determine other interest rates."},{"id":"i_7b279be46046","t":"d","term":"refinancing","ch":6,"d":2,"hy":false,"body":"The replacement of an existing debt with a new obligation before the maturity of the original debt, typically with different terms. Refinancing of bonds is often done following periods of high interest rates. During high interest rate periods, many entities that must issue bonds attach call provisions that allow the bonds to be redeemed prior to maturity."},{"id":"i_2983d378f228","t":"d","term":"regression analysis","ch":14,"d":1,"hy":true,"body":"A statistical technique that uses historical data to identify the relationship between two variables. Once identified, the relationship can be used to develop forecasts (e.g., a forecast of cash position)"},{"id":"i_6b2fd043a83b","t":"d","term":"regulatory compliance risk","ch":16,"d":4,"hy":false,"body":"A type of operational risk that relates to compliance with regulatory requirements. Part of overall operational risk stems from the requirement to comply with many regulations of federal, state/provincial, local, and industry-specific regulatory agencies, as well as compliance with accounting rules and guidelines for financial transactions and money laundering."},{"id":"i_198893746cd8","t":"d","term":"reinsurance","ch":16,"d":4,"hy":true,"body":"A process that allows the initial indemnifier (usually an insurance company) to reduce its exposure to a particular loss event by transferring some or all of a risk to other insurers. Also sometimes known as coinsurance."},{"id":"i_50b3f9e72fa4","t":"d","term":"reinvestment risk","ch":13,"d":1,"hy":true,"body":"The risk associated with the potential for lower interest rates when investing proceeds from maturing investments."},{"id":"i_ce7d1b4f868b","t":"d","term":"re-invoicing","ch":10,"d":1,"hy":true,"body":"A method of centralizing the responsibility for monitoring and collecting international accounts receivable to more effectively manage related foreign exchange exposures."},{"id":"i_9bbbaddd22bc","t":"d","term":"reject item","ch":4,"d":1,"hy":true,"body":"A check that is rejected by a bank’s automated check-processing equipment. Most reject items arise either because of physical defects in the magnetic ink character recognition (MICR) line or because the MICR line does not meet banking industry specifications."},{"id":"i_86807c1c95b8","t":"d","term":"relationship review","ch":7,"d":3,"hy":false,"body":"A periodic assessment of service levels and responsiveness, both quantitatively and qualitatively, of a service provider, such as a financial service provider. Scorecards are a tool that is useful in conducting this type of review."},{"id":"i_36c3f1688aff","t":"d","term":"relaxed current asset investment strategy","ch":10,"d":1,"hy":true,"body":"A current asset management strategy in which a company maintains high levels of current assets relative to sales. A large investment in current assets is likely to lower investment returns, but the firm operates with lower shortterm operational risk because of its larger liquid asset balances."},{"id":"i_45a0676f6642","t":"d","term":"remitting bank","ch":12,"d":1,"hy":true,"body":"In a documentary collection process, this is the bank of the seller/exporter. It receives the collection documents from the seller."},{"id":"i_193116e0eb97","t":"d","term":"remote deposit capture (RDC)","ch":4,"d":1,"hy":false,"body":"In an over-the-counter field deposit system, this is a process that allows an organization to scan and image checks, then transmit those images to its depository bank for posting and clearing, instead of having to deposit physical checks. In the United States, the bank then transmits the images to the Federal Reserve or another image exchange network for clearing."},{"id":"i_7fb9e3e45647","t":"d","term":"remotely created check (RCC)","ch":4,"d":1,"hy":false,"body":"See pre-authorized draft."},{"id":"i_31f6591ec588","t":"d","term":"repatriation of cash","ch":20,"d":2,"hy":false,"body":"The transfer of funds from foreign subsidiaries back to the parent company in the home country."},{"id":"i_c1231bc51f54","t":"d","term":"repetitive (template) wire","ch":12,"d":1,"hy":false,"body":"A type of wire transfer used when a company makes frequent transfers to the same credit parties. Only the date and the dollar amount may be changed on a repetitive wire."},{"id":"i_487a661beaed","t":"d","term":"representations","ch":6,"d":2,"hy":true,"body":"Along with warranties, these are the existing conditions attested to by the borrower at the time when a loan agreement is executed, on drawdown (i.e., when borrowed funds are received), and with each quarterly reporting requirement."},{"id":"i_e5fa93f7d304","t":"d","term":"repurchase agreement (repo)","ch":5,"d":1,"hy":false,"body":"An agreement in which a bank or securities dealer sells a security it owns (usually government debt) to an investor and agrees to repurchase the same security from the investor at a later date and at a slightly higher price. In most cases, this type of agreement is referred to as a repo agreement from the perspective of the entity selling the securities and agreeing to repurchase them at a later date. From the perspective of the entity that buys the securities with a promise to sell them back at a later date, it is generally known as a reverse repo agreement."},{"id":"i_88b22407bea0","t":"d","term":"reputation risk","ch":16,"d":4,"hy":false,"body":"The risk that customers, suppliers, investors, and/or regulators may decide that a company has a bad reputation and decide not to do business with that company. Reputation risk also relates to how companies react to unexpected events that can impact their reputations and ultimately their futures."},{"id":"i_3c9569136f75","t":"d","term":"request for information (RFI)","ch":7,"d":3,"hy":false,"body":"A document requesting information about a vendor’s interest in providing, and ability to provide, services. The requesting company provides a formal description of its needs and asks selected vendors to submit general information as to how they could meet the company’s needs."},{"id":"i_df820b1249fc","t":"d","term":"request for proposal (RFP)","ch":7,"d":3,"hy":false,"body":"A formal document prepared by a sourcing company that outlines objectives, needs, and service requirements and may be used to obtain bids for anything ranging from one specific service to a company’s entire relationship."},{"id":"i_488651945f72","t":"d","term":"request for quotation/quote (RFQ)","ch":7,"d":3,"hy":false,"body":"A document whose purpose is to invite suppliers into a bidding process on specific products or services. It is best suited to products and services that are essentially standardized and/or commoditized, which makes each supplier’s quote easily comparable to others."},{"id":"i_76478fbb6427","t":"d","term":"required majority ownership","ch":7,"d":3,"hy":true,"body":"A type of political risk in which a government requires that companies must be owned by resident nationals."},{"id":"i_060cc48031f1","t":"d","term":"reserve requirement","ch":3,"d":3,"hy":true,"body":"A central bank requirement that establishes the minimum percentage of customer deposits that financial institutions must hold as reserves and not lend out to other customers. The reserve requirement is an important part of managing monetary policy. In the United States, the reserve requirement is also a factor in the computation of earnings credits, since it represents a US financial institution’s compensation for the level of balances it is required to maintain with the Federal Reserve. Since 2020, the Federal Reserve has set its reserve requirement at 0%."},{"id":"i_1cdf5ca6514a","t":"d","term":"residual income","ch":9,"d":2,"hy":true,"body":"A measurement of company income that includes a deduction for the cost of equity."},{"id":"i_a5f1af29164b","t":"d","term":"residual risk","ch":16,"d":4,"hy":false,"body":"A company’s current risk exposure, defined as the inherent risk less any risk management strategies that have been put in place."},{"id":"i_3d65d3ed0f4e","t":"d","term":"residual value","ch":20,"d":2,"hy":true,"body":"(1) The amount of value remaining after all allowable depreciation charges have been subtracted from a depreciable asset’s book value. (2) The estimated value of an asset at the end of a lease."},{"id":"i_d97301820863","t":"d","term":"restrictive current asset investment strategy","ch":10,"d":1,"hy":true,"body":"A current asset management strategy in which a company maintains low levels of current assets relative to sales. In general, a restrictive current asset investment strategy entails higher potential profitability, due to lower borrowing costs and less lost interest on cash holdings. However, this strategy also implies more operational risk."},{"id":"i_ff229c9da945","t":"d","term":"retail lockbox","ch":12,"d":1,"hy":true,"body":"A lockbox system used primarily to process machine-readable, high-volume, small-dollar consumer-to-business remittances, such as utility and credit card payments."},{"id":"i_ed32133140e3","t":"d","term":"retained earnings","ch":8,"d":1,"hy":true,"body":"A balance sheet account that represents the accumulated net earnings of a corporation since its inception, less dividends paid to shareholders. It also represents the changes in shareholders’ equity arising from the retention of profits and losses of the company, less any dividends paid out to shareholders."},{"id":"i_b61eb849e08f","t":"d","term":"retrospectively (retro) rated insurance program","ch":16,"d":4,"hy":false,"body":"A type of insurance program in which the insured’s cost of coverage for a policy period varies with the insured’s losses during that period. Such programs are used often for workers’ compensation and product liability insurance plans. The insured pays a standard, or deposit, premium at the beginning of the coverage period. At the end of the period, the insurer computes a final premium based on an agreed-upon formula that varies with the insured’s actual costs or losses (subject to limits) for the policy period."},{"id":"i_10426cd23096","t":"d","term":"return item","ch":4,"d":1,"hy":false,"body":"A check that is returned to the bank of first deposit."},{"id":"i_5766a8091b51","t":"d","term":"return on assets (ROA)","ch":9,"d":2,"hy":false,"body":"A performance ratio that measures net income in relation to the investment in assets. A greater value for this ratio implies a larger net income generated per dollar invested in assets. It is computed as net income divided by total assets."},{"id":"i_00099ff6348d","t":"d","term":"return on common equity (ROCE)","ch":9,"d":2,"hy":false,"body":"A performance ratio that measures the amount of earnings available to common shareholders relative to the level of their investment in the company. It is computed as earnings available to common shareholders divided by common equity."},{"id":"i_56d0c51b23a8","t":"d","term":"return on equity (ROE)","ch":9,"d":2,"hy":false,"body":"A measure of a company’s profitability indicating the amount of earnings available to shareholders in terms of their investment in the company."},{"id":"i_cb6d19fa598b","t":"d","term":"return on invested capital (ROIC)","ch":9,"d":2,"hy":false,"body":"A performance measurement ratio that calculates profit per dollar of invested capital. It is computed by dividing net income by invested capital (or longterm debt and equity)."},{"id":"i_0825bc801608","t":"d","term":"reverse positive pay","ch":12,"d":1,"hy":true,"body":"A process whereby a company’s bank transmits a file of the checks presented for payment to the company on a daily or intraday basis. Within a specified time deadline, the company matches this file to a list of checks issued and notifies the bank of any items to be returned."},{"id":"i_5402ad83af4e","t":"d","term":"reverse stock split","ch":20,"d":2,"hy":false,"body":"The opposite of a stock split, this is a process in which a company merges two or more existing shares of stock to create one share of new stock. This is done to increase the company’s share price."},{"id":"i_eaf3817a19d9","t":"d","term":"revolver","ch":3,"d":3,"hy":false,"body":"See revolving credit agreement."},{"id":"i_4cd4f853d737","t":"d","term":"revolving credit","ch":10,"d":1,"hy":true,"body":"A form of credit extension whereby a company grants credit without requiring specific transaction approval, as long as the account remains current."},{"id":"i_3e96e026052b","t":"d","term":"revolving credit agreement (revolving line of credit)","ch":3,"d":3,"hy":false,"body":"A committed line of credit established for a specified period of time, often on a multiyear basis. Revolving credit agreements are formal, contractual commitments with loan agreements, including covenants. Also known as a revolver."},{"id":"i_7068024b59f5","t":"d","term":"right of offset","ch":7,"d":3,"hy":false,"body":"The ability for a bank to use a positive balance on one account to pay off debts or fees originating from another account or other banking services."},{"id":"i_3ab90c38f5f0","t":"d","term":"risk and control self-assessment (RCSA)","ch":16,"d":4,"hy":false,"body":"A risk profile analysis process that identifies the risks, classifies each risk into clearly defined categories, and quantifies the risks with respect to the probability of occurrence as well as the financial impact. The analysis can be used to evaluate the effectiveness of the risk reduction measures that are employed. In some organizations, this process is known as a risk self-assessment."},{"id":"i_e624c20a2678","t":"d","term":"risk appetite","ch":16,"d":4,"hy":true,"body":"An organization’s own assessment of its tolerance for risk."},{"id":"i_518bbc9eb825","t":"d","term":"risk financing","ch":16,"d":4,"hy":true,"body":"The process of identifying and/or raising the funds needed to recover from a loss. Risk-financing techniques involve resources that an organization may draw upon to finance recovery from losses and liabilities for which it is held responsible. Risk financing competes with other uses of corporate funds. Sound financial management requires integrating the organization’s risk-financing needs with other more traditionally productive uses."},{"id":"i_13a0fc289a54","t":"d","term":"risk profile","ch":16,"d":4,"hy":true,"body":"An assessment of how a company’s overall value changes as financial variables change. The basic risk profile for a public company shows how the firm’s earnings per share, common stock price, or overall value responds to changes in interest rates, foreign exchange rates, commodity prices, or other general economic factors."},{"id":"i_60c9e817175b","t":"d","term":"risk retention","ch":16,"d":4,"hy":true,"body":"A risk-financing approach that involves the use of an organization’s internal financial resources to provide funds to finance a recovery from losses. In other words, the organization retains some or all of the loss, rather than transferring it by paying someone else (e.g., an insurance organization) to take it."},{"id":"i_ea47309a7f64","t":"d","term":"risk retention group","ch":16,"d":4,"hy":false,"body":"A special type of group captive formed under the terms of a US federal law that is designed to enable business firms to work together to jointly finance product liability claims. It is often used in industries with a high potential for catastrophic losses, such as the airline industry and certain professional occupations (e.g., physicians in high-risk practice areas, accountants, or lawyers). To the extent that risks are shared, this is considered insurance."},{"id":"i_cd4a3d0035d9","t":"d","term":"risk transfer","ch":16,"d":4,"hy":true,"body":"The shifting of responsibility for a risk from one party to another, often through insurance. The essence of any risk transfer is a contract between a transferring organization (i.e., the transferor) and another entity (i.e., the transferee), under which the transferee agrees to pay designated types of the transferor’s losses within contractual limits. The transferor may have to pay the transferee a fee (e.g., an insurance premium) for this promise of indemnity, or the transferor may have the bargaining power to secure this promise as a condition for agreeing to do business with the transferee."},{"id":"i_92c250a55d34","t":"d","term":"risk/return trade-off","ch":13,"d":1,"hy":true,"body":"The principle that potential return rises with an increase in risk. Low levels of uncertainty or risk are associated with low potential returns, whereas high levels of uncertainty or risk are associated with high potential returns. According to the risk/return trade-off, invested money can render higher profits only if the investor is willing to accept the possibility of losses."},{"id":"i_51c309ca1b06","t":"d","term":"risk-adjusted discount rate (RADR)","ch":9,"d":2,"hy":false,"body":"A type of cost/benefit analysis that essentially requires high-risk endeavors to earn a higher rate of return in order to justify the investment. When properly applied, RADR allows a firm to more closely match its capital needs to available sources and to better manage its overall levels of risk and return."},{"id":"i_dc571e0296f9","t":"d","term":"risk-adjusted return on capital (RAROC)","ch":9,"d":2,"hy":false,"body":"A method of determining the economic value of a transaction or activity based upon the anticipated risk-adjusted performance of the activity."},{"id":"i_42634f8d8bca","t":"d","term":"risk-free asset","ch":19,"d":2,"hy":true,"body":"A type of asset that has a certain future return. US Treasuries (especially Treasury bills) are considered to be risk-free because they are backed by the US government."},{"id":"i_3ef56d553c5f","t":"d","term":"robotic process automation (RPA)","ch":15,"d":5,"hy":false,"body":"A rules-based technology enabling users to automate repetitive tasks."},{"id":"i_e7031f23cb55","t":"d","term":"rolling forecast","ch":14,"d":1,"hy":true,"body":"A type of forecast in which the forecast is updated or “rolled” forward at the end of each period. Typically, the number of periods in the forecast (days, weeks, months, etc.) remains constant, but old periods are not presented and new periods are added as the forecast progresses."},{"id":"i_fbb324c3deac","t":"d","term":"routing transit number (RTN)","ch":4,"d":1,"hy":false,"body":"In the United States, this is a nine-digit number that identifies the bank for a payment (e.g., check, electronic funds transfer, or automated clearinghouse (ACH) transaction) and provides the depository bank with the information it requires to route the payment back to the paying bank through the clearing system. Also known as a routing number or an American Bankers Association (ABA) number."},{"id":"i_5f1261f00d6a","t":"d","term":"Rule 2a-7","ch":2,"d":4,"hy":true,"body":"A regulation instituted by the US Securities and Exchange Commission (SEC) that restricts investments in money market funds. It imposes minimum liquidity requirements, implements daily and weekly liquidity requirements, and restricts the ability of funds to purchase illiquid and lower-quality securities."},{"id":"i_a163e5040c26","t":"d","term":"sales tax","ch":2,"d":4,"hy":false,"body":"A type of tax that is charged at the point of purchase for certain goods and services. The tax amount is typically calculated by applying a percentage rate to the taxable price of a sale."},{"id":"i_b92d1ad0cb1d","t":"d","term":"Sarbanes-Oxley Act of 2002 (SOX)","ch":2,"d":4,"hy":true,"body":"US legislation that requires companies to evaluate and disclose their internal financial controls as they relate to financial reporting, and requires auditors to attest to, or confirm, the effectiveness of these controls. It further requires that chief executive officers and chief financial officers certify financial statements and specifies fines and jail sentences for knowingly and willfully misstating information therein. The act also requires companies with publicly traded securities to maintain independent audit committees (of the board of directors) that can interact with the external auditor in an unfettered way."},{"id":"i_8afc6b3d751e","t":"d","term":"Sarbanes-Oxley Act (SOX) Section","ch":16,"d":4,"hy":false,"body":"A section of SOX that requires a firm to establish internal controls over financial reporting to prevent material errors or misrepresentations in the firm’s financial statements."},{"id":"i_564f8d607dbd","t":"d","term":"savings account","ch":7,"d":3,"hy":false,"body":"A type of interest-bearing depository account. Savings accounts can be any of the following: call accounts, which allow depositors to withdraw funds at any time (a call account is similar to a demand deposit account [DDA], except that payments cannot be made to third parties from the account); notice accounts, which allow depositors to withdraw funds following a notice period; or fixed accounts, which only permit depositors access to the funds at the end of the term."},{"id":"i_eec607ca7256","t":"d","term":"scenario analysis","ch":9,"d":2,"hy":true,"body":"A method for assessing investment risk, this type of what-if analysis assesses possible outcomes under a range of circumstances. It is frequently used to establish the lower bound (i.e., worst case) and upper bound (i.e., best case) of outcomes. Scenario analysis is similar to sensitivity analysis, but more than one variable is altered at a time. Scenario analysis usually starts with a base case—an expected value for each input variable affecting the final value."},{"id":"i_aa68f9a3b402","t":"d","term":"scorecard","ch":7,"d":3,"hy":true,"body":"A management tool used by a company to qualitatively and quantitatively measure a service provider’s performance. The primary purpose of a scorecard is to provide feedback on the service provided and the benefit received."},{"id":"i_661a372b45f3","t":"d","term":"seasonal dating","ch":10,"d":1,"hy":true,"body":"A term of sale whereby the seller agrees to accept payment at the end of the buyer’s selling season."},{"id":"i_5568c5b8e08c","t":"d","term":"seasonal pattern","ch":14,"d":1,"hy":false,"body":"A pattern that repeats with regard to time of year."},{"id":"i_91cad5fd9eb5","t":"d","term":"seasoned equity offering (SEO)","ch":6,"d":2,"hy":false,"body":"A type of stock offering in which new stock shares are sold by a company that has shares already trading on an exchange or in the over-the-counter market. The market price of existing shares guides the price for new shares. Also referred to as a follow-on issue."},{"id":"i_6c3a00c333a3","t":"d","term":"secondary market","ch":6,"d":2,"hy":true,"body":"A financial market that trades previously issued securities. Existing debt and equity issues are traded by retail and institutional investors in secondary markets through established exchanges or through over-the-counter markets. Since the securities are bought and sold among investors, the issuing firm experiences neither a change in cash flow nor a change in the number of securities outstanding."},{"id":"i_4880f5714483","t":"d","term":"Securities and Exchange Commission (SEC)","ch":2,"d":4,"hy":true,"body":"A US federal agency designed to maintain a fair and orderly market for investors by regulating and supervising securities sales."},{"id":"i_412f7197990a","t":"d","term":"securities exchange","ch":2,"d":4,"hy":true,"body":"An organized stock exchange that facilitates the buying and selling of debt and equity securities. Also known as a stock exchange."},{"id":"i_8bd6fc54e47d","t":"d","term":"securities trader","ch":6,"d":2,"hy":false,"body":"Within an investment bank or brokerage firm, this is a market participant who helps to maintain active, orderly secondary markets for equity and debt instruments."},{"id":"i_9a754f0a4844","t":"d","term":"securitization","ch":6,"d":2,"hy":true,"body":"The practice of pooling various debt contracts, such as consumer loans, credit card debt, and mortgages, and using them as a basis for issuing securities. Many types of debt instruments are securitized to increase liquidity, thus lowering the cost of capital to borrowers. The primary corporate applications of securitization are accounts receivable and inventory. These are bundled together to collateralize securities and are generally sold in tranches based on credit rating or maturities, making them more liquid and attractive to investors."},{"id":"i_3fe3f3ce0f54","t":"d","term":"security device","ch":15,"d":5,"hy":false,"body":"In electronic payment security, this is a key or token used to guard against misuse or fraud."},{"id":"i_7e74a52e884d","t":"d","term":"segregation of duties","ch":12,"d":1,"hy":true,"body":"The concept of having more than one person required to complete a specific activity, such as making a vendor payment or collecting and posting revenue from customers. Segregation, or separation, of duties is a key internal control issue that is important in managing risk and reducing fraud. At an operational level, responsibilities such as approval, authorization, and verification functions, including expense approval, check-signing authority, and account reconciliation, should be separated."},{"id":"i_8e916ac29ea0","t":"d","term":"seigniorage","ch":3,"d":3,"hy":true,"body":"Government revenue from the issuance of coin and currency, which is based on the difference between the value of the money and the cost to produce it. Historically, it arose from the manufacture of coins, which were worth more than the metal used to mint the coins."},{"id":"i_8cd8037d07ab","t":"d","term":"self-insurance","ch":16,"d":4,"hy":false,"body":"An approach used by some organizations as an alternative to purchasing insurance. This practice is not technically a form of insurance because it does not involve a transfer of risk to an insurer or another separate entity; instead, the organization will cover its own losses. It is often used by large organizations to manage their employee health care expenses. The term self-insurance can describe any risk retention program, even quite informal, unfunded arrangements. Self-insured retention (SIR) is the component of loss covered by the insured in a policy. Self-insurance represents a conscious decision to retain risk, in contrast with noninsurance, which does not."},{"id":"i_fffd6af99a3a","t":"d","term":"sell side","ch":20,"d":2,"hy":false,"body":"The part of an investment bank that supports companies in the issuance and sale of stocks and bonds."},{"id":"i_102525a3b7ed","t":"d","term":"semi-repetitive wire","ch":12,"d":1,"hy":true,"body":"A type of wire transfer where the debit and credit parties remain the same (as in a repetitive wire transfer), but the description (e.g., a customer or an invoice number) may be changed, along with the date and the dollar amount."},{"id":"i_7729dbfe9d1d","t":"d","term":"sensitivity analysis","ch":9,"d":2,"hy":true,"body":"A method of assessing investment risk, this type of analysis determines how a final outcome, such as net present value, is influenced by changes in the value of a particular variable (e.g., sales, or an operating or financing cost) and how vulnerable the expected outcome is to changes in a specific assumption. Note that with sensitivity analysis only one variable at a time is changed, rather than a set of variables as in scenario analysis."},{"id":"i_f4a3ae98c090","t":"d","term":"service agreement","ch":7,"d":3,"hy":true,"body":"A legal document (contract) that describes the requirements and expectations of both the purchaser and provider of a specific service or services."},{"id":"i_189a7eae82a3","t":"d","term":"service charge","ch":7,"d":3,"hy":true,"body":"An explicit fee or price charged for service(s) provided by a financial institution. Service charges are either expressed as a flat monthly fee or as a per-item or per-unit price. In the case of the latter, the unit price is multiplied by the volume to arrive at the analysis period total (in the account analysis process)."},{"id":"i_b545e5439fb0","t":"d","term":"service industry ratios","ch":9,"d":2,"hy":false,"body":"Ratios used in ratio analysis of firms in the service sector. Service companies typically have small investments in buildings and land, and rely more on human talent than physical assets."},{"id":"i_0a10a483973e","t":"d","term":"service level agreement (SLA)","ch":7,"d":3,"hy":false,"body":"An agreement (which may be a separate document or part of a service agreement) that specifies the level of service expected from a vendor such as a financial service provider, along with a description of any penalties for failure to comply with the requirements of the agreement."},{"id":"i_6c5000afbf1e","t":"d","term":"settlement","ch":4,"d":1,"hy":true,"body":"In a payment system, this is the actual movement of funds from the payor’s account to the payee’s account."},{"id":"i_15f2839c551e","t":"d","term":"settlement mechanism","ch":4,"d":1,"hy":false,"body":"In a payment system, this is the mechanism or operation used to complete the transfer of value from the payor to the payee."},{"id":"i_81b0a9f76bdb","t":"d","term":"settlement risk","ch":4,"d":1,"hy":false,"body":"A form of counterparty credit risk that is related to the probability that a party funding a transaction will default on the actual payment or settlement obligation. In a foreign exchange (FX) transaction, settlement risk is the risk that one party to the transaction provides the currency it agreed to sell but does not receive the currency it agreed to buy. Thus, the transaction is not settled."},{"id":"i_d32daee17f9f","t":"d","term":"shared services center (SSC)","ch":1,"d":1,"hy":false,"body":"A department or operation within a multiunit organization tasked with supplying multiple business units and their respective divisions and departments with specialized services, such as information technology, human resources, or accounts payable services. In some companies this includes day-to-day treasury operations (e.g., cash management) and other treasury functions, which may be operated as SSCs."},{"id":"i_310378d3dd99","t":"d","term":"shareholder return policy","ch":20,"d":2,"hy":false,"body":"A policy that sets out how a firm’s management will distribute any earnings not reinvested in the company back to shareholders, typically either by paying dividends or repurchasing stock."},{"id":"i_d4d52301fb27","t":"d","term":"shelf registration","ch":20,"d":2,"hy":false,"body":"A securities offering whereby a company is able to issue shares or other securities over a period of time (three years according to US Securities and Exchange Commission [SEC] Rule ), without the need to publish an additional prospectus each time."},{"id":"i_1f4afc108cfd","t":"d","term":"short-selling","ch":19,"d":2,"hy":false,"body":"The practice of selling a security an investor does not yet own, typically in the expectation that the price of the security will fall. Also known as shorting."},{"id":"i_2924019b1215","t":"d","term":"short-term financial investment","ch":5,"d":1,"hy":false,"body":"An investment using short-term instruments with a maturity of less than one year."},{"id":"i_fea4a39d870c","t":"d","term":"short-term financing","ch":1,"d":1,"hy":true,"body":"A financing strategy used to meet temporary cash needs for periods of one year or less."},{"id":"i_fa5500fd54bd","t":"d","term":"short-term forecasting","ch":14,"d":1,"hy":false,"body":"A type of cash forecasting in which the forecasts typically range from one to ninety days in length and predict cash receipts and disbursements, as well as the resulting balances, on a daily, weekly, monthly, or quarterly basis."},{"id":"i_26c513c74e9b","t":"d","term":"sight draft","ch":4,"d":1,"hy":true,"body":"A draft that is payable upon presentment, provided all of the terms of the draft have been met. Sight drafts are usually presented in combination with other documents, such as titles or bills of lading. If all the documentation is in order, then the draft is payable upon presentment (i.e., at sight)."},{"id":"i_264e49869074","t":"d","term":"signature card","ch":7,"d":3,"hy":false,"body":"A document that businesses furnish to banks to show the signatures of authorized signers (or specimens of both facsimile and electronic signatures) for all accounts."},{"id":"i_451c82c0481d","t":"d","term":"simple moving average","ch":14,"d":1,"hy":true,"body":"A statistical forecasting methodology (and type of time series forecasting) that bases the forecast on a rolling average of past values for a series."},{"id":"i_81c0e8e986cf","t":"d","term":"simulation","ch":9,"d":2,"hy":true,"body":"A method of assessing investment risk, this method combines aspects of scenario and sensitivity analyses, allowing certain assumptions in a decision model to fluctuate simultaneously."},{"id":"i_c2305fb54d38","t":"d","term":"Single Euro Payments Area (SEPA)","ch":4,"d":1,"hy":false,"body":"The name of both the geographic area covered by the euro and the EU payments integration initiative for that area. SEPA focuses on the technical, legal, and commercial barriers to paying and/or receiving euros cross-border within SEPA boundaries. SEPA establishes minimum standards and common pricing for payments processing within the European Union."},{"id":"i_b1aff7d37689","t":"d","term":"single payment note","ch":13,"d":1,"hy":true,"body":"A type of note that is usually granted for a short period of time and specific purpose, with both the principal and interest amounts paid at maturity. Because of the limited duration and precise maturity of a single payment note, a specific cash flow event is frequently identified as the repayment source at the time the funds are advanced."},{"id":"i_dc6d408b71ec","t":"d","term":"single sign-on (SSO)","ch":15,"d":5,"hy":false,"body":"A software technique that allows an individual to enter one username and password in order to access multiple applications on the same network or at the same host."},{"id":"i_453719da4cf5","t":"d","term":"single-parent captive","ch":16,"d":4,"hy":false,"body":"An approach to risk retention in which a subsidiary is owned for the purpose of insuring the risk of a parent company or its affiliates. The captive provides guaranteed access to insurance and may be used to provide unique types of insurance coverage or favorable rates, or to obtain additional limits not available in the market. In addition, as long as there is a genuine transfer of risk to the captive entity, establishing a single-parent captive can generate tax advantages for the parent company. A major loss could result in insolvency for the captive, but the parent company would survive."},{"id":"i_c2e223ecc6fa","t":"d","term":"single-use card","ch":4,"d":1,"hy":true,"body":"A disposable credit card number that looks like a regular credit card number, including an embedded expiration date and security code, but will only work for a single use."},{"id":"i_df9cde1186b0","t":"d","term":"sinking fund","ch":6,"d":2,"hy":true,"body":"Arrangements for the orderly repayment of debt principal, which might include the regular setting aside of funds so that the size of the sinking fund equals the principal by the maturity date."},{"id":"i_de30fdbf33a6","t":"d","term":"smart card","ch":4,"d":1,"hy":true,"body":"A typical payment card with the addition of a computer chip with related circuitry that can be used to store information for security or transaction processing. Also known as a chip card."},{"id":"i_fbcb1aa177b6","t":"d","term":"smart card authentication","ch":15,"d":5,"hy":false,"body":"See token."},{"id":"i_9f41a2fd3351","t":"d","term":"smart safe","ch":12,"d":1,"hy":false,"body":"A type of safe that records deposits and reports them to the armored carrier and the bank used by the receiving company. See virtual vault service."},{"id":"i_ccf85e0ba8ab","t":"d","term":"SOFR","ch":6,"d":2,"hy":false,"body":"Acronym for Secured Overnight Financing Rate. Published daily by the New York Federal Reserve, SOFR is the preferred risk-free reference rate for USD-denominated transactions."},{"id":"i_4e9c648d52ad","t":"d","term":"software as a service (SaaS)","ch":15,"d":5,"hy":false,"body":"A distribution model in which software is run on a hosted technology platform and provided to the end user on an as-needed basis. SaaS applications are typically accessed over the internet using a browser. The vendor is responsible for updating and maintaining the software, as well as providing for appropriate backup and data recovery."},{"id":"i_40fdaeddab95","t":"d","term":"SONIA","ch":6,"d":2,"hy":false,"body":"Acronym for Sterling Overnight Index Average. Managed by the Bank of England, SONIA is the preferred risk-free reference rate for GBP-denominated transactions."},{"id":"i_3e9da39903c3","t":"d","term":"sovereign bond","ch":6,"d":2,"hy":true,"body":"A bond issued by a national government and typically denominated in the currency of the issuing government. Also referred to as sovereign debt."},{"id":"i_223ddcee7b56","t":"d","term":"sovereign risk","ch":7,"d":3,"hy":true,"body":"The risk that a government may default on its debt."},{"id":"i_4c418574b7a2","t":"d","term":"special dividend","ch":20,"d":2,"hy":true,"body":"A dividend that is paid on a one-time basis, rather than as a regular quarterly dividend."},{"id":"i_58d0eea628dd","t":"d","term":"special drawing right (SDR)","ch":6,"d":2,"hy":false,"body":"An artificial currency, created by the International Monetary Fund, whose asset value is based on a basket of currencies consisting of the Chinese yuan, euro, Japanese yen, British pound sterling, and US dollar."},{"id":"i_9b3be4350308","t":"d","term":"special purpose acquisition company (SPAC)","ch":6,"d":2,"hy":false,"body":"A company that raises capital via an initial public offering (IPO) for future acquisitions. Any raised funds are placed in trust to be used to purchase stock in already established companies."},{"id":"i_6f890a3ed22e","t":"d","term":"specific-project guarantee","ch":6,"d":2,"hy":true,"body":"A type of loan guarantee in which the guaranteeing party guarantees only loans relating to specific projects of the subsidiary, rather than all loans."},{"id":"i_e334ea0dd5f7","t":"d","term":"speculation","ch":17,"d":4,"hy":true,"body":"A practice that involves taking a position on the direction of the market in order to make a profit, which is not usually a treasury objective. In some organizations, however, speculation in certain markets may be a treasury objective, as determined by the board of directors."},{"id":"i_40bf3664409d","t":"d","term":"spot contract","ch":17,"d":4,"hy":false,"body":"An agreement between two parties to buy or sell a fixed amount of an asset immediately or in the very near future (settlement is typically two days for currencies)."},{"id":"i_63e452b824a1","t":"d","term":"spot foreign exchange (FX) rate","ch":17,"d":4,"hy":false,"body":"A rate quoted for the delivery (or settlement) of currency one or two business days following the date of the trade. Also referred to as a spot rate."},{"id":"i_a96812f66b96","t":"d","term":"spot market","ch":3,"d":3,"hy":true,"body":"The market for immediate trading of currency or commodities."},{"id":"i_ea118158db41","t":"d","term":"spread","ch":3,"d":3,"hy":true,"body":"The difference between the bid and ask price of a particular security or asset. The spread represents the dealer’s gross profit on a specific transaction."},{"id":"i_fa90e6cfde35","t":"d","term":"standard operating procedure (SOP)","ch":18,"d":4,"hy":false,"body":"The normal or usual way of completing a specific task or duty. SOPs are often documented so that they can be performed on a routine basis and executed in a consistent manner."},{"id":"i_067d4e0f56c5","t":"d","term":"standby letter of credit (L/C)","ch":12,"d":1,"hy":false,"body":"A variation of a commercial L/C in which the bank providing the standby L/C agrees to make payment in the event that its customer cannot. While standby L/Cs can be issued by insurance companies in some countries, they are issued primarily by banks. Standby L/Cs are similar to demand guarantees issued by non-US banks."},{"id":"i_a11b579c2445","t":"d","term":"standing wire","ch":12,"d":1,"hy":true,"body":"A type of wire transfer where a company establishes repetitive transfer instructions to move funds between two specified accounts automatically when previously determined criteria are met."},{"id":"i_c5b956da1520","t":"d","term":"statement of beneficial ownership/interest","ch":7,"d":3,"hy":false,"body":"A document that specifies who has control over funds or accounts. This may be separate from who has signature authority or legal title."},{"id":"i_66f349bb40bc","t":"d","term":"statement of cash flows","ch":8,"d":1,"hy":true,"body":"A financial statement that provides a detailed picture of the sources of a company’s cash flows and how these sources are used. Also known as a cash flow statement."},{"id":"i_9e6a55b6b456","t":"d","term":"18","ch":7,"d":3,"hy":false,"body":"A standard for auditing service organizations."},{"id":"i_a687c854f512","t":"d","term":"state-owned enterprise (SOE)","ch":6,"d":2,"hy":false,"body":"A company that is created by a national government in order to participate in or help support various commercial activities on the government’s behalf. SOEs are also known as crown corporations in Canada or government-sponsored enterprises (GSEs) in the United States."},{"id":"i_015fe5da07f7","t":"d","term":"static forecast","ch":14,"d":1,"hy":false,"body":"A type of forecast in which the period being forecasted, such as a calendar year, does not change as the forecast is updated."},{"id":"i_89fbcc42a564","t":"d","term":"step-up cost","ch":9,"d":2,"hy":true,"body":"A type of cost that is fixed over a wide range of activity, but once output reaches a certain level, requires additional fixed costs to facilitate an increased level of output."},{"id":"i_9b248ff5307e","t":"d","term":"stock dividend","ch":20,"d":2,"hy":true,"body":"A dividend that pays shareholders additional shares of stock rather than cash dividends."},{"id":"i_2832156105d2","t":"d","term":"stock repurchase","ch":20,"d":2,"hy":true,"body":"A practice where a company uses some of its profits to purchase existing shares of its stock, either on the open market or directly from shareholders."},{"id":"i_eafccaeb1402","t":"d","term":"stock split","ch":20,"d":2,"hy":true,"body":"A process in which a company splits one existing share of stock into more than one share at a reduced share price, thereby placing the stock into a more desirable price range. The basic idea behind a stock split is that an optimal trading range exists for a stock’s price."},{"id":"i_eb98eca3470c","t":"d","term":"stored-value card (SVC)","ch":4,"d":1,"hy":false,"body":"A type of debit card that may be offered by financial institutions, retailers, and other service providers, and can be a branded, open-loop card (e.g., Visa or Mastercard), or a private-label, closed-loop card (e.g., Starbucks or other merchant gift card). Generally, an open-loop card can be used almost anywhere while a closed-loop card can only be used at one selected merchant or group of merchants. Gift cards are one of the most commonly used types of SVC."},{"id":"i_8a6aadab549e","t":"d","term":"stores and supplies","ch":10,"d":1,"hy":false,"body":"A category of inventories that are not used directly in a production process; rather, they support the production process. They are also known as indirect purchases."},{"id":"i_b146ffc5c6ed","t":"d","term":"straight-through processing (STP)","ch":15,"d":5,"hy":false,"body":"An initiative used by companies to optimize the speed at which transactions are processed. STP refers to eliminating all manual intervention so that a particular process is totally electronic from beginning to end."},{"id":"i_5452bd968add","t":"d","term":"strategic risk","ch":16,"d":4,"hy":false,"body":"The risk associated with the execution of the business plan or strategy established by a company’s management. It includes the risk of major investments for which there is significant uncertainty about success or profitability. Examples in this area include entering into new markets, trying to spot and take advantage of trends, and investing in new technology."},{"id":"i_48a1eab38f02","t":"d","term":"street name","ch":3,"d":3,"hy":false,"body":"The registered name for securities in a brokerage account in which the customer’s securities and assets are held under the name of the brokerage firm, rather than in the name of the individual who purchased the securities or assets."},{"id":"i_531afa92f898","t":"d","term":"stress test","ch":3,"d":3,"hy":false,"body":"An analytical exercise that assumes an adverse change in one or more of a firm’s funding sources, or a major shock to a company’s core business due to a litigation crisis, competitor’s action, product recall, production plant disaster, financial crisis, or other source of business trauma. The proposed change in funds availability may involve the loss of one or more of a firm’s borrowing facilities, a sudden and large increase in borrowing costs, or both. Such changes may reduce the firm’s credit rating, violate loan covenants, or cause a technical default on a credit facility."},{"id":"i_24cd229a2ba1","t":"d","term":"sub-sovereign bond","ch":6,"d":2,"hy":false,"body":"A type of bond issued by a level of government below the national or central government, which includes regions, provinces, states, and municipalities. Subsovereign bonds are subject to various national and regional provisions in their country of origin and may have tax implications."},{"id":"i_061a90152ee5","t":"d","term":"sub-sovereign entity","ch":6,"d":2,"hy":false,"body":"A government entity that is smaller than and subordinate to a national government. Examples of sub-sovereign entities include states, provinces, counties, and territories."},{"id":"i_1851cad8d9ec","t":"d","term":"supplier risk","ch":16,"d":4,"hy":false,"body":"Risk related to an organization’s suppliers and outsourcing arrangements. Supplier risk is a specific type of counterparty risk that also entails significant operational risk. The more critical the supplier or commodity is in the production process, the more risk an organization faces if the supplier either fails to deliver according to plan or provides substandard products and services that result in customer dissatisfaction."},{"id":"i_560aaab23e7e","t":"d","term":"supplier-managed replenishment program","ch":10,"d":1,"hy":false,"body":"An inventory management process whereby the supplier maintains and tracks the inventory of materials it provides to a customer. Title to the product is transferred at the shipping dock."},{"id":"i_965c729649a0","t":"d","term":"supply chain finance","ch":10,"d":1,"hy":true,"body":"A finance method that is effectively a form of reverse factoring, in which an organization uses its relatively stronger credit rating to allow its suppliers to finance their receivables."},{"id":"i_6e959cbeaa23","t":"d","term":"supply chain management","ch":10,"d":1,"hy":false,"body":"The integration of business processes with the entire chain of trading partners, which can include suppliers, intermediaries, third-party service providers, and customers."},{"id":"i_007b303f952e","t":"d","term":"surety bond","ch":12,"d":1,"hy":false,"body":"A type of performance guarantee involving three parties: the principal, the obligee, and the surety company. It allows the obligee to make a claim against the surety company (the issuer of the bond) if the principal fails to meet the obligations stated in the bond."},{"id":"i_ade3217578be","t":"d","term":"swap","ch":17,"d":4,"hy":true,"body":"An agreement between two parties to exchange (or swap) a set of cash flows at a future point in time."},{"id":"i_98464c5ac994","t":"d","term":"sweep account","ch":12,"d":1,"hy":true,"body":"An account used by a US organization that has its depository institution sweep any excess, end-of-day funds into an investment account. Though sweep accounts are not actually a separate category of short-term investment, they are used widely and are diverse, offering investment in repos or other money market instruments, managed accounts, and mutual funds. Some sweeps offer tax-exempt, offshore investments."},{"id":"i_945703941826","t":"d","term":"sweeping","ch":12,"d":1,"hy":false,"body":"A liquidity management technique in which balances are moved automatically from bank accounts to another location. This may be directly into short-term investment instruments (including sweep accounts and money market funds) or indirectly to a header account, from which further activity is managed."},{"id":"i_d671df5c2cd8","t":"d","term":"Swift (formerly the Society for Worldwide Interbank Financial Telecommunication)","ch":4,"d":1,"hy":false,"body":"A financial industry-owned, cooperative, interbank telecommunication network that enables banks, nonbank financial institutions, and some corporations to send authenticated electronic messages in standard formats."},{"id":"i_de56d5b920f8","t":"d","term":"SWIFT code","ch":7,"d":3,"hy":false,"body":"See Business Identifier Code."},{"id":"i_54d56ee7eb9c","t":"d","term":"syndicate","ch":6,"d":2,"hy":true,"body":"In investment banking terms, this is a group of banks or brokerage firms that work together, typically to underwrite a securities issue or arrange a loan. Syndication allows the issuer (or borrower) to arrange larger volumes of funding."},{"id":"i_636aa365aa12","t":"d","term":"systemic risk","ch":2,"d":4,"hy":true,"body":"The risk of collapse of an entire financial system or entire market, as opposed to risk associated with any one individual organization, group, or component of a system. It is a risk imposed by linkages and interdependencies in a market or an economy that lead to a potential cascading failure that could bring down an entire banking system or market."},{"id":"i_2d78162e53ac","t":"d","term":"T2 system","ch":4,"d":1,"hy":false,"body":"A system that provides real-time gross settlement for in-country and cross-border electronic payments in euros.T2 refers to the third generation of the Trans-European Automated Real-time Gross Settlement Express Transfer (TARGET) system."},{"id":"i_b9489bd379bd","t":"d","term":"target balance account","ch":12,"d":1,"hy":false,"body":"A type of bank account (typically used for disbursements via check or electronic funds transfer) where the end-of-day balance in the account is maintained at a target balance. Transfers are made from a header account to fund this account, typically at the end of the day. See zero balance account (ZBA)."},{"id":"i_717b015c7b6f","t":"d","term":"target capital structure","ch":20,"d":2,"hy":true,"body":"The specific capital structure that a company has set as its desired structure. This is typically the mix of debt and equity the company will use in raising new capital."},{"id":"i_63e4b9d4afdb","t":"d","term":"target cash balance","ch":14,"d":1,"hy":false,"body":"The ideal amount of cash that a company wishes to hold in reserve at any given point in time. This figure hopes to strike a balance between the investment opportunity costs of holding too much cash and the balance sheet costs of holding too little."},{"id":"i_f62bfe940f33","t":"d","term":"target risk","ch":16,"d":4,"hy":true,"body":"An acceptable level of risk that reflects a company’s risk appetite, achieved by lowering the inherent level of risk through risk management strategies."},{"id":"i_f5170cc0e1a5","t":"d","term":"tax anticipation note (TAN)","ch":5,"d":1,"hy":false,"body":"A short-term debt security issued in anticipation of future tax collections. TANs are generally issued by US state and municipal governments to provide immediate funding for a capital expenditure, such as highway construction."},{"id":"i_1aaf715e3ee9","t":"d","term":"tax increment financing (TIF) bond","ch":6,"d":2,"hy":false,"body":"A type of bond used primarily for local financing in which a municipality may use all or a portion of new property taxes or sales taxes within a designated district to assist in a project’s financing."},{"id":"i_9c4b477535d8","t":"d","term":"technology risk","ch":16,"d":4,"hy":false,"body":"The risk an organization faces as a result of its use of technology. As the treasury area of an organization increasingly relies on departmental technology and other integrated systems, the operational risk associated with the use of technology increases. Technology risk includes risks associated with (1) security breaches, (2) use of computerbased spreadsheets, and (3) the choice of a particular technology platform or vendor."},{"id":"i_e69e0f89a20c","t":"d","term":"tender option bond","ch":6,"d":2,"hy":true,"body":"A type of bond (also known as a put bond) that allows the holder to redeem the bond (i.e., sell it back to the issuer) either once during its life or on specified dates. Redemption is usually at par value."},{"id":"i_580dfd34569d","t":"d","term":"term loan","ch":6,"d":2,"hy":true,"body":"A type of loan with a fixed maturity, usually greater than one year, that can be repaid either in installments or in a single payment."},{"id":"i_c9ef17d85b89","t":"d","term":"term note","ch":6,"d":2,"hy":true,"body":"A medium- or intermediate-term debt instrument, typically with terms from two to ten years, issued by an organization. In most cases, these notes pay interest at periodic intervals and are similar to long-term bonds except for the shorter maturity."},{"id":"i_eb056b471a7a","t":"d","term":"terrorism risk","ch":16,"d":4,"hy":false,"body":"A type of event risk related to terrorist attacks or other terrorist activities. Terrorism has become a significant threat to the operations of many organizations. Many disaster recovery plans specifically include recovery from terrorist events, in addition to natural disasters. Most organizations try to manage exposure to terrorist activities by increasing the level of security for both their premises and employees."},{"id":"i_9b29c09d4636","t":"d","term":"thinly capitalized","ch":20,"d":2,"hy":true,"body":"A description of a company that has a very small amount of capital or initial investment in relation to the amount of business the company conducts. The term is often used by taxing authorities in referring to subsidiary companies run by foreign corporations with minimal initial investment. Also known as thin cap."},{"id":"i_0040c0d72e0c","t":"d","term":"threshold balance account","ch":12,"d":1,"hy":false,"body":"A type of bank account similar to a zero balance account (ZBA) or target balance account, but which is not designed to have the same balance at the end of each day (e.g., zero or a set target). Instead, the company decides either to fund an account if the balance falls below a certain threshold (typically if the account is used for disbursements) or to defund an account once its balance goes above a specified threshold (typically if the account is used for collections)."},{"id":"i_3936aa7bd949","t":"d","term":"Tier 1 capital","ch":3,"d":3,"hy":false,"body":"The form of minimum common equity that banks are required to hold, based on Basel III requirements. Tier 1 capital includes Common Equity Tier 1 (CET1) capital and Additional Tier 1 (AT1) capital. The Based Committee defines Tier 1 capital as “going concern” capital, with CET1 being “the highest quality of regulatory capital, as it absorbs losses immediately when they occur.” CET1 capital includes paid-up capital and retained earnings. AT1 capital includes instruments that can be converted to CET1 capital if needed."},{"id":"i_3ac04c924860","t":"d","term":"time deposit account (TDA)","ch":7,"d":3,"hy":false,"body":"A depository account that must be maintained at a financial institution for a contractually specified period of time. Early withdrawal is allowed only with prior notification. Further, an early withdrawal may result in a penalty. Also known as a noncurrent account."},{"id":"i_4be27fae6987","t":"d","term":"time draft","ch":4,"d":1,"hy":true,"body":"A draft that is payable at some future date, provided all of the terms of the draft have been met. As with sight drafts, time drafts are usually presented in combination with other documents, such as titles or bills of lading. If all the documentation is in order, then the draft is payable at the specified future date."},{"id":"i_831810954281","t":"d","term":"time series forecasting","ch":14,"d":1,"hy":false,"body":"A forecasting process where a serial chain of values (known as a time series) for some variable (e.g., sales) is identified. Every time series contains a trend, a seasonal pattern, a cyclical pattern, and random movement."},{"id":"i_4f37a8ced6cc","t":"d","term":"time value of money","ch":9,"d":2,"hy":true,"body":"A fundamental finance principle that establishes the relationship between cash flows received at different times. For example, a dollar received today is worth more than a dollar received tomorrow because today’s dollar can be invested to earn a return. Conversely, a dollar received tomorrow is worth less than a dollar received today because the opportunity to earn interest is lost."},{"id":"i_c4a54ae40b9b","t":"d","term":"times interest earned (TIE) ratio","ch":9,"d":2,"hy":false,"body":"A coverage ratio that measures a firm’s ability to service its debt through interest payments. It is computed as operating income (i.e., earnings before interest and taxes, or EBIT) divided by interest expense."},{"id":"i_ee977806d728","t":"d","term":"token","ch":15,"d":5,"hy":true,"body":"A security device that the owner uses to authorize access to a network or online service. Tokens are electronic devices that contain circuitry that encodes assigned user-specific information or personal information to help ensure password protection."},{"id":"i_da975d70740e","t":"d","term":"total asset turnover ratio","ch":9,"d":2,"hy":false,"body":"An efficiency/asset management ratio that measures how many times a firm’s asset base was used (i.e., turned over) in generating the flow of revenue during the period. It is computed as revenues divided by total assets."},{"id":"i_66d41f71d156","t":"d","term":"total leverage","ch":9,"d":2,"hy":false,"body":"A measurement of the sensitivity of a company’s net income to its overall sales."},{"id":"i_9c5e379cf5c8","t":"d","term":"total liabilities to total assets ratio","ch":9,"d":2,"hy":true,"body":"A type of debt management ratio that measures the percentage of assets that are not financed by equity. It is computed as total liabilities divided by total assets."},{"id":"i_f5b2700b7d47","t":"d","term":"tracking stock","ch":6,"d":2,"hy":true,"body":"A special type of stock that is a separate stock created by a parent company to track the financial progress of a particular line of business. Despite being part of a publicly traded entity, tracking stocks trade under unique ticker symbols. These stocks are meant to create opportunities for investors to buy into a fast-growing unit without investing in the whole company."},{"id":"i_4dc9efb60098","t":"d","term":"trade acceptance","ch":12,"d":1,"hy":true,"body":"A financial instrument that is similar to a banker’s acceptance (BA) except it is drawn on, and accepted by, a buyer (importer)."},{"id":"i_b95ae32c9e88","t":"d","term":"trade credit","ch":10,"d":1,"hy":true,"body":"A form of credit that arises when a buyer receives goods but payment is not made to the supplier until some later date. Trade credit is the primary source of short-term financing used by many businesses."},{"id":"i_565a525de1c0","t":"d","term":"trading companies","ch":12,"d":1,"hy":true,"body":"A trade payment method whereby an exporter (seller) sells products at a discount to an export trading company, which then resells the products internationally."},{"id":"i_8a8532d1e636","t":"d","term":"transaction risk exposure","ch":17,"d":4,"hy":true,"body":"A type of exposure that arises when a company creates receivables, payables, or other cash flows that are denominated in a currency other than its functional currency. Thus, the ultimate value of these receivables or payables when they are collected or paid may be different from when they were created, due to possible changes in the exchange rate between the currency of denomination and the company’s functional currency."},{"id":"i_df97f46dd5b1","t":"d","term":"Transaction Workflow Innovation Standards Team (TWIST) bank services billing (BSB) format","ch":15,"d":5,"hy":false,"body":"An international standard electronic format used to transmit bank balance, service charge, and other information from a bank to commercial customers or other banks. This format has been updated to meet ISO 20022 standards, as the camt. message specification."},{"id":"i_15f767fac610","t":"d","term":"transfer pricing","ch":2,"d":4,"hy":true,"body":"The setting of the price that two parties (including subsidiaries of a large corporation) charge one another for economic activity between them."},{"id":"i_6bd0644e20bc","t":"d","term":"transit check","ch":4,"d":1,"hy":true,"body":"A check deposited with a financial institution that is drawn on another financial institution."},{"id":"i_78dfe0103c48","t":"d","term":"translation risk exposure","ch":17,"d":4,"hy":true,"body":"A type of exposure that is created when a company holds assets or liabilities in a currency other than its reporting currency on its balance sheet or when a foreign subsidiary’s financial statements are converted (translated) into the parent company’s reporting currency as part of the process of consolidating a company’s financial statements into a common currency. The exposure occurs because the value of the foreign assets and liabilities may change from one accounting period to the next as the underlying foreign exchange rates change. This exposure is sometimes referred to as accounting exposure."},{"id":"i_06fc3b2055ff","t":"d","term":"travel card","ch":4,"d":1,"hy":false,"body":"A credit card used by a business for employee travel purposes. Also known as a travel and entertainment (T&E) card."},{"id":"i_6fcb0da26eda","t":"d","term":"Treasury bill (T-bill)","ch":5,"d":1,"hy":false,"body":"A short-term debt obligation backed by the issuing government with a maturity of less than one year."},{"id":"i_e3fba87b68f4","t":"d","term":"Treasury bond (T-bond)","ch":13,"d":1,"hy":false,"body":"A marketable, fixed-interest US government debt security with a maturity of more than 10 years. T-bonds make interest payments semiannually and the income that holders receive is only taxed at the federal level."},{"id":"i_3e95e1dbd5b4","t":"d","term":"treasury management dashboard","ch":15,"d":5,"hy":false,"body":"A type of financial dashboard intended to provide management immediate feedback on the overall status of treasury operations, while also publishing key financial information useful in running the business."},{"id":"i_874bbaaaca64","t":"d","term":"treasury management system (TMS)","ch":15,"d":5,"hy":false,"body":"A technology solution that supports the interaction between a treasury department and internal and external partners (including banks). A TMS facilitates the management of multiple positions and processes, including bank accounts, debt, investments, foreign exchange, payments, and risk."},{"id":"i_cf13b3beac92","t":"d","term":"Treasury note (T-note)","ch":13,"d":1,"hy":false,"body":"A marketable US government debt security with a fixed interest rate and a maturity between one and ten years. T-notes can be bought either directly from the US government or through a bank."},{"id":"i_3ddfa093fbf1","t":"d","term":"treasury policies and procedures","ch":18,"d":4,"hy":false,"body":"Policies (i.e., statements to guide activities in a particular area or function of an organization) and procedures (i.e., specified series of actions or operations) that provide a framework for the design of workflows and controls that support operational, financial, and treasury management objectives."},{"id":"i_f07e397dd5b6","t":"d","term":"treasury stock","ch":6,"d":2,"hy":true,"body":"Stock issued by a company and later reacquired. It may be held in the company’s treasury (indefinitely or to be used for deferred compensation plans), reissued to the public, or retired. Treasury stock receives no dividends and does not carry voting power while held by the company. It is considered issued, but not outstanding; therefore, it is deducted from any capital calculations."},{"id":"i_a941d3a9207a","t":"d","term":"Treasury/Reserve Automated Debt Entry System (TRADES)","ch":5,"d":1,"hy":false,"body":"An entity of the US Federal Reserve that provides for the processing and clearing of most money market investments in the United States. Also known as the Commercial Book-Entry System (CBES)."},{"id":"i_48075864b259","t":"d","term":"trend","ch":14,"d":1,"hy":false,"body":"The general direction that the values are moving."},{"id":"i_5ef569512fc7","t":"d","term":"tri-party repo","ch":5,"d":1,"hy":false,"body":"A repurchase agreement in which the collateral is held by, and funds are exchanged through, a broker-dealer (the tri-party agent)."},{"id":"i_83e4ae9ea4ef","t":"d","term":"tying","ch":3,"d":3,"hy":true,"body":"The act of requiring a purchaser to buy one product or service in order to be allowed to buy a second, typically unrelated, product or service."},{"id":"i_7bc1d60897b5","t":"d","term":"uncommitted line of credit","ch":13,"d":1,"hy":true,"body":"A credit facility that the lender may withdraw without notice or reason. Also known as a discretionary line of credit."},{"id":"i_e6be49395427","t":"d","term":"underwriting","ch":6,"d":2,"hy":true,"body":"An investment bank function, this is the act of purchasing all or a part of a block of securities issued by a company and thereby becoming responsible for their ultimate distribution. The underwriter normally assumes all the risk or liability for the sale of the securities."},{"id":"i_557d7dad7945","t":"d","term":"Uniform Bank Performance Report (UBPR)","ch":7,"d":3,"hy":false,"body":"An analytical tool, published by the US Federal Financial Institutions Examination Council (FFIEC), created for bank supervisory, examination, and management purposes. In a concise format, it shows the impact of management decisions and economic conditions on a bank’s performance and balance sheet composition. The performance and composition data contained in the report can be used to help evaluate the adequacy of earnings, liquidity, capital, asset/liability management, and growth management."},{"id":"i_969d874b01f6","t":"d","term":"Uniform Commercial Code (UCC)","ch":2,"d":4,"hy":false,"body":"A set of proposals adopted by US states as laws to ensure uniformity for commercial transactions in the United States. It defines the rights and duties of all parties in a commercial transaction and provides a statutory definition of commonly accepted business practices."},{"id":"i_09489af5af4f","t":"d","term":"Uniform Customs and Practice for Documentary Credits (UCP)","ch":12,"d":1,"hy":false,"body":"A set of rules established by the International Chamber of Commerce (ICC) which govern the operation of commercial letters of credit (L/Cs) and are known as UCP. The current rules are outlined under UCP , and these rules affect almost every credit issued under the ICC’s UCP."},{"id":"i_983aec0889de","t":"d","term":"Uniform Rules for Demand Guarantees (URDG  )","ch":12,"d":1,"hy":false,"body":"A set of rules, established by the International Chamber of Commerce (ICC), which includes a series of checklists and best practices for the use of demand guarantees."},{"id":"i_daf093aeafa6","t":"d","term":"United Nations/Electronic Data Interchange for Administration, Commerce and Transport  (UN/EDIFACT) standards","ch":15,"d":5,"hy":false,"body":"A set of internationally agreed-upon standards, directories, and guidelines for electronic exchange of data."},{"id":"i_0dd3274d9ba9","t":"d","term":"universal bank","ch":3,"d":3,"hy":true,"body":"A bank that offers both commercial and investment banking services, with investment banking services offered through the investment banking arm of a commercial bank’s holding company."},{"id":"i_1953030bd6e7","t":"d","term":"universal payment identification code (UPIC)","ch":7,"d":3,"hy":false,"body":"Used in lieu of a bank account number, this allows US automated clearinghouse (ACH) payments to be credited to a US company’s bank account without the need for the company to publish its bank account details on its invoices."},{"id":"i_ad006685e65a","t":"d","term":"unrealized gains/losses","ch":8,"d":1,"hy":true,"body":"Gains or losses that are recorded in the financial statements without an associated cash flow. Contrast with realized gains/losse
